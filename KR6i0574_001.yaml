body:
  text: 賢宗後學通理述嗣法門人心興較訂第九總釋名題者謂名者實之賓題者經之綱一經大義攝在名題故云總釋謂總釋一經大義於名題中也於中分四一略釋五名二詳釋現題三附辨古法四後釋卷次初按經中佛自所說有五種題名一曰大方廣圓覺陀羅尼此以法義為名謂圓覺是法大方廣是義陀羅尼是梵語此云總持謂圓覺一法能總一切大方廣三義能持無量義故總以陀羅尼名之二曰修多羅了義此以勝慧為名修多羅乃諸經通名權漸之經名不了義圓頓之經名為了義依之修習能成廣大甚深智慧故是以勝慧為名也三曰祕密王三昧此以勝定為名三昧乃諸定總名權小所修不稱祕密以可測故亦不稱王不自在故諸佛菩薩所住乃稱祕密與王依之修習乃得自在神用權教小乘所不能測故是以勝定為名也四曰如來決定境界此以圓果為名謂如來是已成之佛果凡是有心決定當得所謂果徹因源是也五曰如來藏自性差別此以圓因為名如來藏自性是未成之佛因賢聖等妙皆自性之差別所謂因該果海是也大疏云事周理盡須建五名為令行人依真法義成勝定慧修證圓因果也取要標題且存兩號講演時名繁難稱故標題唯取要者且存而號者一名大方廣圓覺二名修多羅了義合此二名共為一題略去陀羅尼三字後三名亦皆不取以三昧因果皆以法義勝慧百得建立故惟以二名為要也略釋五名竟二詳釋現題二一釋所詮法義二釋能詮名目初大方廣圓覺修多羅了義經卷上大疏云凡欲解了義經論先須明釋法義依法解義義即分明以義照法法即顯著故論中起信論中欲顯大乘深隱性相道理先開此二如論云摩訶衍者略有二種一者法二者義法指一心義開三大今此中五字圓覺二字正是其法以圓覺在纏即是如來藏性故論云所言法者即衆生心為欲衆生發其大乘信根故目此圓覺在纏為衆生心也大方廣三字即名為義以如次即是體相用三大義故大疏云大者當體得名常遍為義當體者當圓覺之全體無邊涯絶分量強名為大揀非法相宗中對小言大之大以對小言大則大有分限非真大故常遍為義者常則竪通三世遍則橫該十方竪通三世者過去無始未來無終無有一法能先後之唯此能先後於諸法故名為大如涅槃云所言大者名之為常橫該十方者外則能包內則能遍無有一法能包遍之唯此能包遍於諸法故名為大如涅槃云所言大者其性廣博猶如虗空方者就法得名以方者法也軌持為義軌則軌生物解持則任持自性軌生物解者如衆生悟入圓覺雖因善友開示然其智解從覺性生如水土之潤生穀芽等芽從種生不從水土故知悟入圓覺還依圓覺為方以軌之任持自性者以一切衆生皆具本覺雖流浪六道而此覺性不曾失滅設能依此修證則一切勝因妙果皆從此出如文殊章世尊答文殊云有大陀羅尼名為圓覺清出一切清淨真如菩提涅槃及波羅密教授菩薩是知修證圓覺還依圓覺為方以持之廣者從用得名大用繁興即是廣也多博為義多則此圓覺性本有過塵沙之妙用潛興密應無有休息無有窮盡此則以多名廣如世間凡數之多者即名為廣博則此無盡用一一同於覺性無有邊際無有分限如普眼章世尊答普眼云覺性遍滿圓無際故當知六根遍滿法界根遍滿故當知六塵遍滿法界塵遍滿故當知四大遍滿法界如是乃至八萬四千陀羅尼門遍滿法界此則以博名廣如世間凡量之博者亦名為廣圓覺二字直指其法言上來所稱大方廣者畢竟是甚麼法耶故直指圓覺示之意顯即是圓覺性故若釋其義者滿足周備曰圓顯此外更無一法故虗明靈照曰覺顯此中不存一念故又具足大方廣義該盡世出世法故名為圓備歷本如究竟照徹凡非凡位故名為覺裴相國序云統衆德而大備爍羣昏而獨照故曰圓覺此之謂也次釋能詮名目修多羅三字是諸經通名了義經三字是當經別目總別合稱意顯此經乃諸經中了義經也修多羅華梵名義已於藏乘分攝中釋了義者決擇究竟顯了之說非覆相密意含隱之談順宗皇帝問諸經中何者了義何者不了義清涼答云佛一代教若約本為一事八萬度門莫非了義若圓器受法無法不圓得之由人亦皆了義此二不足揀別今約開方便門示真實相有了不了故淨名涅槃寶積等經皆云依了義經不依不了義經言不了義者謂小乘教了義經者謂大乘教又大乘教復有了不了謂有大乘雖六度悲智兼修而定說三乘不一亦非了義若有會歸一極以玄爐陶於羣像智海總乎萬流無二無三無不成佛中道理觀不共二乘方為了義又大寶積經佛告舍利弗若諸經中宣說世俗名不了義宣說勝義名為了義若諸經中宣說作業煩惱名不了義宣說煩惱業盡名為了義若諸經中宣說厭離生死趣求涅槃名不了義宣說生死涅槃無二無別名為了義若諸經中宣說種種文句差別名不了義宣說甚深難見難覺名為了義此等乃祖佛料揀固應無惑細研本經語意知非不了義教故題中特標為了義經也問修多羅與經字但華梵文異今雙置題目豈非繁重答梵文總指諸部華文別目當經封總彰別不唯非是繁重且顯當經了義獨勝於諸修多羅耳詳釋現題竟三附辨古法二一立題法謂諸經題目或佛說時便自立名如妙法蓮華經等或佛滅後結集者立如佛說阿彌陀經等今經是佛自立結集裁成如前略釋五名中說又人法喻三單復具足例有七種一單人如淨名二單法如涅槃三單喻如寶積四法喻復如妙法蓮華五人法復如勝天王般若六人喻復如佛說梵網七具足三如大方廣佛華嚴今經若通論五題則例同華嚴若唯就現題則立準涅槃二釋題法謂古釋有二一作對釋二離合釋今作對有三一圓覺是法大方廣是義為法義對二經字是能詮教屬事大方廣等是所詮法屬理為理事對亦教理對三修多羅乃諸經通名了義經為當經別目為通別對離合亦三一大字是體能具相用得勝之義方字是相廣字是用為體所具得劣之義方廣上加之字依主釋也二了義是用經字是體經上加即字體持業用持業釋也三大方廣圓覺是修多羅藏中之了義說故稱為經居近鄰強鄰近釋也此與上科蓋為不廢古式略備參考餘或可通避繁不悉附辨古法竟四後釋卷次卷者對舒而言謂舒之以便誦持卷之以便供奉也又古經書多以軸為卷今易制未譯其名耳上者下之對也此經文有兩卷數配兩儀故以上下分之此卷居上也按諸經此下多出譯人注疏家皆詳細釋之今此經譯人事籍無可考稽已略見於第七門中總釋名題竟十別解文義分三一敘分二正宗分三流通分此三分者始於道安證於親光蓋以經無豐約皆具乎此依此科經如首身足各有分齊不相紊亂故稱彌天高判今古通遵乃諸經科判之所由始也此且通標三分下乃別依分釋初敘分敘一經之來源述說法之由致二一結集證信敘二問答發起敘初具六謂信聞時主處衆也關一則大教不興故古德判為六種成就云證信者以主伴依正能所分明證是佛說令人生信故亦名通敘六種成就諸經通有故亦名經後敘以是說經之後結集建立故結集建立有意有因建立之因者按龍勝論云佛將入滅時阿難悲哀阿尼樓豆謂言汝是持佛法人當咨問後事難巳云何後事豆言汝問佛滅度後我等以誰為師依何而住惡性比丘云何調伏結集法藏經初當置何語阿難承教一一咨問佛依問而答我滅度後汝等以戒為師依四念處住惡性比丘默而擯之一切經初當置如是我聞等語由是凡屬佛經皆置此語無此語者悉屬僞造建立之意有三一斷疑凖智度論佛滅度後衆請阿難登座結集法藏感身相好同佛衆起三疑一疑世尊重起二疑他方佛來三疑阿難成佛一唱此語知是結集法藏三疑頓斷二息諍以阿難與衆德業頗齊若不推尊從佛恐與諍論一唱此語顯是授受有源羣諍自息三異邪以西域外道經初置阿憂二字阿翻為無憂翻為有意顯諸法雖多不出有無斷常之見大抵如是今置此語明是出世正法揀異邪經分三一標信與聞二時主及處三法衆同會初如是我聞如是者信成就也為順此意解作信順之詞以信則言如是不信則言不如是故華嚴云信為道元功德母長養一切諸善法故首標之又如是者許可之詞佛地論云結集時諸菩薩咸共請言如汝所聞當如是說傳法菩薩便許可言如是當說如我所聞云云又如是者指法之詞有能指所指之別能指即結集之人所指即結集之法結集之人有二如纂靈記云摩訶衍藏是文殊師利與阿難海在鐵圍山間結集所指之法有事有理事則能詮虗文從此以後直至歡喜奉行皆如是之事理則所詮實義經云無上法王有大陀羅尼門名為圓覺又云依願修行漸斷諸障障盡願滿便登解脫清淨法殿等皆如是之理若事若理總屬此法故不別指直言如是若連下釋之是結集者對衆標唱之語蓋謂如是之法我從佛聞也我聞者聞成就謂成就雖在信順臨期實賴音聞不有音聞教體何立故楞嚴云此方真教體清淨在音聞釋義則揀別賓主曰我聲來達耳曰聞合論則是結集者自謂耳提面命親從佛聞揀非私淑讀古者比也又從凡至聖說有四我一凡夫遍計我二外道宗計我三諸聖假立我四法身真實我今就文殊與阿難海應屬後二以無遍計及邪計故聞謂耳根發識聲在可聞處作心欲聞即便得聞今不云耳聞及識聞等但云我聞者廢別從總易明了故若按空生晏坐帝釋散花則聞既無聞我何有我無我無聞乃一乘頓教之真我真聞也標信與聞竟二時主及處一時婆伽婆入於神通至於不二境現諸淨土一時者時成就也謂臨期雖在音聞說聽全憑佳會不有佳會大法難弘故古德云世事合會尚待昌期大法弘宣豈違佳運釋義則一者始終究竟之謂時者遷流轉變之義合論則說無異座聽無異席說聽事畢一期究竟名為一時又時乃不相應法或否或泰俱以時稱今云一者揀非否也以否則不能究竟不得稱一故不云年月日者以如來說法通乎上下謂天上人間也滅後結集達於遐邇年月日紀難以對同故總以一時該之若依當經所宗則是心境泯理智融凡聖如本始會此諸二法皆一之時也婆伽婆者主成就謂說聽雖期良時御衆必推教主不有教主羣機何歸然諸經教主多用佛字乃梵語之略具云佛陀耶此翻覺者謂自覺覺他覺圓滿故是十種通號之一今云婆伽婆者名具六德義該十號顯最勝也名具六德者一自在德謂五住不能染二死不能繫故二熾盛德謂身光與智光降魔制外故三端嚴德謂具相及妙好端正嚴麗故四名聞德謂名聞遍十方稱揚無盡故五吉祥德謂滅罪銷灾障賜福延壽齡故六尊貴德謂世間出世間尊重珍貴故為具六德故經存梵語五不翻中含多義不翻也義該十號者自在攝二謂證理自在則攝如來化他自在則攝應供熾盛攝一謂降魔熾盛則攝正知制外熾盛則攝遍知端嚴攝一謂相好端正則攝行足相好嚴麗則攝明足名聞攝二謂名聞周遍則攝妙往菩提稱揚無盡則攝達僞通真吉祥攝一謂到處皆吉攝無上士轉難成祥攝調御丈夫尊貴攝三謂世間尊貴攝天人師出世尊貴則攝於佛據此則三世間主共相尊貴則攝世尊良以根鈍衆生樂減厭繁若但言佛則太減遺九德故若通言十則太繁難憶持故今言婆伽婆者均於繁減亦不遺彼繁減是不唯顯其最勝且憶持亦易耳入於神通等處成就也謂御衆雖推教主際會必依宏方為說一乘頓教故現法界玄境大光明藏即一真法界智也具一切智遇緣則興故名為藏稱法界起還照法界故以大光明稱之益以神通者不可思議曰神無能障礙曰通意顯此智唯證乃知難可思議有緣則應無能障礙故入之一字對下三昧而言謂智契法界則是入此三昧入此三昧法界之理現前唯受此理不受餘受故益以正受若以三身言之智契法界則是現法性身依法性土身土同為一法界故一切如來已成佛果人也已成佛果現自受用身土故曰光嚴以自受用身土皆有光明及莊嚴故住持者依法界住為法界持意顯一切如來所有自受用身土皆依法界性為緣起也衆生者衆處受生以有無明昏濁煩惱雜染不清淨故當其無明未起煩惱未生原本自有清淨覺地即法界是意顯凡諸所有衆生身土亦依法界性為緣起也緣起無性故曰身心寂滅謂生佛身心皆歸寂滅寂無形滅不生故然身心為能依既已寂滅所依勝劣二土豈有形生是唯有法界平等即是本性實際包羅萬有彌綸太虗故云圓滿十方唯是一法界性本無二體逢緣變現諸法故能隨順今當為諸菩薩演斯頓教故且於不二竟現諸淨土據此則他受用身土仍依一真法界性為緣起耳時主及處竟三法衆同會三一舉類標數二列上首名三與伴同會初與大菩薩摩訶薩十萬人俱初舉類與者相與意有所為為演一乘頓教之法故爾相與大菩薩類為是一乘頓教機故菩薩者略梵語具云菩提薩埵此翻覺有情有三義一約自利謂菩薩是能覺悟之有情揀凡夫不自覺故二約利他謂菩薩能覺悟一切有情揀二乘不覺他故三約兩利謂菩薩上求佛覺下化有情顯行願兼資悲智雙運故首言大者揀權漸教故大疏云信大法解大義發大心證大道行大行趣大果六事俱大顯是實教及頓教故摩訶薩具足應云摩訶菩提薩埵摩訶亦翻為大問與上大字何別答上是揀權漸此復揀地前謂此菩薩又是實教頓教中之大菩薩揀非地前諸位可比末四字標數謂一類相從者大數約有十萬同德同心和合集聚故云俱也舉類標數竟二列上首名其名曰文殊師利菩薩至賢善首菩薩等而為上首首句總指其名文殊下依次別列文殊師利者梵音之訛正云曼殊室利此翻妙吉祥以初生時有祥光滿室之兆故亦翻妙德謂智德深妙華嚴云了了見佛性猶如妙德等道成先劫號龍種尊王現證北方為摩尼寶積當來成佛名曰普現影嚮大化示同菩薩華嚴表根本智今經為發起師一乘頓教非智莫解故首標之梵語邲輪跋陀此云普賢悲華經云我誓於穢惡世界行菩薩道使得嚴淨我行要當勝諸菩薩寶藏佛言以是因緣今改汝字名為普賢據此則普賢之名應具二義一者穢惡世界使得嚴淨是普化衆生皆令成賢二者我行要當勝諸菩薩是普超同倫獨讓我賢古德云行彌法界德無不遍曰普隨心益物乘時設化曰賢與悲華亦不相違常見塑畫聖像多以文殊普賢為對蓋以文殊表智普賢表行智行相成如目足更資今經亦爾故次列之普眼者依本經佛答其問略具二義一者普見諸法清淨是大智普眼二者普見衆生同佛是大悲普眼金剛者最堅最利一切無能壞能壞於一切菩薩之智慧亦爾煩惱不能侵魔外不能動能斷一切障能除一切礙故觀經中備起三難乞世尊銷末世之疑其義可見智既如此能含能生無盡功德故名為藏彌勒此云慈氏由過去遇大慈如來得慈心三昧又由在母胎時其母使有慈心故以慈氏為姓名阿逸多此云無能勝謂位居補處除佛無能勝故若依本經則菩薩深究愛根蕩除細惑人所不及況復能勝哉清淨慧者慧用了然無住無著一切幻化所不能染故大疏云若慧不清淨即落地位滯因果乖覺性菩薩不爾故以清淨慧為名威德自在者有威可畏有德可仰魔外不能嬈妄惑不能侵依本經則三觀成就功用猛利故能爾也辨音者具無礙辨能辨一切差別言音如本經佛說二十五種輪觀單復圓修唯菩薩能辨識亦唯菩薩能宣傳故淨諸業障者斷惑證真身三口四永不生故依本經則一切業障盡依四相而生菩薩致問如來為說能令一切衆生淨諸業障故仍依之名也普覺者生死涅槃猶如昨夢菩薩能覺其覺可謂普矣依本經則我人生壽能生業障因枝尋本易得覺了至於作止任滅但障禪那任運而興覺了成難菩薩因問而覺覺斯周普圓覺者妄盡真極如望夜月故依本經則尅期修證心不放捨諸障銷滅佛境現前菩薩乃過來人也賢善首者以善為賢無過弘法菩薩能之故為首也依本經則流通聖教端賴此人故為至賢至善之首等字非等下乃等上十一位合十二位為十萬人之上首也列上首名竟三與衆同會與諸眷屬皆入三昧同住如來平等法會諸眷屬者除上首外餘諸所有人也然上首既有十二若人各一萬眷屬合有十二萬人或亦多少不定則上云十萬者亦唯約大數言之上首護念曰眷攝令從道曰屬是則此之衆人時時為上首護念攝令從道當此圓覺妙場故相與而來也皆入三昧者有二義一者佛力所加二者智同於師佛力所加者如來入於神通大光明藏三昧則是以法界智契法界性而此之衆人皆在法界性中頓覺身心輕安智契法界故云皆入三昧智同於師者十二上首皆法身大士與如來同一法身佛既入三昧大士亦入三昧而此之衆人向為大士護念攝令從道已得智同於師因見師入自亦從入故云皆入三昧然既皆入三昧自然身心寂滅平等本際故云同住如來平等法會同住者智契法界故所稱平等法會者如前所云圓滿十方即是平等以十方同依故不二隨順即是法會以諸法同出故是也又如來既於不二境中現諸淨土而諸菩薩等亦應於彼不二境中現諸淨身分證受用身此正所謂機感盈前不得不說所謂大衆成就者以此結集證信序竟二問答發起序文殊問世尊答發起一經之端序三一文殊代問二師資緣合三酬請開示初三一衆中具儀二備陳問詞三至三顯殷初於是文殊師利菩薩至長跪叉手而白佛言據上所釋如來既於不二境中現諸淨土而諸菩薩等亦應於不二境中現諸淨身雖曰淨身亦自有清淨色相可別主伴約此章文殊為主非大智不能發起餘衆皆伴故云在大衆中從座而起者將有所問故將有所問三業維誠故云頂禮佛足謂文殊以自己最尊之頂禮如來最卑之足此顯身業誠也右繞者意表隨順於佛必至三匝者意表初中後際無間斷故此顯意業誠也長跪者安危不易雖時長不以為苦叉手者指掌相抵儼然是端秉一心如此而白表所問非常此顯口業誠也衆中具儀竟二備陳問詞大悲世尊願為此會至求大乘者不墮邪見大疏云咨來法要本為衆生故偏稱大悲世尊又悲而云大者不唯令現前得益且利及將來也此中問詞有二願為此會等是初約如來問本起法行此會即平等法會諸來法衆者通指十二上首及所統眷屬約上首則與佛同來約眷屬則隨上首來統稱法衆者上云皆入三昧同住平等法會故說者謂文殊為衆請佛說如來者是已成佛果之人已成佛果根本起於清淨因地說來乃可憑信故文殊特為致請清淨因地即自性清淨為因地心下文所謂清淨覺相是也法行者即因地所修無漏妙行揀非有漏可比縱有所修皆非法行此乃出世軌則如法如律之行此且渾言向下答處佛自分明顯示及說菩薩等是次約菩薩問發心正修菩薩者乃未成佛果之人雖未成佛誓期必成故以根器元大不復樂著小乘等法信大教解大理故能於大乘中發清淨心即菩提心也不云菩提而云清淨者以既發此心修大行證大果直取無上菩提不為一切聲聞緣覺等法之所混擾故云清淨又菩提心有三種一者直心謂直心正念真如法故二者深心樂集一切諸善法故三者大悲心普度一切諸衆生故三心皆名清淨者以正念真如不念餘法故能清淨樂集善法對治不善故能清淨普度衆生不住度相故能清淨如是則但言清淨而三心具矣三心既具諸病無所由生故能遠離細閲下之十章章章有病能障正修既能遠離則十章之正修成矣所以本疏判此章為發起序也能使下是後約未來顯利益深遠未來者統言佛滅度後末世者遠指末法之世謂正法像法已過時也去聖時遙背教日遠不知求大乘者無庸論矣縱有發心求大不知如來因地法行不學菩薩發清淨心其不至於錯亂修習墮落邪見者無有是處文殊懸念及此致斯二問求佛開示令末世求大乘者知此學此自能不墮邪見楞嚴云諸修行人不能得成無上菩提乃至別成聲聞緣覺諸天外道魔王皆由不知二種根本錯亂修習今不知不覺此二亦然故云爾也備陳問詞竟三至三顯殷作是語已五體投地如是三請終而復始作是語已謂陳問已竟也五體者四肢及頭投地者問畢結拜此一請也大疏云若唯一二未展䖍誠若過於三禮煩則亂故唯三請終而復始者一請終從頭又請曰復始是為二請二請終復始亦然是為三請其殷勤懇切之意已自可見文殊代問竟二師資緣合二一師與資合二資與師合初爾時世尊告文殊師利至汝今諦聽當為汝說初讚其所問爾時者文殊代問已竟時也告文殊者以其殷勤三請要讚許以安其心故善哉者讚美詞雙言者讚其二問俱善不唯有益現在且兼利末世也稱文殊為善男子者以其智慧勝妙遇理能順遇事能斷故汝字仍指文殊等乃兼於餘衆以十萬合集文殊問即餘衆問故乃能為諸等是牒其所問二事以顯讚善之不虗故咨詢者咨扣詢問因地法行如上所釋然問處雖約如來而令知意在菩薩故云為諸菩薩等乃約義牒也準前文殊第二問求說菩薩於大乘中發清淨心遠離諸病雖為現在而意在令末世求大乘者學此不墮邪見今亦唯是約意而牒故但云及為末世等末世衆生去聖遙遠不知求大者無庸問矣設有求大乘者要必得正住持即是發菩提心也菩提心有三種一者直心正念真如不念餘法故名為正二者深心樂集善法安住修習故名為住三者大悲心普度衆生攝持自己故名為持三心既得邪見無所從生故云不墮如華嚴云忘失菩提心而修諸善根魔所攝持今得則不忘其不墮邪見也必矣汝今下誡聽許說汝今者面命文殊諦聽者誡以諦審而聽勿得以生滅心而聽實相法故當為汝說者不失人亦不失言也智論偈云聽者端視如渴飲一心入於語義中可當誡聽之句踊躍聞法之悲喜如是之人可為說可當許說之句然世尊既已讚其所問仍復誡聽許說是師緣與資合矣師與資合竟二資與師合時文殊師利菩薩奉教歡喜及諸大衆默然而聽奉教者奉聞誡聽許說之教歡喜者喜其現未俱利不空問也及諸大衆者兼十萬人默然而聽者不涉餘緣澄心諦聽如十地經云如渴思冷水如饑思美食如病思良藥如衆蜂依密我等亦如是願聞甘露法即奉教喜聽之義也然文殊既已奉教歡喜仍復同衆默聽又資緣與師合耳師資緣合竟三酬請開示二一總以略示二別以詳示初善男子無上法王至及波羅密教授菩薩重呼善男子者顯答問有所屬使文殊著耳故無上法王者出能證人即是如來以如來證無上法於諸法中得自在故有大等者出所證法陀羅尼翻為總持謂總一切法持無量義故有多字少字一字無字多字如楞嚴等呪少字如唵齒臨等一字如吽字等無字即是一心今取無字謂一真法界心也一真法界總一切法持無量義故名為大既能總能持即能出能生故名為門名為圓覺者照無所遺曰圓迷不能侵曰覺此即因地法也一切者總該之詞謂總指清淨真如菩提涅槃等為一切故流出者如來依此對機演教衆生依此證果修因所謂無不從此法界流故真如者頓教所詮即是心真如門然頓教不立文字真如亦是強名故以清淨二字揀之以其離言說相離心緣相故菩提涅槃終教所詮即是智斷二德以終教有真可證證極則成智德名曰菩提又終教有惑可斷斷盡則成斷德名曰涅槃此上皆屬果德及波句乃屬因行波羅密或云波羅密多若尅對西音翻為彼岸到依此方順義回文當云到彼岸謂修此者能離生死此岸渡煩惱中流到涅槃彼岸故尋常經中多說六種亦有說十者大疏云輟己惠人名施防非止惡為戒堪受諸法未能忘懷為忍鍊心於法為精精心務達為進心慮寂靜為禪推求揀擇為慧方法便宜為方便希求樂欲為願不可屈伏名力如實決斷為智今且後六以十中後四皆從慧度開出如方便者慧之運用願者慧之期望力者慧之堅強智者慧之果決如是則六可攝十故釋且從六謂施戒忍進禪慧也若依頓教而修則但觀法性觀法性無慳貪則是布施因知一切布施皆法性也觀法性無染汙則是持戒因知一切持戒皆法性也觀法性無瞋恚則是忍辱因知一切忍辱皆法性也觀法性無懈怠則是精進因知一切精進皆法性也觀法性無散亂則是禪定因知一切禪定皆法性也觀法性無愚癡則是智慧因知一切智慧皆法性也如是則觀法性常行六度修六度常見法性清淨真如不期得而自得雖得亦無能得所得設有能所則清淨壞真如背矣若以終教而修則為治慳貪隨緣修行施波羅密為治破戒隨緣修行戒波羅密為治瞋恚隨緣修行忍波羅密為治懈怠隨緣修行進波羅密為治散亂隨緣修行禪波羅密為治愚癡隨緣修行慧波羅密如是則為治六蔽修行六度不墮於空隨緣而修修即無修不墮於有不墮於有以是即空而有不墮於空以是即有而空即有而空為真空即空而有為妙有真空妙有體合中道菩提涅槃皆依中道建立不期證而自證雖證亦不滯有滯空設有滯執則菩提迷而涅槃違矣教授菩薩者以此頓終二教授諸菩薩以此正屬頓教亦略兼於終直通於圓至下自見令依因而趣果此圓覺法之行相也總以略示竟二別以詳示二二長行二偈頌初二一為酬初請二為酬次請初三一明真因有力二明執妄成輪三明妄盡還覺初一切如來本起因地至永斷無明方成佛道一切如來成佛根本起於因地因地所依當先明之故云皆依等言皆依者非是一佛二佛乃一切如來皆以此為因地心也圓照即是圓覺謂一真法界全體以此照法法無所遺故以圓照明之清淨覺相別指心真如門言因心雖依圓覺而研真斷惑得力憑真如門故不言真如而言覺相者以真如清淨即是圓覺相故從本以來離言說相離心緣相故言清淨又清淨約真如理言覺相約真如智言以有此智乃能永斷無明以達妄本空故無明者即生滅門以生滅門中業轉現識等皆依無明而變現故若非達妄本空何能永斷永斷者不復再生不復再生自能轉識成智故云方成佛道言方成者顯成之不易所謂轉生滅心而成不生滅性也明真因有力竟二明執妄成輪二一執所變成輪二執能變成輪初云何無明善男子至妄有輪轉生死故名無明初徵由妄執云何句承前徵起上云永斷無明方成佛道但不知無明何似故承前而徵起之善男子者呼而告之也一切衆生者九界之中唯除菩薩以下云修圓覺者乃指菩薩故從無始來者遙指晦昧真心以來晦昧真心即是根本無明依於根本重起枝末如無我中計我無法中計法故云種種顛倒顛倒之言其義難明若以喻言之則猶如迷人四方易處迷人者迷正之人喻晦昧真心者晦昧真心於無我中計我無法中計法計我即我執計法即法執俱生分別共有四種皆是於無中計有故以四方易處喻之四方者指正方謂東西南北喻俱生我分別我俱生法分別法皆本無也易處者謂東作西西作東南作北北作南喻所計二我二法皆為顛倒也雖知顛倒未明因何法起故以妄認等釋之妄認者非是而認四大者地水火風四大假合本無實體認為自身即是執我認四大為實有即是執法六塵緣影者謂於色聲香味等六塵境上現起能緣影事即六識也托塵似有離塵實無故以影事稱之然既稱影事本無實體認為自心即是執我認六識為實有即是執法不當認而認故名妄認下以喻言當自見矣譬彼下喻明妄執病目者有病之目如白翳赤眚等目既有病則見亦非真不過似見空謂晴空華及二月皆屬似境是蓋以病目喻根本無明似見喻枝末無明謂二種我執及二種法執晴空喻真如理性華喻四大為身似色可見故二月喻六識為心似心能照故如是則華及二月本屬烏有皆由病目重起似見於晴明空中妄有所見以此為喻因之四大之身六識之心亦本屬烏有皆由根本無明重起枝末無明於真如理性中妄有所執所以釋妄認為不當認而認也善男下結示應徵空實無華文稍不足若據上喻明應補云及第二月喻中可知法中言真如理性中本無地水火風身相亦無六塵緣影心相所以似有者喻中言病者妄執法中即是依根本無明重起枝末無明虗妄執有身心計我計法皆依此耳由妄執故句是重牒上文由病目起似見妄執華及二月是空中實有則是人已惑虗空之性以虗空之性無法可當情故非唯者不但也言是人不但惑虗空之性且更有甚焉者故云亦復迷彼實華生處據上文華下必帶二月喻身相及心相文中空實無華實華生處俱不帶者以前喻明中既有可例知故法中即是由根本無明重起枝末無明妄執四大之身六識之心是真如性中實有則是人已惑真如之性以真如性中無法可當情故非惟者言是人不但惑於真性亦復迷於妄元喻中言實華生處即喻諸妄根元謂本末無明以是身心之生處故由此者承上而言言上來惑虗空性是喻迷真體迷華生處是惑妄元迷真體則不能修真惑妄元則不能斷妄生唯糢糊而生死亦糢糊而死一念善天上人間一念惡地獄三途故云妄有輪轉生死結上故名無明執所變成輪竟二執能變成輪善男子此無明者非實有體至是故說名輪轉生死初明無明無體以上云譬彼病目見空中華及第二月病目喻根本無明似見喻枝末無明空華二月喻身心二相無明為能變身心為所變所變虗妄上已俱明能變虗妄恐猶未了今且先明無體此無明即指本末二種非實有體者迷時似有覺則元空故喻中言夢中人非指作夢之人乃夢中所現人也夢時等喻非實有體其義易明如衆下明無明無因無因之義難明重設喻以顯故云如也如者設若義衆空華病目觀之似有喻二種無明亦迷時似有也滅於虗空者目若淨時不見空華義似滅於虗空喻迷若覺時本無無明義似滅於真如然空華雖似滅於虗空不可說言虗空中定有滅處喻無明雖似滅於真如不可說言真如中定有滅處何以二句乃徵釋不可說義言既有滅處必原有生處今諦觀虗空原無生處又豈有滅處哉真如亦然則無明無因明矣一切下結妄見成輪一切衆生者迷位中人也言如上所喻真如無生處則無明非所生而一切迷位中人所以執無明有生滅者蓋是於無生真如中虗妄見也本屬妄見誤為真實三細六粗緣茲而興故曰是故說名輪轉生死明執妄成輪竟三明妄盡還覺善男子如來因地修圓覺者至究竟圓滿遍十方故初以智除妄如來因地即佛為菩薩時也為菩薩時發心修於圓覺即知其為圓頓大根非劣器耳知即真如智謂修圓覺者從真如門離念頓入也據上所說身心無明皆如空華但以衆生不知妄受輪轉然衆生所以不知者以有念故今云知是空華則是從本圓覺心發起離念真智頓悟無明同於空華焉有輪轉故即無也根本既斷枝末自然不生故云亦無身心受彼生死非作故無本性無故者非同漸教研真斷惑作之使無乃悟妄即真本性無故彼知下泯智合覺彼知覺者謂彼知是空華之覺者仍指真如智言此智本來離念當體即是真如故云猶如虗空然既體是真如猶如虗空則不可以智知若更起念欲知同虗空之真如者則是於虗空中更生華相故云即空華相則了無實也雖爾無實但不可說說無即成斷滅故云亦不可說無知覺性意顯說有說無二俱成過故須有無俱遣一念不生即是真如當知真如為圓覺之門直通於圓故曰是則名為淨覺隨順淨即真如覺即圓覺也隨順者即不違義言如來因地修圓覺至此則能隨順清淨覺性而不違也亦同顏子不違之義何以下徵釋還圓何以句徵起徵上有無俱遣名為淨覺隨順者何以故爾虗空性故等釋成先釋淨字即清淨真如圓覺入門虗空性故句指起信論心真如門中所言空義非有無一異等相以無虗妄心念故常不動故即頓教所詮真如一切法無能動轉此常時孤標也如來藏無起滅翻終教所詮藏性隨緣隨緣有二一隨染緣從真起妄現起世間六凡等法二隨淨緣返妄歸真現起出世間四聖等法雖隨緣起滅而本體凝然故無起滅無知見故既無起滅惟一真體則是根塵逈脫知見依何而立故云無也據此則妄念不能侵諸法不能轉起滅無所從知見莫能立故稱為淨無可疑矣如法等文次釋覺字即圓覺妙心法界全體法界者且指事法界謂一一事法各有界分不相紊亂故言如法界性者謂知淨覺已仍復諦觀此理稱法界而為其性所謂理隨事遍是也究竟圓滿者謂既已理隨事遍仍用審諦究竟進觀久之不見有事全事全理故云圓滿所謂事得理融是也既已事得理融自能千剎涉入故云遍十方界以上云淨覺隨順者於此可見為酬初請竟二為酬次請是則名為因地法行至依此修行不墮邪見首句結前謂結上因地法行菩薩下正示謂如來既依之成佛菩薩即應因之發心發心求成佛果自應不慕小道故云於大乘中所發之心即菩提心而云清淨者謂直心正念真如法故末世依修得正住持故云不墮邪見長行竟二偈頌二一標頌二正頌初爾時世尊欲重宣此義而說偈言大疏云泛論偈頌總有四種一名阿耨窣覩婆此不論長行與偈但數滿三十二字即為一頌二名伽陀此云諷誦戒名直頌謂以偈說法非頌長行注疏家多稱孤起頌也三名祇夜此云應頌應上長行故四名蘊陀南此云集施謂以少言集攝多義施他誦持故今於四中屬祇夜頌以標云重宣此義故又天台注法華於祇夜頌中復開為二一超頌謂長行在後偈頌在前超過餘文而頌故二追頌謂長行在前偈頌在後追其已失而頌故私注法華指掌復開為四一廣頌謂長行中略偈頌中廣二略頌謂長行中廣偈頌中略三補頌謂義順長行而長行却無文相蓋是長行未周偈頌補出四義頌謂義似長行而文却不類今此經章章有偈故備録之以備遇便指授世尊欲重宣者有二義一慈誨諄切故二衆集先後故先集者已聞長行後集者猶聞偈頌正頌分二一頌酬初請二頌酬次請初三一頌真因有力二頌執妄成輪三頌妄盡還覺初略頌文殊汝當知一切諸如來從於本因地皆以智慧覺長行恐其未詳復欲說偈故教以當知謂少言而攝多義不可忽也一切二句全同長行皆以句義攝長行三句智慧二字即圓照清淨覺相覺之一字即永斷無明成佛二頌執妄成輪略頌二一頌執所變成輪二頌執變成輪初了達於無明知彼如空華即能免流轉了達於無明者了根本無明能生枝末無明達枝末無明於現前身心執我執法妄有輪轉空華下準長行仍帶二月彼字指現前身心言設能知彼四大假合之身六塵緣影之心如空中華及第二月自不於中執我執法造業受報故能免於流轉是反顯此上應有因執成輪之語第以偈略難周故私於了達無明約長行之義補釋智者詳之頌執所變成輪竟二頌執能變成輪又如夢中人醒時不可得長行云如夢中人夢時非無及至於醒了無所得其意以起念成迷似有無明如夢中人夢時非無若離念即覺覓無明了不可得如夢若醒時夢中人當下寂滅以是而觀則滅本無滅生亦無生故長行云一切衆生於無生中妄見生滅是故說名輪轉生死此亦因偈文從略約長行之義補釋顯無異也頌執妄成輪竟三頌妄盡還覺前長文不分今依疏義分二一頌諸妄盡極二頌不真何待初覺者如虗空平等不動轉長行云彼知覺者今但言覺者即指真如智言以彼即是知空華之覺者彼既悟妄當體即泯合真如故如虗空長行云猶如偈唯存如從略也平等者言既泯合真如猶如虗空則有不能有無不能無生不能生滅不能滅有無生滅等皆平等故不動轉者真真如性三際莫能遷諸法無能變長行所稱淨覺是也頌諸妄盡極竟二頌不真何待覺遍十方界即得成佛道至本性圓滿故初二句略頌長行長行云如法界性究竟圓滿遍十方界如法界性偈略不具其意蓋是進觀淨覺理隨事遍故曰覺遍覺既遍已仍復審諦究竟進觀久之事得理融千剎攝入故得至十方界也今但云覺遍十方界以一句攝長行兩句義也即得成佛道者覺圓滿故後三句補頌防難恐有難云滅妄成真理有固然今上云又如夢中人醒時不可得似乎無妄可滅此又云即得成佛道莫是有道可成耶故以此後三句防之其意以衆幻元無並非滅於真如佛道本成亦無得於真如良以本性圓滿因執妄而成虧妄滅仍圓義言成佛何得以有成為難頌酬初請答竟二頌酬次請答菩薩於此中能發菩提心末世諸衆生修此免邪見此科之初長行有結前成因一句偈略之也菩薩於此中長行云於大乘中菩提心長行云清淨心心既清淨諸病皆離末世依修自能免於邪見此是問答發起序合前結集證信序總結序分已竟
