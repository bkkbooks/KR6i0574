body:
  text: 賢宗後學通理述嗣法門人心興較訂二正宗分出本經之正義明當教之宗源四一三問三答生信分二兩問兩答開解分三四問四答教修分四一問一答示果分初三一普賢章二普眼章三金剛藏章初三一普賢請問二師資緣合三酬請答問初二一正請二顯殷初三一具儀總請二持難別質三結問方便初於是普賢菩薩在大衆中至清淨境界云何修行此章以普賢為主以上章文殊表智此章普賢表行顯智行相成如目足更資雖遠可到也餘衆皆伴故云在大衆中三業虔誠具照文殊章釋除現會疑利末世修要須同體之悲故稱大悲世界願為此會等請除現會疑也及無末世等請利末世修也修大乘者揀非小機聞此圓覺清淨境界顯是一乘頓教機故圓覺即是一心清淨境界偏指心真如門文殊章所謂圓照清淨覺相是也云何修行者且約觀行修習為問意謂佛前所説知是空華即無輪轉亦無身心受彼生死此約上根利智一念頓悟當下頓了生死至若中下之流不假觀行修習必難悟入故總問云何修行仍冀頓悟也具儀總請竟二持難別質世尊若彼衆生知如幻者至令妄想心云何解脫別質有三義一謂若彼衆生知一切無明身心皆如空華即是知如幻者謂彼能知一切無明身心皆如幻無實故若爾則四大假合之身六塵緣影之心亦皆如幻無實云何以如幻無實之身心還修治於如幻無實之無明其猶以水洗水水益多而終難盡反資無明亦何益哉此一質也二謂縱若無明幻性一切盡滅則亦無有身心以身心原以無明有故故上句稱無明為幻性以其能生身心等一切如幻法故則無有心應是則無身心或翻譯騰録時誤身字為有字耳然既無有身心縱理由頓悟誰為歷事修行云何如來尋常復説歷事修行淨治如幻之無明以成正果其猶以空合空空無益而合無功修行徒勞安所為乎此二質也三謂若諸衆生聞説如幻即知無實本來不用修行謂觀行事修二種修行皆不用也果其爾者則一切衆生常在生死既常在生死則起惑造業造業受報一念善天上人間一念惡地獄三途惑業襲襲報應綸綸塵沙劫波莫之遏絶故云常居幻化謂不假觀行無能頓悟曾不了知如幻境界不歷事修無明宛爾令妄想心云何解脫心尚不能解脫何況於身益應繫縛恁麼則舉世皆成夢誰為大覺人此三質也三執既陳二修必要鉤深索隱蔑以加矣微普賢孰能與於此也持難別質竟三結問方便願為末世一切衆生至令諸衆生永離諸幻前總請通為現未此結請偏為未來良以現會有疑是權末世誤修堪悲故作何方便者觀行事修皆為方便二者不知所用故以作何問之漸次修習者先用觀行次依事修由觀行故一念頓悟當下了知如幻境界由事修故漸次磨礪令妄想心歷位解脫永離諸幻端在是矣普賢乃過來人也為憐末世衆生故推不知而備悉具問正問竟二顯殷請必至三者顯殷勤故作是語已五體投地如是三請終而復始義準文殊章釋後十章皆倣此普賢請問竟二師資緣合二一師與資合二資與師合初爾時世尊告普賢菩薩言至汝今諦聽當為汝説當場一問現未具益故重言善哉以讚美之諸菩薩權示有疑末世衆修習多誤皆為所為非普賢不能為故以乃能讚之修習上義稍不足應加問於如來四字蓋翻譯者意到文不到故聞説如幻即觀諸法如幻時至頓悟如幻當下一念不動即是如幻三昧修習之時又有方便漸次衆生依之得離諸幻此亦世尊如其所問而為之讚故誡以諦聽者令其為物示軌非普賢不諦聽也許以當説者令知不負所問正見其與資合耳師與資合竟二資與師合時普賢菩薩奉教歡喜及諸大衆默然而聽奉教喜聽即是與師合也師資緣合竟三酬請答問二一長行二偈頌初三一答總問二釋別質三答結請初善男子一切衆生種種幻化至幻華雖滅空性不壞前釋圓覺即是一心今言妙心者以其具含真如生滅二門攝盡世間出世間法互相涉入無障無礙故也據前普賢問云聞此圓覺清淨境界云何修行是雖舉圓覺乃偏約真如門問然真如無可修行故世尊約生滅門合根本圓覺而總答之意謂種種幻化如身心無明等皆生如來圓覺妙心所謂性海緣起是也猶如空華等説喻以明空華喻種種幻化從空而有喻性海緣起若爾直須以觀行力悟得緣起無性覺體常圓如彼幻化雖滅空性不壞此先以觀行修行答普賢總問意也答總問竟二釋別質衆生幻心還依幻滅至諸幻雖盡不入斷滅據前普賢第一質意云若彼衆生知一切無明身心皆如空華則是知如幻者若爾則身心亦幻設更歷事修云何以幻還修於幻故世尊以此釋云衆生幻心還依幻滅幻心即是無明以根本無明枝末無明皆是妄想心故還依幻滅者謂衆生無明幻心還依幻妄之身心進歷事修而得滅故此釋第一質也據前普賢第二質意云觀行既歷復進事修自應修心無明一切盡滅若其爾者則無有心誰為修行云何如來尋常復説理由頓悟事必漸修耶故世尊以此釋云諸幻盡滅覺心不動然此猶是依幻説覺亦名為幻何故亦名為幻以若説有覺猶未離幻以是對待法故然亦不可説無以説無覺者亦復如是蓋以無之於有亦對待法也以是義故幻滅名為不動由不動故方能入纏垂手教化衆生建立水月道場大作空華佛事降伏鏡裏魔軍證取夢中菩提是名深修如幻之行此釋第二質也據前普賢第三質意云若諸衆生聞説如幻即知無實本來不用修行果其爾者則於生死中常居幻化蓋以不假觀行曾不了知如幻境界不歷事修令妄想心云何解脫故世尊以善男子等釋之於中有法説有喻明法説中言一切菩薩指現會發清淨心者末世衆生指未來發清淨心者應當遠離等三句總釋顯決定當修也蓋普賢意恐末世衆生以為聞説如幻即知無實何必修行故前言本不修行今世尊以應當遠離等為釋者意顯一切幻化虗妄境界務須修行而遠離之幻化虗妄境界該法甚富故置一切之言如彼無明身心依正凡聖等皆是也如此等法務須修行遠離者蓋由遠離不易要在堅固執持遠離之心不肯放捨或理觀頓遣如夢枷鎖窹則已離或事修漸遣如遺怨家時時防犯設不修行如何能也然此且約以心遣幻果其幻滅此心亦無所用設存此心猶是淨眼中翳亦如幻者故應亦復遠離直解云此遣第一重能離之心也次言遠離為幻者謂上以知心如幻重起遠離若心既不有此重離亦無所用設若存此重離如粗翳既離靠眼之細翳猶存仍為是幻故應亦復遠離直解云此遣第二重離心之離也此下又言離遠離幻者謂上以遠離為幻復起遠離以遣之令化若遠離已化則上之所謂離遠離者如淨目之虗光亦名為幻故應亦復遠離直解云此遣第三重離遠離之離也得無所離者無可遣故既無可遣猶如淨目真精故云即除諸幻文殊章所稱圓照清淨覺相即指此也又此段後後遣於前前統論共有四重謂第一以幻心遣幻境故云遠離一切幻化虗妄境界所遣幻境由堅執持遠離心故能遣幻心此名正遣第二以遠離遣幻心故曰心如幻者所遣幻心亦復遠離能遣遠離此名遣正第三以遠離遣遠離故曰遠離為幻所遣遠離亦復遠離能遣遠離此名疊遣第四以極遠離遣離故曰離遠離幻所遣離遠離者亦復遠離能遣之極遠離此名遣之又遣自後則無可遣永無有幻故曰得無所離即除諸幻諸幻盡處即是淨覺真如楞嚴云諸可還者自然非汝不汝還者非汝而誰即斯意耳喻明中云譬如鑽火者若論鑽字從金似是以鐵鑽鑽木求火今下云兩木相因則能鑽所鑽俱是用木按五行木能生火亦必相因方生此喻幻化虗妄境界如無明生身心身心起無明循環往復無有窮已故以相因喻之火出木盡喻幻心遣幻境所謂正遣是也灰飛者木盡成炭炭熟灰飛然炭不頓熟灰必漸飛喻心如幻者亦復遠離遠離為幻亦復遠離離遠離幻亦復遠離所謂遣正疊遣遣之又遣是也煙滅者謂上以灰覆是炭猶未熟尚有微煙今既灰已飛盡炭已熟盡煙已滅盡喻得無所離即除諸幻所謂遣至無可遣永無有幻是也上是喻明下乃以法結合以幻修幻者統該前之四重謂以後後幻修前前幻也諸幻雖盡不入斷滅者顯出淨覺真如心故此釋第三質也釋別質竟三答結請善男子知幻即離不作方便至如是乃能永離諸幻若如我所説則知幻即離不作方便離幻即覺亦無漸次釋其義者謂既知是幻但自不著以不著即離故云知幻即離是不須更作方便以離幻也離幻即覺亦無漸次者謂既已知幻即離則離無所離以離於幻也既離於幻圓覺妙心昭昭不昧故云離幻即覺何勞漸次修證為哉故云亦無漸次雖然但屬理觀未涉事修所謂理由頓悟乘悟併銷是也重起事相修行如是乃能永離諸幻所謂事非頓除因次第盡是也長行竟二偈頌二一標頌二正頌初爾時世尊欲重宣此義而説偈言自此以下十一章標頌俱準文殊章可知二正頌三一頌答總問二頌釋別質三頌答結請初普賢汝當知一切衆生至虗空本不動圓覺心者即是淨圓覺心此心均稟同賦凡聖一如而今言諸如來者以衆生迷之而諸佛獨能證之如裴相序云終日圓覺而未嘗圓覺者凡夫也欲證圓覺而未極圓覺者菩薩也具足圓覺而住持圓覺者如來也餘義俱於長行中釋二頌釋別質幻從諸覺生幻滅覺圓滿至木盡火還滅初三句合頌釋前二質幻指二種無明及與身心無明是生妄之心長行云衆生幻心是也身心是所生之妄然既皆從覺生即能障覺設欲顯覺務須以現前身心進修事行除滅能生無明長行云還以幻滅是也偈頌文稍不足今約長行之義補之此約義略頌釋第一質也幻滅覺圓滿者果其幻滅仍復絶諸對待依幻説覺依有説無皆為對待則覺性圓滿圓滿故無空無隙動至何所故曰覺心不動由不動故所以能入廛垂手教化衆生此亦約義略頌釋第二質也若彼二句釋見長行常應遠離幻者長行云應當遠離一切幻化虗妄境界由堅執持遠離心故今偈中幻之一字即該長行一切幻化虗妄境界應遠離三字即是長行應當遠離常之一字即該長行由堅執持遠離心故此約義略頌幻心遣幻境也是名正遣諸幻悉皆離一句義皆遣正長行云心如幻者亦復遠離疊遣長行云遠離為幻亦復遠離遣之又遣長行云離遠離幻亦復遠離以至無可遣永無有幻長行云得無所離即除諸幻皆約義略頌也如木中生火木盡火還滅長行云譬如鑽火兩木相因火出本盡灰飛煙滅亦略頌耳結合之義不頌此幻義略頌釋第三質也三頌答結請覺則無漸次方便亦如是覺則無漸次是超頌長行離幻即覺亦無漸次方便亦如是是追頌長行知幻即離不作方便此單頌理由頓悟不頌事必漸修者以此經是一乘頓教示偏重也普賢章竟二普眼章三一普眼代請二師資緣合三酬請答問初三一衆中具儀二備陳問詞三至三顯殷初於是普眼菩薩在大衆中至長跪叉手而白佛言此中以普眼為主具儀普眼問乃備故餘衆皆伴故云在大衆中具儀之意準前可知二備陳問詞大悲世尊願為此會至末世衆生假説方便初正以備陳急欲求佛憐愍故稱大悲世尊此會菩薩指現前新學末世衆生指未來初心願為及為者以是當被機故菩薩修行漸次者謂此等菩薩應修何等觀行觀行難以遽修最初入手必有漸次當急故先請令知思惟者用心參究衆生不知故代問云何思惟住持者不被境遷衆生不能故代問云何住持衆生未悟者未大開悟必求大開故代問作何方便普令大開大悟蓋必求事事無礙周遍含融觀也世尊下反顯問由恐謂時節若至其理自彰何勞預為致問故當機口稱世尊而言若彼衆生等以反顯之彼衆生者仍指現前新學未來初心正方便者即指修行漸次如楞嚴三漸前二不爾則入手無門思惟如楞嚴違其現業不爾則覺路難通雖聞如幻靡脫堅執故曰心生迷悶此三昧即是如幻三昧如前普賢章云種種幻化皆生如來圓覺妙心乃至云一切菩薩及末世衆生應當遠離一切幻化虗妄境界由堅執持遠離心故心如幻者亦復遠離遠離為幻亦復遠離離遠離幻亦復遠離得無所離即除諸幻此中末二句即是三昧成就若無正方便正思惟何以至此故曰心生迷悶迷者迷於有我我相所亂故悶者悶於有法法相所覆故我相所亂法相所覆由此於圓覺不能悟入如是則正方便正思惟之二問其勢有不能已也願興下總以結請大慈與開悟之樂大悲拔迷悶之苦故以願興為請假説方便者不是單請漸次蓋通約正住持等皆為方便良以圓覺本有我法元空實不假於方便其如現會根有利鈍末世惑有厚薄根利惑薄者聞此三昧已搖鞭影根鈍惑厚者心生迷悶不入圓覺是故普眼以假説方便為請蓋是求佛於無方便中權巧施設假立方便名言令現會及末世釋其迷悶悟入圓覺性也備陳問詞竟三至三顯殷作是語已五體投地如是三請終而復始準前可知普眼代請竟二師資緣合二一師與資合二資與師合初爾時世尊告普眼菩薩言至汝今諦聽當為汝説初讚其所問重讚善哉者現未俱益故三漸中前二為漸次第三為思惟住持為保任此是讚其所問總相種種方便者兼總帶別而統讚之如漸次思惟等各具一切差別相故汝今下誡聽許説正見其與資合耳師與資合竟二資與師合時普眼菩薩奉教歡喜及諸大衆默而聽釋義準前可知師資緣合竟三酬請答問二一長行二偈頌初二一約妄盡還覺以酬請二約修習成益以答問初二一妄盡還淨覺二隨順還圓覺初二一酬修行漸次請二酬思惟住持請初善男子彼新學菩薩至安處徒衆晏坐靜室初酬修行請新學菩薩指現前新學末世衆生指未來初心此二既是新學初心便云欲求如來淨圓覺心者以是如來本起因地法故直心正念真如便能遠離諸幻欲求淨圓覺心非此不可故以應當誡之先依下酬漸次請行遠自邇登高自卑欲求淨圓覺心亦應有先依者奢摩他此云止謂止一切不應行事並一切不應動念楞嚴除其助因亦此中攝佛於因地之中亦先依此故云如來奢摩他行禁戒者條分縷析難盡多種若約其最所嚴禁者大則十重小則四重楞嚴刳其正性亦此中攝持而云堅者如惜浮囊絲毫無容犯故徒衆者從學法侶令其四事不闕無所忮求名曰安處處猶住也設不令其安處於自禪觀時未免有所擾故晏坐者晏安而坐所謂身體及手足靜然安不動其心常憺怕未曾有散亂然此雖因安處徒衆外無所擾亦質由於堅持禁戒內無所動此且約因戒生定以為入觀之方便門也靜室者清淨房室望下即是觀堂望上即是坐禪之處離腥羶絶闠閙故云靜也酬修行漸次請竟二酬思惟住持請二一正思惟二正住持初二一觀身是幻二觀心是幻初恆作是念我今此身至和合為相實同幻化大疏云恆作是念者行住坐臥一切時中常如是觀也我今此身者執受既堅故先觀也四大和合者堅濕暖動假合為身愚謂此且總觀髮毛等乃次第別觀髮亦毛屬惟頭上者稱髮其餘渾以毛稱爪者指之甲齒者牙之對觀齒即兼牙矣皮者肉之表亦包肉之皮肉者皮之襯亦襯皮之肉筋者肉之力骨者肉之核亦支肉之骨髓者骨中之脂腦者頂中之髓垢者身之垢膩色者身之顏色此上皆有形有質故云皆歸於地歸屬也此約義相屬地非約死後歸地也唾口液也從口而垂曰唾涕亦液屬從鼻出者為涕膿血肉潰變也通身流潤名血血之精華內會者為津外泄者名液涎沫皆唾之病也粘纖聯墜者為涎浮聚口角者為沫咳嗽喉出者名痰悲泣目出者名淚精氣者腎精有力大便不取其滓與小便同取其利此上皆有濕有潤故云皆歸於水暖氣者通身暖相和氣歸火者原從火大中來故動轉者通身動作運轉歸風者原從風大中來故歸地歸水例此可知如楞嚴八還皆向來處還今經四歸亦向來處歸但彼以各還顯有性而此以各歸顯無身故次下即云四大各離妄身當在何處又大疏云四大皆言歸者此身本合四大成故如寶積經云此身生時與其父母四大種性一類歌邏身若唯地大無水界者譬如有人握乾灰終不和合若唯水大無地界者譬如油水無有堅實即便流散若唯地水無火界者譬如夏月陰處肉團無日光照則便爛壞若唯地水火無風界者則不增長四大各離者正觀之時各有所歸即名為離愚謂離則無身故世尊假言以徵妄身當在何處實顯其無處也處尚不有體復何云故曰即知此身畢竟無體和合者四大和合為相者幻妄稱相相即無相故曰實同幻化觀身是幻竟二觀心是幻四緣假合妄有六根至畢竟無有緣心可見承上已知身問幻化如何復有根塵及識心耶故云四緣假合云云四緣者見聞覺知以四性皆有能緣義故假合者假合於身妄有六根者見為眼根聞為耳根覺為鼻舌身根三根皆合中知總名為覺知為意根此先有六根也六根四大者因有六根復對外之四大然內之四性既可分為六根外之四大亦可分為六塵色聲香味觸法此次有六塵也中即是內中外合成者謂內根外塵合成十二處也妄有緣氣者緣氣即是六識以六識雖妄居然有見聞覺知之氣分故於中積聚者於內根外塵之中積聚不散此後有六識也似有緣相者似有能緣之相假名為心者似有則非真如上所稱妄有緣氣者以此然根塵識三雖同屬妄有而起惑造業惟六識力強急欲令其觀識虗妄故重呼善男子以告之俾留意也此虗妄心即指六處識心托塵似現故曰若無六塵則不能有即彼外之六塵亦是四大假合若四大分解則無塵可得據此則於根塵識中能緣之根所緣之塵各歸散滅以塵既不緣根無所偶皆同散滅故內外不成中云何立故曰畢竟無有緣心可見畢竟者決定義諺云到底無有是也文殊章佛釋無明義云一切衆生從無始來種種顛倒指我法二執各有分別俱生均名顛倒妄認四大為自身相六塵緣影為自心相今既觀身如幻觀心如幻自是不復妄認顛倒日損而正見日益矣總結正思惟竟二正住持四一正説二喻明三法合四結示初雖云知幻即覺唯恐不能住持故先正説謂正説住持義也善男子彼之衆生至幻滅滅故非幻不滅善男子者呼當機菩薩而告之也彼之衆生指彼求淨圓覺之人求淨圓覺須先觀身如幻如幻之境能住持則幻身自滅幻身滅故能住持則幻心亦滅以心依於身身滅則心無所依故幻心滅故能住持則幻塵亦滅以塵托心現心滅則塵無所托故幻塵滅故能住持則幻滅亦滅以為滅塵故立幻滅名塵既已滅幻滅無所用故幻滅滅故能住持則是法皆真故曰非幻非幻則體無終窮故不滅也正説竟二喻明譬如磨鏡垢盡明現求淨圓覺譬如磨鏡之人幻身幻心幻塵幻滅重重蓋覆不是淨圓覺心皆如鏡上之垢身滅心滅塵滅乃至幻滅亦滅譬如鏡垢磨盡非幻不滅即是淨圓覺心譬如鏡之本明全體俱現據此則喻文雖略而攝義無遺細玩正説自知喻明竟三法合善男子當知身心皆為幻垢垢相永滅十方清淨恐其聞延失意故重呼善男教以當知也不了身心如幻執我執法蓋覆淨圓覺心故曰皆為幻垢必至身滅心滅乃至垢相永滅謂塵滅滅亦滅也如是則法法皆真故云十方清淨上云非幻不滅者以此約義而合勿過拘執法合竟四結示二一結示因執成垢二結示垢盡還淨初善男子譬如清淨摩尼寶珠至由此不能遠於幻化初喻説以示清淨摩尼寶珠龍王髻中所有清淨言其體內外明徹無垢染故摩尼言其用此翻如意能雨寶故寶珠言其相非尋常物珠中寶故善友入海取以濟世者此也映於五色者映謂影現謂對彼外之五色影現於內喻淨圓覺心對衆生外之五陰身心影現心內隨方各現者何方有五色即於何方影現五色喻衆生何類中有五陰身心即隨何類現自己五陰身心如形影相肖也諸世間人不知是影名為愚癡喻諸衆生不達是幻名為凡小以凡夫愚我小乘愚法同愚癡也影元無實由世間不知是影遂見摩尼實有五色喻幻元非真由凡小不知是幻遂執圓覺真有五陰執我執法即其相也善男下約法以合圓覺淨性合清淨摩尼寶珠現於身心合映於五色隨類各應合隨方各現諸愚癡者法喻文同迷影迷幻義亦頗肖故皆以愚癡名之説淨圓覺實有身心自相合見彼摩尼實有五色法義宛同喻義故云亦復如是由此句結顯成垢由此者承上執為實有而言謂由此執身心為實有於中諍人競我計是較非所以不能遠於幻化既不能遠自應常在其中起惑造業造業受報輪轉往復染污淨圓覺心成深垢也結示因執成垢竟二結示垢盡還淨是故我説身心幻垢至即無對垢及説名者是故者承上不能遠離而言不能遠離由於不知以是之故我説身心是幻是垢説是幻者令知非是真實應遠離故説是垢者令知染污淨覺應對治故設彼衆生聞佛所説即能對治垢染遠離幻化是為對離幻垢如是衆生非比尋常佛説是人名為菩薩以其能隨分斷妄隨分證真隨分成位故也垢盡者不肯得少為足必至細垢亦盡細垢既盡無煩更為對治故名為除如上所謂幻塵滅故幻滅亦滅是也即無對垢者謂既已垢盡對除即無對垢之人人且是無菩薩之名又向何處安立故曰及説名者顯菩薩之名亦無惟有淨覺真心如上所謂幻滅滅故非幻不滅是也齊此以前宛同順祖所立真空絶相觀義總結妄盡還淨覺竟二隨順還圓覺二一理事互融二攝入無礙初二一承前起後二正明理事初善男子此菩薩及末世衆生至無邊虗空覺所顯發此菩薩及末世衆生皆指求淨圓覺人也證得諸幻滅影像故者以一切諸法本屬幻有元是淨心影像但以衆生不知即知亦不能住今以正住持故一得永得再不至為影像所搖故云證得等也爾時者即爾證得諸幻之時影像既滅淨覺畢露故云便得無方清淨無方者即是周遍之義如云此方淨彼方不淨名為有方即不周遍故知無方即是周遍淨也無邊虗空向因無明幻垢障蔽真覺而為頑虗今證得幻滅障除覺性顯發則無邊虗空為覺所顯而成無際淨性矣楞嚴云一人發真歸元十方虗空悉皆銷殞者此也所謂無方清淨者可見承前起後竟二正明理事二一依理成事二融事同理依理成事者事不自事依理而成理既清淨則所成事法一一隨理而成清淨如其不明更助以喻譬如日光普照虗空世界所有一切物類莫不賴陽光而得成立忽被塵沙障蔽雲霧晦蒙而日光不現其虗空世界所有一切物類盡在昏暗之中不得顯發清淨霎時雲開霧散塵滅沙澄而日光顯現清明普照虗空世界所有一切物類悉皆顯現清淨喻彼覺性靈明圓照法界所有世出世法莫不因之而得建立忽然一念妄動展轉生起三細六粗而靈明覺性全然晦昧其法界中所有世出世法盡成迷昧不得顯發復其本淨今菩薩證得諸幻滅影像故爾時便得無方清淨無邊虗空覺所顯發虗空尚然何況虗空所有世出世法盡為覺性所顯而成清淨法喻對比昭然可了分二一成世間法二成出世法初二一別明二總結初三一成根處二成塵處三成大種初覺圓明故顯心清淨至鼻舌身意亦復如是承上無邊虗空尚是覺所顯發則覺心圓滿明淨可知正由圓滿明淨之故則無法不顯因無法不顯則顯隨緣所成賴耶識心亦成清淨性也由賴耶心清淨故依賴耶所分見塵之性即是見性亦成清淨性也由見性清淨故則見性所依眼根即浮勝二根亦成清淨性也由眼根清淨故則眼所發識亦成清淨性也此該眼家二界謂根與識也文中雖曰見塵但約見塵之性以塵界在後文説故次由眼所發識清淨故則賴耶所分聞塵之性亦成清淨性也由聞性清淨故則聞性所依耳根亦成清淨性也由耳根清淨故則耳所發識亦成清淨性也此該耳家二界不攝塵界凖上可知又由耳所發識清淨故則賴耶所分覺塵之性即該三性以鼻舌身皆稱覺故亦成清淨性也如是乃至者超略鼻家二界舌家二界身家二界乃至意家知塵之性及根識二界皆成清淨之性故云亦復如是成根處竟二成塵處善男子根清淨故色塵清淨至香味觸法亦復如是聞法既久恐不留意故重呼善男子而警之也六性六識皆依於根故統言根清淨故謂六根之中根根兼性與識皆成清淨之性由此之故則眼根所對色塵亦成清淨性也由色塵清淨故則耳根所對聲塵亦成清淨性也香味觸法依次皆成清淨之性故云亦復如是成塵處竟三成大種善男子六塵清淨故至火大風大亦復如是六塵者對根之別相一一皆成清淨性故則藏性隨緣所成堅礙之地大亦成清淨性也由地大清淨故則潤濕之水大亦成清淨性也火大有燥熱性風大有動搖性次第皆成清淨之性故云亦復如是別明竟二總結善男子四大清淨故十二處十八界二十五有清淨四大清淨者承上由地水火風各成清淨故則隨緣所成十二處等法皆亦各成清淨性也十二處者即前內之根處外之塵處以根為能緣處塵為所緣處內外攸分一定而不可紊故十八界者內之根界外之塵界中之識界各有六種共為十八界者有性分二義性則根為能照性塵為所照性識為分別性分則內外中間各有分齊可了明故二十五有者三界衆生之所依住古德頌云四洲四惡趣六欲併梵天四禪四空處無想及那含通稱為有者以其中生死因果不能無故此三則該盡世間法然經論皆稱四大為種以其能成諸法殊不知所以能成者不在於相却在於性今則方顯其是依彼圓覺淨性所現然能現圓覺既無方清淨則所現處界有法一一皆成清淨性也問準前六根六塵皆是依於前前淨性隨緣現起後後今何又依四大淨性隨緣現起十二處十八界等然此十二處豈不即是前之根處及塵處乎此十八界豈不即是前之塵處根處及根中所該之識界乎若言不是云何分別然科中雖分總別而總則總其別別則別其總豈可以不是為言若言是者何故先依根處塵處淨性隨緣現起四大而今又以四大淨性隨緣現起處界等亂現無據云何會通答諸法既各具淨性各各隨緣遍現緣異則現異緣同則現同若為彼之淨性能隨緣現此而此之淨性不能隨緣現彼是諸法之淨性各各有異也各異則不一不一則雖遍不遍如磚砌墻必有縫隙今以互現重現顯淨性一體周遍幸不必問其是前根塵及與不是等只管在淨性門外打之繞也成世間法竟二成出世法問世間諸法從妄緣生可説令淨出世真實反妄所成已是淨法何故亦説令淨耶答圭山大疏云若凡聖對待即勝劣全殊若稱法界觀一種皆是幻化緣起無自體故如有兩鏡一鏡現雜穢影像一鏡現勝妙影像癡孩不了貴賤懸殊知者達之一無差異故經云生死涅槃猶如昨夢然世法令淨上已具悉出世令淨此當略辨彼清淨故十力四無所畏至陀羅尼門一切清淨彼之一字通指世間諸法據上所説世間諸法次第皆依圓覺淨性所顯而成清淨由彼世間諸法清淨故則淨性隨緣所成出世間法若因若果一一皆成清淨之性故統言十力等清淨乃至八萬四千陀羅尼門一切清淨然此中十力等屬於果法三十七助道品屬於因法至陀羅尼既翻總持則因果俱該諸大乘經多惟標其總名注疏家雖出其別目亦不詳釋其義後學茫然圭祖愍之故大疏特為詳釋後之講演者一味循名逐義算沙自艱而不知照顧本經推源佛説要妙執筏問橋未免為智者之所訶焉今本疏既閲祖文仍復參看教乘法數略出名義使講演者知之勿拘泥也第一十力者大疏云如來唯一諸法實相智力此力有十種用故説為十法數云一是處非處智力知一切衆生因緣果報因果相當名是處不相當名非處二業智力知一切衆生三世所有諸業三定智力知一切諸禪三昧有愛見慢等為垢無則為淨四根智力知一切衆生信進等五根有上有中有下五欲智力知他欲樂如迦葉頭陀阿難多聞等六界智力界者性義即是種子對上欲為現行謂上知從性起欲此知習欲成性也七至處智力知一切道至處相謂善道處在人天惡道處在三途無漏道處在涅槃八宿命智力知過去本生本事等雖百千世劫皆明了無礙聲聞雖亦有此極遠則不知不得稱力九天眼智力知衆生死此生彼善惡業緣受報好醜等亦以極遠無礙超出二乘等為力十漏盡智力知自他漏盡永不受後有之生大疏云總名為力者能摧怨敵故不可屈代故第二四無所畏者一具一切智無畏於一切法盡知盡見二諸漏盡無畏五住究盡二死永亡三説障道法無畏於障道法能知能説四説苦盡道無畏於盡苦道能知能説通稱畏者衆中説法無所畏懼故第三四無礙智者一法無礙智諸法名字分別無滯如説地水火風等法二義無礙智諸法義相了了通違如説堅濕暖動等義三詞無礙智異地方言皆能隨順如説晉音秦音等詞四樂説無礙智根有利鈍隨彼樂説不因多説有厭等心通稱礙智者由此四智衆中説法無滯礙故第四佛十八不共法者惟佛能有故首標佛字法數云一身無失二口無失三意無失此三通稱無失者由多劫戒定妙慧大悲成就諸罪根及習故無錯誤四無不定心佛心如澄停水如無風燈即或有動亦常靜故五無異想心觀彼衆生本來清淨待時而度無怨親敬慢貴賤等諸異想心故六無不知捨心衆生根鈍於三受中惟覺苦受樂受於不苦不樂受中全無所知名為捨受是為不知而捨佛於不苦不樂受中知生知住知滅名為捨受是為知已而捨故無不知捨也七欲無減知善法恩常樂積集故欲無減八精進無減普度衆生遇難益強故進無減九念無減正念真如説法度生故念無減十慧無減力無畏等圓滿成就故慧無減十一解脫無減生死如昨夢有為解脫無減涅槃如昨夢無為解脫無減十二解脫知見無減解脫能生知見知見能保解脫故二俱無減譬如繩二合一則二俱牢也十三身業隨智慧行隨智慧現身相利益衆生十四口業隨智慧行隨智慧現語言利益衆生十五意業隨智慧行隨智慧示善惡利益衆生然身口皆以意梁為主是知身口二業現善現惡但有益於衆生皆為隨智慧行也十六智慧知過去世無礙本生本事如法華大通威音等能知能説猶如今日所見是也十七智慧知現在世無礙細事違法如楞嚴松直棘曲鵠白烏玄皆了元由塵沙界外一滿之雨足知頭數是也十八智慧知未來世無礙當生當報如法華授記聲聞當來成佛劫國莊嚴正法像法等能知能説將來必應是也通稱不共法者不與凡夫二乘菩薩等共故第五三十七助道品者大疏云助謂資助助正道故道即是因所謂止觀愚謂不必止觀若唯約大乘即是菩提心也言大乘菩薩發菩提心欲求無上菩提必以此等資助方能成故又道即是路謂戒定慧通於三乘言三乘修因期果皆以戒定慧為正修之路正修之路難以遽行故以念處正勤等而助成之故大疏云品即是類類正因故此總釋也別釋有七謂三四二五隻七單八共成三十七也三四者第一四念處第二四正勤第三四神足也第一四念處者凡夫計身是淨妄生愛染佛教念身不淨諦觀種子住處自相自性究竟皆不淨故凡夫計受是樂妄生貪著佛教念受是苦諦觀苦受樂受捨受皆是苦故凡夫計心是常妄生持守佛教念心無常諦觀過現未來念念生滅皆無常故凡夫計法有我妄生執取佛教念法無我諦觀內法外法諸世間法皆無我故通稱念處者初發心人常應繫念於此自能厭離世間進求出世法也第二四正勤者大疏云念處似火若得勤風則無所不燒故次辨之精進為體故總名勤異外道故特名為正別分為四謂已生惡令永斷猶如除毒蛇一未生惡令不生如預防流水二已生善令增長如溉甘果栽三未生善令速生如鑽木出火四第三四神足者大疏云欲勤心觀法數云欲念進慧由前四正勤中只管滅惡生善忘其本所發心故教以欲謂於菩提心重起猛利樂欲大疏與法數同樂欲雖猛恐不能常故教以勤謂精進無間法數名進蓋進即是勤但大疏列在第二法數列在第三雖精進無間恐雜異緣故教一心謂繫心一境法數名念蓋念即是心但大疏列在第三法數列在第二雖繫心一境恐被魔擾故教以觀謂正觀破之法數云慧蓋慧即觀也由此四法於所期境速疾能到故名神足亦名如意足謂如其所意而能到故二五者第一五根第二五力也五根者第一信根謂初發心時即具信心尚屬不定今既修念處正勤神足信心乃定故名為根如樹生根不能搖第二進根謂修正勤時即具精進尚或有間今既修神足中勤進乃無間故名為根根義如上釋第三念根謂修念處時即能繫念尚有四境今既修神足中欲於菩提心猛利樂欲念乃循元故名為根此下根義俱如上説第四定根謂修念處時即有定義念有所住尚屬輕微今既修神足中心專注一境故名為根第五慧根謂修正勤時即具慧照揀別善惡今既修神足中慧正觀破魔故名為根又由此五者菩提心可以植立如栽一樹已生五條根矣五力者一信力即前信根增長進念定慧準知譬如樹既生根即能有抽枝發葉之力將來開花結果亦可以預期也隻七單八者七覺支八正道也七覺支者第一念覺支此是下六所依謂心若沉時念用擇進喜以起之心若浮時念用輕安定捨以攝之覺令定慧均等二擇覺支觀諸法時善能覺了不謬取於虛偽法故三進覺支修道法時善能覺了不謬行無益苦行故四喜覺支心得法喜善能覺了不隨法喜而生著故五輕安覺支身口輕安善能覺了不取輕安而不進故六定覺支發諸三昧善能覺了不生愛見故捨覺支捨所緣境善能覺了不生追憶故亦名七菩提分菩提翻覺支即是分然覺屬智德佛果方圓今既皆名覺支足顯其尚未圓滿雖未圓滿已有其分但於此認真行之轉煩惱而成菩提將不外是矣八正道者第一正見見理真正故第二正思惟思惟真修故第三正語説正法語令他生真信故第四正業正行具足除身邪業故第五正命如法乞食離五邪命故第六正精進淨煩惱結故第七正念不忘無為道故第八正定定住無為道故亦名八正道分然正道即是斷果亦佛果方圓今既皆名道分依分行之轉生死而證涅槃將不外是矣陀羅尼此云總持謂總一切法持無量義故因能總一切法持無量義故益以門名謂一切法從此出生一切義由此歸盡所謂無不從此法界流無不還歸此法界也然古德有二説一有字二無字無字如佛答文殊開口便云無上法王有大陀羅尼名為圓覺流出一切清淨真如菩提涅槃及波羅密等其總一切法持無量義之名亦略見其槩矣有字者即如來所説祕密無論一字少字多字皆以陀羅尼名然既稱祕密無容解釋但以三業相應如法持誦有求皆遂足見其總一切法持無量義也然此法此義唯佛能知餘皆不能故總以祕密名之若爾則一便足用何必八萬四千大疏云法門廣説無量無邊今齊此結數者為對塵勞故其意以衆生塵勞煩惱八萬四千佛或對此而説故云八萬四千要知行布不礙圓融故無妨説總一切法持無量義圓融不礙行布故無妨説八萬四千但八萬四千之數唯佛能如實而知如實而説大疏雖引古釋未見佛説不敢依録候考總結依理成事竟二融事同理三一同理清淨二同理不動三同理遍圓初二一正報同理二依報同理初善男子一切實相性清淨故至十方衆生圓覺清淨一切者通該世出世法實相者略疏云緣生諸法皆是虗妄會緣入實即為實相的指即是真如淨性而為諸法真實之相無量義經云無相不相名為實相而上來世出世法染淨差別之相為覺性圓明所顯同成一實相性清淨也由是一切世出世法同一實相性清淨故託法顯己即應融會得一己之身與彼諸法同一實相清淨由一己之身清淨故因己會他又應融會得多衆之身與己之身同一實相清淨由多衆之身清淨故如是擴而充之則應融會得自一方衆生身乃至十方衆生身同一圓覺清淨上但言實相清淨今又言圓覺清淨者以圓覺乃實相之本體實相即真如之自性由真如不守自性晦昧真體現起妄相愚迷執之為身由執身故尚不見自性豈見本體今此乃悟妄即真由真見體故曰圓覺清淨又上云無邊虗空覺所顯發今提出圓覺清淨顯應融會世界虗空等咸同清淨至下科自見正報同理竟二依報同理善男子一世界清淨故至一切平等清淨不動善男子下文稍不足準上科應云十方衆生圓覺清淨故由正會依即應融會得一現住世界與彼正報同一清淨由一現住世界清淨故緣一通多又應融會得多世界與一現住世界同一清淨由多世界清淨故如是擴而充之則應融會得自一方虗空三世所有世界乃至盡於十方虗空圓裹三世所有一切世界同一實相平等清淨不動上但云清淨此又云一切平等清淨不動者以一切世界有染有淨欲對染説淨者亦非真淨今則若染若淨同歸一自性清淨故云平等而又言不動者約三世論以清淨若有過現未來亦非真淨今則圓裹三世同歸真常清淨故云不動又上云證得諸幻滅影像故爾時便得無方清淨今提出平等不動顯應知覺性遍滿清淨不動圓無際故總結同理清淨竟二同理不動善男子虗空如是平等不動至當知覺性平等不動能同者事所同者理事中準前有二一世間法二出世法世法雖多今唯以五大代之五大之中空大居先是故先言虗空謂承上融會得虗空如是平等不動則見虗空時當知覺性平等不動地水火風別録避繁故總言四大謂承上融會得四大如是平等不動故如是平等例上應有今但言不動者以凖上可知故則見四大時當知覺性平等不動如是乃至等者謂世法中之五大一一皆如是平等不動例此則出世法中十力四無所畏等乃至八萬四千陀羅尼門平等不動則見此等法時當知覺性平等不動此科意是由前以理融事事同理而平等不動故每見一事即知覺性平等不動是事理依然似有二體至下科則理事渾無二矣同理不動竟三同理遍圓善男子覺性遍滿清淨不動至陀羅尼門遍滿法界覺性遍滿者此總承前一切世出世法俱為覺性圓明所顯而成清淨不動則是覺性遍滿法界無一法不包無一界不遍故云圓無際也由覺性圓無際故應當了知法界中所有內之六根渾同覺性遍滿法界也若不遍滿則成有際故向下諸法皆由圓無際故六塵四大遍滿準此可知如是乃至等者謂世間一切法中一一皆如是遍滿例此則出世法中十力四無所畏等乃至陀羅尼門一一皆渾同覺性遍滿法界皆由圓無際故總結理事互融竟此上義同順祖理事無礙觀三攝入無礙二一所證互相攝入二能證彼此無礙初善男子由彼妙覺性遍滿故至其光圓滿無壞無雜初法説謂由彼妙覺性遍滿一切世出世間法故此承上文出攝入之由也根性塵性等且約世間法言之謂由性遍滿故根隨性塵隨性一一皆無壞無雜謂根入塵而根不壞塵攝根而根不雜如根入塵既爾設塵入根亦然故總云無壞無雜根塵無壞句牒上為由不言無雜者可例知故如是則地性水性火性風性力無畏性等乃至陀羅尼門性一一皆無壞無雜如百下喻明百千燈喻世出世法光照一室喻隨性遍滿其光各遍滿喻互相攝入無壞無雜者此光入彼光此光不見壞相彼光攝此光彼光不見雜相喻諸法攝入此入彼而此不壞彼攝此而彼無雜也所證互相攝入竟二能證彼此無礙善男子覺成就故至光體無二無憎愛故證知覺性遍滿一切法無壞無雜名為成就由成就故當知此等菩薩不與諸法作繫縛不求於法成解脫以既知覺性遍滿則是法皆覺縛脫無二故又既知覺性遍滿則生死亦覺涅槃亦覺故於生死不厭涅槃不愛持戒亦覺毀禁亦覺故於持戒不敬毀敬不憎久習亦覺初學亦覺故於久習不重初學不輕何以故者承上徵起之詞言上來所謂不與法縛不求法脫等者何以故耳蓋以覺性遍滿無法不覺故云一切覺故譬如下更以喻明眼光者眼性之光喻妙覺明性以根性光之在眼喻妙覺明性之在法故前境者統該眼家所見喻一切諸法以一切諸法統為妙覺明心所照故曉了者不假分別喻妙覺圓照不涉思惟其光圓滿喻一切皆覺得無憎愛即喻不與不求不厭不愛等所謂彼此無礙者以此徵釋中光體無二喻覺性圓滿無憎愛故喻同一覺也齊此以前宛同順祖所立周遍含容觀義總結約妄盡還覺以酬請竟二約修習成益以答問二一承明修習成益二應前所問結答初二一知衆本來成佛益二了性平等不壞益初善男子此菩薩及末世衆生至生死涅槃猶如昨夢此科雖文承上來而此菩薩却不指覺成就者按前正方便中乃指現會中初學之人及末世衆乃指末世中乍發心者修習此心即依圓覺妙觀直觀此心日久功純豁爾心開頓見此心朗然虗靜不見有行可修有果可成故曰無修亦無成就惟一圓覺普照寂滅無二之性存焉於中下且約依報言之於中者即於圓照寂滅性中隨緣現起恆河沙諸佛世界且不是一恆河沙乃有不可説恆河沙諸佛世界又且不是一不可説乃有阿僧祇不可説恆河沙諸佛世界兼且不是一阿僧祇乃有百千萬億阿僧祇不可説恆河沙諸佛世界大疏云然此中意蓋直指盡虗空遍法界所有世界不是算其數量為欲引機造無邊境故假積多數耳猶如空華者喻從緣現起本無自性故亂起亂滅者喻成壞變遷了無定體故總顯空華無實世界非有性一圓覺普照寂滅無二也又言不即者不即世界從緣無性故不離者不離覺性當體即真故次約正報言準前依報應是於圓照寂滅性中現起十種法界因惑業結縛而成六凡緣無為解脫而成四聖雖縛脫不同俱是從緣無性當體即真故雙無也始知者由無縛脫而始知也既無縛脫蓋是四聖六凡同一圓覺既同一圓覺則是衆生本來圓覺與佛無異故云本來成佛由是返觀從前衆生之輪轉生死并諸佛之取證涅槃皆是迷位中事非圓覺境故云猶如昨夢覺後元空故知衆本成佛益竟二了性平等不壞益善男子如昨夢故至一切法性平等不壞如昨夢句攝前由前如昨夢故始知生死涅槃迷時見有覺後元空既覺後元空則生死空故無起謂不起煩惱成生死故涅槃空故無滅謂不滅生死證涅槃故不滅生死證涅槃則涅槃無來生死無去不起煩惱成生死則生死無來涅槃無去此攝如昨夢故以示生死涅槃無起滅去來相也其所證者次攝前生死涅槃無起滅去來相言其所證即是涅槃其中有得失取捨四相得失二相約菩薩言若菩薩進修則得涅槃失生死若懈退則失涅槃得生死取捨二相約凡小言小乘知慕滅則厭捨生死欣取涅槃凡夫樂世間則取著生死捨離涅槃此約夢事迷位中言今從夢覺悟得生死涅槃元空無起滅去來之相由此即悟得所證中之四相亦空也故云無得無失無取無捨其能證者指能證之行有四一作行謂作種種行欲求涅槃二止行謂永息諸念一切寂然三任行謂任彼一切隨諸法性四滅行謂身心根塵一切永滅由所證中四相既空則能證之四行焉能獨立故亦云無也於此證中者亦是攝前又於能所證中悟得無能無所也言能證之行不立即是無能所證中相全空即是無所據此乃是能所兩忘對待斯絶惟一圓覺普照寂滅無二之性孤然獨立畢竟二句防難恐攝前難云能所二相因人法而立今既能所俱無不知還有可證之法與人耶向下以理防之言有人有法不契寂滅無二之理必須人法俱無方契斯理故云畢竟無證亦無證者一切句總結自悟得生死涅槃本空乃至能所俱泯人法雙亡則一切依正凡聖諸法渾然同一圓覺普照寂滅無二之性不見世界有染有淨聖凡有高有下故云平等且是常住世間永劫不朽復云不壞承明修習成益竟二應前所問結答善男子彼諸菩薩如是修行至求如是法亦不迷悶節節稱善男子皆為令其著意況今結答更宜審聽呼而告之叮嚀益切矣彼諸菩薩統指現會初學及末世乍發心者如前普眼請云願為此會菩薩及為末世衆生演説菩薩修行漸次其意蓋以此會新學末世初心皆為當被之機故世尊以彼諸菩薩答之至問菩薩修行漸次即為能被之教故世尊以如是修行如是漸次答之如是修行者謂如我所説如是而修如幻三昧如前云欲求如來淨圓覺心應當正念遠離諸幻是也如是漸次者謂如我所説如是而立初漸次如前云先依如來奢摩他行堅持禁戒安處徒衆宴坐靜室是也其次又問云何思惟云何住持故世尊以如是思惟如是住持答之如是思惟者謂如我所説如是而觀身觀心如前云我今此身四大和合乃至云畢竟無有緣心可見是也如是住持者謂如我所説如是而住持進修如前云彼之衆生幻身滅故幻心亦滅幻心滅故幻塵亦滅乃至云證得諸幻滅影像故爾時便得無方清淨無邊虗空覺所顯發是也如是方便者謂如我所説如是而方便觀此中復二一觀依理成事如前云覺圓明故顯心清淨心清淨故見塵清淨乃至云四大清淨故十二處十八界如是乃至八萬四千陀羅尼門一切清淨是也二觀融事同理如前云一切實相性清淨故一身清淨一身清淨故多身清淨乃至云覺性遍滿清淨不動圓無際故當知六根遍滿法界根遍滿故當知六塵遍滿法界如是乃至陀羅尼門遍滿法界是也各各遍滿顯有融即義故如是開悟者謂如我所説如是而普令開悟如前云由彼妙覺性遍滿故根性塵性無壞無雜乃至云覺成就故當知菩薩不與法縛不求法脫不厭生死不愛涅槃等譬如眼光曉了前境光體無二無憎愛故是也至慮聞此三昧心生迷悶末復以求如是法亦不迷悶答之佛意以求如是法者果能如我前來所説於此無修亦無成就圓覺普照寂滅無二乃至云畢竟無證亦無證者夫如是則法性平等自爾無壞無雜何迷悶之有哉總結酬請答問中長行竟二偈頌標頌云爾時世尊欲重宣此義而説偈言正頌分二一頌妄盡還覺以酬請二頌修習成益以答問初二一頌妄盡還淨覺二頌隨順還圓覺初偈略不分普眼汝當知一切諸衆生至一切悉清淨普眼等七句頌前正思惟中身心如幻義也前三句教以總觀身相二句教以別觀身相説四大者地水火風四大假合成故心性歸六塵者六處識心外託六塵現故四大二句結顯虗妄四大體各離者質礙歸地潤濕歸水動轉歸風暖氣歸火四性不相順故既不相順誰為和合明知身是虗妄不顯心虗妄者有二義一謂身且是虗心復何依二謂六塵依於四大四大各離則六塵不現識又何所託乎如是二句頌前正住持義也如云彼之衆生幻身滅故幻心亦滅幻心滅故幻塵亦滅等即是漸次修行又云幻塵滅故幻滅亦滅幻滅滅故非幻不滅譬如磨鏡垢盡明現即是一切清淨頌妄盡還淨覺竟二頌隨順還圓覺隨順理事周遍二觀復還圓滿覺性酬普眼方便開悟之請長行中備悉周詳偈頌從略即下之一句也不動遍法界承上妄盡已還淨覺若更能隨順修習悟理融事知事同理則事事皆悉不動事事皆悉遍圓如長行同理清淨文云虗空如是平等不動當知覺性平等不動四大不動故當知覺性平等不動如是乃至八萬四千陀羅尼門平等不動當知覺性平等不動如是等文此中以不動二字頌之又如同理遍圓文云覺性遍滿清淨不動圓無際故當知六根遍滿法界根遍滿故當知六塵遍滿法界塵遍滿故當知四大遍滿法界如是乃至陀羅尼門遍滿法界如是等文此中以遍法界三字頌之餘略不頌長行已悉故總結頌妄盡還覺以酬請竟二頌修習成益以答問二一頌修習成益二頌應問結答初準畏行有二義一圓覺照世二龍所齊超此亦略具但超頌追頌不同無作止任滅亦無能證者至畢竟無來去首二句超頌能所齊超言現會新學末世初心當修習此心時已無作止任滅謂作中具止止中具作任中具滅滅中具任不相背而實相用故況復成就豈復更有故長行云其能證者無作無止無任無滅能證無執所證自然融通故長行云其所證者無得無失無取無捨然雖能證無執所證融通若能所不忘豈稱盡極故須無能無所今但云亦無能證者無所可例知故其次四句追頌圓覺照世圓覺普照寂滅無二故世界如空華三世悉平等去來生滅相畢竟了不可得故頌修習成益竟二頌應問結答約義略頌初發心菩薩及末世衆生欲求入佛道應如是修習初心菩薩指現會新學末世衆生指末世初心長行云彼諸菩薩蓋總指也準長行有六個如是無非修習之法故此中但言如是修習如是修習層次秩然長行云求如是法亦不迷悶是也普眼章竟三金剛藏章三一謝益重請二師資緣合三據難開通初四一衆中具儀二謝前承益三致難重請四至三顯殷初於是金剛藏菩薩在大衆中至長跪叉手而白佛言此中以剛藏為主具金剛智斷障除惑此章進斷微細深疑非此不能致問餘衆皆伴故云在大衆中二謝前承益大悲世尊善為一切至幻翳朗然慧目清淨承前述益求佛進開深難故稱大悲世尊善為者循循有序如文殊章標本起因地明淨覺隨順普賢章依如幻三昧頓悟淨覺普眼章明隨順修習由頓至圓三根普被層次秩然故以善為稱之諸菩薩衆且指現會即文殊等及所統菩薩類也圓覺即一真法界清淨即心真如門圓覺能總一切法真如能持無量義故通以大陀羅尼稱之依之修習則是因地法行由頓至圓則為漸次方便此等皆衆生不知故曰蒙昧如來已善為宣揚故曰開發此承前也在會法衆仍指現前菩薩承領受也慈誨者大慈深誨令得正信樂故於諸幻法妄生執取名為幻翳故佛前云猶如翳目見空中華至此則信知身心依正等法頓息執取故云幻翳朗然朗然者頓然除滅不見空華相故能所並銷故云慧目清淨慧目者依圓覺起真慧觀真猶如淨目清淨者信知真如為淨覺境界故佛前云圓照清淨覺相此述益也謝前承益竟三致難重請二一連致三難二重請開示初世尊若諸衆生本來成佛至何時復生一切煩惱前章云一切衆生本來成佛其意以彼修習淨圓覺心得成就者圓覺普照寂滅無二惟有佛性獨存恐不善會者謬解佛意興謗招𠎝故剛藏代致三難求佛開通非剛藏實有是難也三難者一云衆生本來成佛成佛自應無妄故難以何故復有無明此以真難妄不應復有也二云無明衆生本有本有則非佛故難以何緣復説成佛此以妄難真不應説成也三云異生本成佛道後起無明是真能生妄故難以如來證真何時復生煩惱此以本覺難妙覺還應不覺為衆生也如是三難初難顯自語相違以衆生本成是佛自語復有無明違自語故次難顯世間相違以無明本有世間共計復説本成違世間故三難顯不順正理總成非量以異生本成明是本覺實是不覺十方如來明是妙覺永不再迷故此致難也連致三難竟二重請開示惟願不捨無遮大慈至了義法門永斷疑悔願而言惟者顯求之親切謂無別所願惟求開祕密藏利現會衆及末世生耳不捨者顯求之決定謂祕密難開雖難開亦不捨故無遮大慈者權分橫竪以慈而云大者竪約現未兩利遮而云無者橫約淺初心深久修俱成亦可無遮即稱大慈大慈自然無遮通該橫竪不必權分祕密藏者即指三難中義若未難不説難復不説是欲祕之名為祕藏若因難而説説不顯了是欲密之名為密藏並以求開者為求當下即説仍復顯了説故二藏既開正信斯啓不惟通益現會兼復遐被末來故云及為末世一切衆生等也修多羅教者經藏之通名以此經是經藏攝故了義法門者當經之別目以此經是顯了説故疑悔能障正信既已永斷則正信成矣大疏云疑者於諸諦理猶豫為性能障信心善品為業別有三種一疑自謂疑己不能入理二疑師謂疑師不能善教三疑法謂疑所學法能出離不能出離今以三疑成難即疑法也私曰悔者以前所作懊怨為性障進為業別有二種一悔善謂於前所作善行生悔二悔不善謂於前所作不善生悔悔善則不善增進悔不善則善行增進今既興疑並斷明是悔不善以疑屬根本煩惱為不善法故致難重請竟四至三顯殷作是語已五體投地如是三請終而復始釋義準前總結謝益重請竟二師資緣合二一師與資合二資與師合初爾時世尊告金剛藏菩薩言至汝今諦聽當為汝説初讚其所問祕密兩開現未俱益故重言善哉以讚美之汝等乃能者獨許剛藏一類方能扣關擊節餘諸聲聞緣覺等皆不能作是問也如來甚深祕密者顯三難所陳是如來所證甚深之義有意祕而不説即説亦不欲顯了唯密意説必待剛藏致問者為是究竟成佛方便非剛藏不能問故至如來因問而説是剛藏等諸菩薩蒙佛最上教誨顯了之義廣大之乘非餘衆所堪聞故如是則剛藏致問如來因問而説能使十方修學及諸末世衆生有利根者了斯祕密之義成就大乘正見永無退轉故曰得決定信永斷疑悔誡聽許説正見其與資合也師與資合竟二資與師合時金剛藏菩薩奉教歡喜及諸大衆默然而聽奉教喜聽即是與師合也總結師資緣合竟三據難開通二一長行二偈頌初三一出由呵難二説喻開通三斥非正問初三一總出其由二明其可呵三正呵其惑初善男子一切世界始終生滅至種種取捨皆是輪回一切世界總指三世間法始終生滅別約正覺世間始謂隨緣示生終謂緣盡仍滅生滅謂中間變易前後有無別約有情世間前謂前有生相後謂後有歿相有無謂中間住異聚散起止別約器界世間聚謂聚塵成界散謂散界成塵起止謂中間成壞念念相續等謂中間則念念相續兩端則循環往復種種取捨者謂兩端則大取大捨中間則小取小捨是皆以六對為境取捨為心境既念念相續循環往復心亦復爾故云皆是輪回謂生滅六識心也既用此心必致佛呵如楞嚴顯呵非心之初阿難云如來現今徵心所在而我以心推窮尋逐即能推者我將為心佛言咄此非汝心乃至云此是前塵虗妄相想惑汝真性今此中剛藏備陳三難何異推窮尋逐但不執能推者為心而如來示以種種取捨皆是輪回令知備陳三難所用者猶是生滅心故是知下被佛呵非無謂也總出其由竟二明其可呵未出輪回而辨圓覺至舟行岸移亦復如是初法説未出輪回者仍用生滅心也用生滅心故欲辨明圓覺意指剛藏備陳三難如是則謾説不明縱明亦非以彼所明之圓覺性乃是依於圓覺從生滅識心變起虗妄名言非是真圓覺性故云即同流轉若依此而欲免輪回斷乎不能故云無有是處譬如下喻明動目者數動之目喻妄心分別湛水者不搖之水喻圓覺自性言湛水本不搖動因數動其目依於湛水虗妄現起搖動之相喻彼圓覺自性本非流轉由彼以生滅心依於圓覺變起虗妄名言以辨圓覺而圓覺性隨彼名言亦成流轉如彼動目能搖湛水無異又如定眼由回轉火者略疏云眼識遲鈍旋火成輪其意蓋是以眼識遲鈍看火不真而強瞪定其眼回旋久觀彼火本不轉由回旋久觀而火亦成轉此是喻明法中蓋是以根性愚鈍見理不真而強澄定識心發起虗妄名言反復辨論圓覺真理而彼圓覺本非流轉及與名言由彼妄以名言反復辨論而圓覺性亦隨名言而成流轉雲飛如駛因見月有運相月實不運因雲駛所顯而成運舟行似箭因見岸有移相岸實不移因舟行所顯而成移法中言未出輪回依妄心而辨圓覺依圓覺妄現名言圓覺本非名言因名言辨論所顯而圓覺亦成名言因喻知法故云亦復如是明其可呵竟三正呵其惑善男子諸旋未息至是故汝等便生三惑諸旋者目之動眼之定雲之駛舟之行未息者正動時正定時正駛時正行時也彼物先住者目正動而水先不搖眼正定而火先不轉雲正駛而月先不運舟正行而岸先不移尚不可得者應與感悖故此約目前事件為能況以顯下之無始心性為所況耳輪轉者顯是無始妄識出生入死起惑造業莫不依之故云生死垢心曾未清淨者正在輪轉如彼諸旋未息圓覺即無始真性觀此不旋復者離於流轉譬夫彼物先住此亦應與感悖彼既不得此何能爾故首置何況之言謂何能況顯令其相悖成於應感斷不能也是知未出輪回而辨圓覺縱辨亦非真實以是非真實見故汝等便生三惑如前云衆生本來成佛何故復有一切無明是惑以自語相違又前云衆生無明本有何故復説本來成佛是惑以世間相違又前云異生本成佛道後超無明如來成佛何時復起煩惱是惑以總成非量若果是真實知見此三種惑何由而生出由呵難竟二説喻開通三一泛以喻開二實以喻通三結示正見善男子譬如幻翳妄見空華至而為虗空平等本性初泛説幻翳喻幻翳者淨目生翳生不長生故名為幻此喻六識依八識虗妄變現翳既是幻見亦非真故名為妄此喻六識分別空華者空本無華由妄見而興蠅翼金星等相名之為華此喻分別所辨妄境幻翳若除者遇藥銷翳此喻遇佛聞法頓了識空不可説言者不可向翳銷者説言此翳已滅何時更起諸翳此喻世間無知不可向頓了識空者説言此識已滅何時更起諸識佛必泛説此喻者其意以煩惱依六識起我已識空汝等猶問如來何時復生煩惱此何異於問識復生然己惑之甚矣何以句徵謂以何以故不説空中華耶釋以翳華二法非相待故言非相待者顯二皆無體不是對待安立但言翳除華不言而可知法中識除亦爾亦如下因説空華喻空華者即蠅翼金星等喻衆生諸佛生死涅槃等及一切諸法滅於空時者淨眼無翳蠅翼金星等皆悉不見喻如來既了識空則生佛等一切法皆悉空故不可説言者不可向淨目無翳不見空華者言虗空何時更起空華喻世間無知不可向已達法空者説真空理中何時更起諸法佛又因説此喻者以翳銷識滅似惟顯於人空華除法泯兼又進於二空相因而説固其宜矣何以句徵謂以何以故不可説虗空時時更起華耶釋以空本無華非起滅故空本無華者淨眼不見喻如來已了識空不見有法故非起滅故者以既不見華孰為起滅喻如來於真空理中不見有少法生不見有少法滅焉生死下引説虗空喻於中有三義初承以法引謂承前先以法説引生下之空喻生死者衆生也涅槃者諸佛也同於起滅者同於空華起滅此以生死涅槃例明世出世間一切諸法皆同空華起滅執則成有不執成無耳妙覺者覺已證極圓照者照已無礙照無礙則識空法空喻中則離於華翳顯惟有虗空獨存據此則三難可通但泛爾未的也善男子正説空喻上既云離於華翳顯惟有空存此即以虗空為喻故教以當知非是暫有者不是因離華翳而暫有亦非暫無者亦不是因有華翳而暫無此中虗空喻真如淨覺即是成佛本體所謂佛性是也不因離華翳而暫有顯有華翳時即有法中即是作衆生時我法正熾即有佛性無妨説本來成佛復有無明此可泛開初難初難云本來成佛何故復有無明不因有華翳而暫無顯虗空固有權為華翳所覆法中即是佛性固有衆生為我法所覆無妨説無明本有本來成佛此可泛開二難二難云無明衆生本有何緣復説成佛況復下泛顯空性言空性尚不因華翳而為有無況復有超過虗空者則一切齊超説生佛尚不可得若更於生佛上興疑致難非愚即狂應不復與之言矣圓覺者圓滿覺性起性論中名為一心唯佛能證故稱如來圓覺隨順者以能隨順真如生滅二門成立虗空等一切法故以既能成立虗空則為虗空本性又既能成立一切法則為平等本性證得此性者則異生諸佛無明煩惱後起復生等皆為幻化普眼章云圓覺普照寂滅無二是也此可泛開三難三難云異生成佛道後起無明如來已成何時得生煩惱泛以喻開竟二實以喻通上文雖義具通難不甚分明如來不過泛然説喻令學者善會而自得之故科為泛以喻開此科則的指疑根據實説喻令學者斷除疑根根斷而諸難自通矣善男子如銷金礦金非銷有至如來圓覺亦復如是如銷金礦者如以爐火鎔銷蘊金之礦令成精金此喻諸修學人用佛法智斷除無明以顯圓覺妙性金非銷有者精金非因銷而有顯礦中原自有金此喻圓覺妙性非因研斷而得顯無明未斷時本來自有圓覺性故既已成金不重為礦者既已銷去礦滓成就精金再不復重為礦滓此喻斷無明惑畢彰圓覺妙性再不復重起無明經無窮時金性不壞者以任為瓶為環為叉為釧多歷年所而瓶環叉釧器器皆金此喻乘圓覺性涉世行化以任為菩薩為圓覺為聲聞為凡夫經劫度生而菩薩緣覺聲聞凡夫居然圓覺妙性不應説言本非成就者不應説此金體在礦時本非成就此喻論圓覺者不可説此圓覺性體在無明時本非具足此喻乃據實而説若據實通前難者如云金非銷有顯礦中原自有金喻衆生本來是佛不妨説有無明即通初難又云既已成金不重為礦喻斷無明惑畢彰圓覺妙性再不復重起無明即通三難至末云不應説言本非成就喻彼論圓覺者不應説此圓覺性體在無明時本非具足意顯在無明時本自具足所以雖説無明本有復無妨説本來成佛即通二難亦可前後兩難既通中間可以例思無煩更通若爾則不可説言等乃是的指疑根蓋由佛答普眼有衆生本來成佛之語遂致剛藏展轉而成三種疑難意是不許本成今云不可説言本非成就正教以斷除疑根而諸難自通由此不用別合但云如來圓覺亦復如是實以喻通竟三結示正見二一正以結示二況顯難思初善男子一切如來妙圓覺心至無妄輪回及非輪回上約在纏名如來圓覺謂是能成如來之因心此約出纏名一切如來妙圓覺心謂是已成如來之果體惟佛與佛乃能究盡故云一切如來顯除佛無能證也離煩惱礙稱之為妙顯無明已斷盡也體備衆德曰圓永不再迷曰覺此心即是絶待靈心故云本無菩提及與涅槃以菩提涅槃皆屬對待法故菩提屬對待者有成不成成則成佛不成則不成佛今以無菩提故成佛尚不可得況説不成故曰亦無成佛及不成佛如前云對幻説覺亦名為幻説無覺者亦復如是則成與不成皆不許也涅槃屬對待者有輪不輪有輪即生死無輪即涅槃今以無涅槃故説不輪尚不可得況説妄輪故曰無妄輪回及非輪回如前云生死涅槃同於起滅妙覺圓照離於華醫是有輪無輪皆不立也普賢章佛答普賢有云一切菩薩及末世衆生應當遠離一切幻化虗妄境界至此則菩提涅槃以併遠離所謂得無所離即除諸幻能如是觀者名為正見正以結示竟二況顯難思善男子但諸聲聞所圓境界至大寂滅海終不能至初示聲聞莫至恐承前疑云未出輪回而辨圓覺彼圓覺性即同流轉莫不成聲聞人已斷見思已出輪回想必能辨圓覺不致流轉耶故如來招呼善男子而示之曰但諸聲聞所圓境界與此大相遠也若釋其名者聞佛四諦聲教斷見思惑證生空理名為聲聞所圓境界者謂聲聞人所圓滿取證的境界此且虗標下乃實成蓋是以生空智將現前身心語言皆悉灰斷滅盡使不復生不復再來三界受生也此正是生空理所現無餘涅槃此既是涅槃云何又説終不能至彼之親證所現涅槃當知此之涅槃是方便非真如法華云化城非實也既到化城業過三百由旬前趣寶所亦可親到其奈頓止化城生安隱想不復前進二百由旬親至實所也如彼聲聞已證生空近於佛慧進求佛果亦可親證奈彼保守偏真沉空滯寂不復進斷塵沙無明至彼佛果親證所現無餘涅槃故云終不能至彼之親證等也此既終不能至而妙圓覺心説彼能辨無是事耳何況下況凡夫難思有法説有喻明法中承上言聲聞小聖已出輪回身心語言皆悉斷滅説彼能辨尚無是事何況凡夫劣於聲聞有作思惟劣於生空智分反欲測度超過小乘涅槃之如來圓覺境界斷乎不能故次即以喻形之螢火者螢蟲之火似火而非火喻有作思惟不過世智辨聰非是出世正慧既非是火取以燒物則是徒勞喻凡夫用思惟心希求人天福報終屬虗妄須彌居四洲之中燒此須待劫火螢火欲燒終無著理喻圓覺為四智之總證茲惟憑佛智有作思惟相去遠矣有志圓覺者應鑑斯喻以輪下顯致難無益佛意以我前所説種種取捨皆是輪回而剛藏雖非凡夫若據彼所難乃是以輪回心生輪回見入於如來大寂滅海不言圓覺而云大寂滅海者為避重文特約境界言之釋義則橫遍竪窮曰大寂無聲不可以言詮滅無形不可以相顯體備衆德用該萬有喻之於海渺無涯涘境界若此詎可以輪回心入故云終不能至所謂未出輪回而辨圓覺則圓覺性亦同流轉剛藏聞此宜自知所難之無益矣説喻開通竟二斥非正問是故我説一切菩薩至如是分別非為正問初承示常教斷識是故我説者承上而言謂以是用輪回心入寂滅海終不能至之故所以我於諸經之中常作如是説也一切菩薩及末世衆生通指發菩提心修大乘行者而言先斷者急先務故又知所先後則近道矣無始輪回根本即指六處識心一切經中皆令斷故如楞嚴云一切衆生從無始來生死相續皆由不知常住真心用諸妄想此想不真故有輪轉凡此者皆令斷之意也善男子因説展轉虗妄有作思惟者六識之用如眼見色而眼識即分別為何等色耳聽聲而耳識即分別為何等聲乃至意對法而意識即分別為何等法從有心起者如是有作思惟皆以有識心故乃能起作無休生死輪回無不由斯教令先斷不無謂也皆是句顯體用虗妄謂能起之心及所起思惟皆是於六塵境上現起虗妄之想併能緣之氣分然虗妄之想即是六處識心説名為體能緣氣分即是有作思惟説名為用非實心體者真實心體有二一純真即是真如如天上真月二帶妄即是八識如揑目現二雖揑目現二放手即真至六處識心則託塵似有離塵實無故曰非實心體體既非實用可知故故不另言已如空華者空本無華淨眼不見故喻上體用虗妄辨於佛境者佛境即是圓覺以是如來所證境故剛藏三難意皆為辨此境殊不知終不能辨故喻云猶如空華復結空果猶如空華者謂識心體用虗妄已竟猶如空華復結空果者謂仍以妄識致難辨於佛境豈不類於期空華結空果乎前云未出輪回而辨圓覺則圓覺性亦成輪回故云展轉妄想若必以此而欲明圓覺斷乎不可故云無有是處據楞嚴阿難以推窮尋逐者為心如來呵云此是前塵虗妄相想惑汝真性由汝無始至於今生認賊為子失汝元常故受輪轉其大意與此略同善男子結斥所問非正將欲結斥呼當機而告之曰善男子要知虗妄浮心多諸巧見虗妄浮心即指六處識心以是虗而不實妄而非真浮泛説名為心非尅體論也多諸巧見者種種思惟善巧辨析立知立見故雖立知立見總屬門外之繞欲證圓覺終不能至故曰不能成就圓覺方便末三句乃正以結斥佛意以汝今欲辨圓覺連致三難如是分別正類虗妄浮心多諸巧見故曰非為正問長行竟標頌云爾時世尊欲重宣此義而説頌言正頌分三一頌出由呵難二頌説喻開通三頌斥非正問初約義略頌金剛藏當知如來寂滅性至不能入佛海初頌總出其由以少文而攝多義恐其失意錯過故教以當知令其留神也如來寂滅性即指妙圓覺性寂無聲不可以言詮滅無形不可以相顯顯唯證乃知故未曾有終始者離於去來生滅等相由此所以種種取捨皆是輪回若以二句頌明其可呵佛意以既無終始汝今若以輪回之心而思惟之則圓覺性亦成流轉故云即旋復也既即旋復詎免輪回明其可呵正為此耳末二句頌正呵其惑長行乃承上況顯故曰何況輪回生死垢心曾未清淨此中是直言明示故曰但至輪回際正見其生死垢心曾未清淨長行云觀佛圓覺而不旋復是依況意顯其不能此中即直言不能入佛海佛海者即是如來妙圓覺海意顯果其能入自不生於三惑長行云是故汝等便生三惑承意顯不能而言此中直説不能故略之也頌出由呵難竟二頌説喻開通長行分三今略泛以喻開二一頌實以喻通二頌結示正見初譬如銷金礦非銷故有至不復重為礦長行云如銷金礦此中云譬如銷金礦長行云金非銷有此中云金非銷故有此二句全同長行但句增一字成五言耳雖復二句乃補頌防問恐承上問云金非銷故有顯礦中本自有金何用銷為故此防云雖復本來金終以銷成就此喻圓覺妙性雖本來自有奈為無明所障要必斷除無明乃能成就妙圓覺性一成二句亦全同長行餘不頌通難之義俱準長行可知頌實以喻通竟二頌結示正見長行分二偈惟頌第一生死與涅槃凡夫及諸佛同為空華相長行云一切如來妙圓覺心本無菩提及與涅槃亦無成佛及不成佛無妄輪回及非輪回總以妙圓覺性離於對待故長行以智斷佛生變常而曰本無及無等偈頌約生死涅槃凡夫諸佛而言同於空華相其義大同以同於空華即顯本無及無等耳不頌況顯難思準長行可知故頌説喻開通竟三頌斥非正問略常教斷識一段餘亦約義略頌思惟猶幻化何況詰虗妄若能了此心然後求圓覺思惟二句義頌展轉虗妄長行以有作思惟非實心體已如空華此中云思惟猶幻化幻化即空華義也長行云用此思惟辨於佛境猶如空華復結空果展轉妄想無有是處此中云何況以此請辨圓覺豈不至虗至妄有類夫期空華結空果哉若能二句義頌所問非正長行云虗妄浮心多諸巧見不能成就圓覺方便意顯斷了此心然後可求圓覺所問非正不待言而可知生信之義彌勒章初自見三問三答生信分竟
