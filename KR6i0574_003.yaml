body:
  text: 賢宗後學通理述嗣法門人心興較訂二兩問兩答開解分二一彌勒章二淨慧章初三一謝前請後二師資緣合三應求開示初二一具儀謝前二請後顯殷初二一衆中具儀二謝前成信初於是彌勒菩薩在大衆中至長跪叉手而白佛言此章以彌勒為主深究愛源蕩除細惑非補處不能問故餘衆皆伴故云在大衆中餘俱準前二謝前成信大悲世尊廣為菩薩至輪轉境界起循環見約法則廣為現前約益則遐被末世故稱大悲世尊法喻重重故云廣為菩薩者現前所為之機如金剛藏等皆是也圓覺覆於輪回非機不說縱說亦不顯了名祕密藏前因剛藏致難如來一一明示故云開也令諸大衆者且指現前菩薩深悟輪回者深悟種種取捨皆是輪回前云虗妄浮心多諸巧見如是分別非為正問等皆分別邪正意耳現前四依以此展轉流通故能施於末世末世衆生亦約發菩提心修圓覺者而言道眼者辨識修道之眼即正慧也此眼不明長畏誤修今蒙如來分別邪正辨識所修之道得正慧眼故無畏也涅槃斷果轉生死而成佛證無餘揀非小乘故名為大生決定信者於真空理深忍樂欲無退轉故一切有為諸法皆輪轉境界信既決定故無復重隨一切有作思惟皆循環見境既不隨故無復生起此彌勒謝前受益所以前章判為生信分也具儀謝前竟二請後顯殷二一請後希悟二至三顯殷初世尊若諸菩薩及末世衆生至圓悟如來無上知見初備陳所請若諸菩薩等舉所為之機大寂滅海前章即以圓覺境界釋之前云入此云遊者謂解行相成任運而入猶如遊也據前章云以輪回心生輪回見入於如來大寂滅海終不能至是故我說一切菩薩及末世衆生先斷無始輪回根本彌勒雖聞此語尚恐新學菩薩及末世衆生未能領略故爾代問其意以輪回根本據前章似的指六識但不知六識何尤故請問云何當斷按下世尊答處而云由有諸欲助發愛性能令生死相續又前章云有作思惟從有心起亦略示此義但未明明說出有作思惟中獨愛欲為尤勝此總陳所請也別陳中略具三義一曰於諸輪回有幾種性二曰修佛菩提幾等差別三曰回入塵勞當設幾種教化方便至後如來答處自見惟願下正請希悟惟願者顯願之專謂餘皆不願獨願此一件事也既接現前新學復濟末世衆生斷愛欲因出輪回苦名曰救世大悲不捨者殷殷繫念乾乾不息也令諸修行菩薩即拯接現前新學及於末世衆生即濟度末世初心不使貪愛自蔽故能慧目肅清慧目者正慧為目嚴肅不馳外境清淨無交內染用斯成觀自能照曜心鏡謂以正慧光為能照曜以心地鏡為所照曜即心地開通義也心地開通映現萬法故置鏡言宗鏡云以一心為宗照萬法如鏡即斯意耳自茲而無所不知無所不見故能圓悟如來無上知見請後希悟竟二至三顯殷作是語已五體投地如是三請終而復始請問之語說竟故云作是語已五體投地者說已再拜求佛必說亦常儀也如是三請者照前說照前禮必至三者顯殷勤故謝前請後竟二師資緣合二一師與資合二資與師合初爾時世尊告彌勒菩薩言至汝今諦聽當為汝說告彌勒者是請主故善哉者讚其所問之善也既能拯接時機又能遐濟末世故重言以讚之彌勒為首餘皆意隨故世尊以汝等稱之乃能者惟彌勒等乃能顯降斯已還皆不能故諸菩薩等顯所為之機請問等明所請之法大寂滅海惟佛能證故稱如來深奧衆生久隱情識佛亦常不開演故稱祕密一悟則輝天鑑地等佛知見故又以微妙稱之現會聞之欲愛不萌於心故云潔清慧目潔清與肅清其義同也傳之末世生死不羈於衆故云永斷輪回正慧分明照曜心鏡故云心悟實相實相即真空理也悟此理者於三界中不見有少法生滅故云具無生忍此皆世尊據彌勒所請之義而稱讚之次下即誡聽許說良有以也師與資合竟二資與師合時彌勒菩薩奉教歡喜及諸大衆默然而聽聞佛諦聽之誡欽此欽遵故曰奉教聞佛當說之許載欣載承故曰歡喜主伴重重同共攝心領受故曰及諸大衆默然而聽師資緣合竟三應求開示二一長行二偈頌初四一開示云何當斷輪回根本二開示於諸輪回有幾種性三開示修佛菩提幾等差別四開示回入塵勞幾種方便初三一略明二詳示三結成初善男子一切衆生從無始際至恩愛貪欲故有輪回從無始際者約晦昧真心已來說也晦味真心轉變妄想恩愛貪欲由茲繁興故以種種言之如恩有報上之恩有惠下之恩報上之恩如父母君長惠下之恩如子孫男女然有恩即有愛或愛父母君長或愛子孫男女愛父母君長貪財物而欲行忠孝愛子孫男女貪利祿而欲全育養凡此皆能牽連生死招致往復故曰由有種種恩愛貪欲故有輪回此愛欲為輪回之本其義已略明矣略明竟二詳示若諸世界一切種性至當知輪回愛為根本若猶如也乃舉法之詞言上雖略明語義含蓄恐衆不了今復明明詳示而云如諸世界此先舉依報也一切種性乃次舉正報謂一切種類自性楞嚴則有十二類生此則惟明卵胎濕化又楞嚴第四云卵唯想生胎因情有濕以合感化以離應卵唯想生者十二類生文云動顛倒故和合氣成飛沉亂想注云想心輕舉名動顛倒氣即雌雄相交陰陽氣分此亦虗妄由顛倒故執為真實與之和合遂成飛沉亂想飛則為鳥沉則為魚兼二則為龜蛇等胎因情有者十二類生文云欲顛倒故和合茲成橫竪亂想注云情生於愛名欲顛倒滋即父精母血交相滋潤此亦虗妄由顛倒故執為真實與之和合遂成橫竪亂想橫則為畜竪則為人兼二則為龍仙等濕以合感者類生文云趣顛倒故和合暖成翻覆亂想注云合即趣就名趣顛倒暖即濕物積集內發暖相此亦虗妄由顛倒故執為真實與之和合遂成翻覆亂想覆想則為含蠢其性無知故翻想則為蠕動其形不寧故化以離應者類生文云假顛倒故和合觸成新故亂想注云假新離舊名假顛倒觸即新境對舊境故說名為觸新境亦是虗妄由顛倒故執為真實與之和合遂成新故亂想故想欲脫則為轉蛻新想欲就則為飛行又楞嚴第四明八識投胎時於有緣父母處見明色發明見想成明色既見欲想已成異見成憎男見父則成憎女見母則成憎同想成愛男見母則成愛女見父則成愛流愛為種流愛染於父母則為愛生之種納想為胎納妄想於精血則為養形之胎是即為和合滋也其和合氣和合暖和合觸等例此可知如是則一切衆生凡有性體有形命者莫不以淫愛之因為正成故曰皆因淫欲而正性命當知者既已詳示驚覺令知也四生皆在輪回莫不以淫欲而為正成故曰愛為根本詳示竟三結成由有諸欲助發愛性是故能令生死相續必結成者恐有疑故或疑云愛不自生因色而起色盛則愛色衰則不愛愛既不常何能為輪回之本故示之以由有諸欲助發愛性諸欲者對前淫欲而言謂除前淫欲外或更有可欲之色可欲之聲可欲之香味觸等皆足以助發愛性是愛性常相續也以是之故能令生死相續謂其為輪回之本不亦宜乎開示云何當斷輪回根本竟二開示於諸輪回有幾種性三一顯愛相續二依輪分性三結斷應先初欲因愛生命因欲有至愛欲為因愛命為果承上所謂諸欲助發愛性能令生死相續者以愛性無有斷故如淫欲一事原因相愛而生不愛則不成欲故命不自立原因淫欲而有無欲則身尚不有命將安寄然衆生莫不愛命愛命即須保身是為還依欲本欲本即身以身為行欲之本故是知愛欲為將來受生之因愛命為將來成身之果此愛心所以不斷而生死所以常相續也顯愛相續竟二依輪分性三一惡種性二善種性三上善性初由於欲境起諸違順至是故復生地獄餓鬼上顯愛性相續即是於輪回中此辨有幾種性先明第一故云由於欲境欲境謂可行欲事之境即男以女為境女以男為境也起諸違順者有可意境有不可意境不可意則背我愛性名違可意則隨我愛性名順其次言境背愛心者且約違境言之或賦形失麗或決志不從或橫生間阻失麗則立時生憎不從則敗興懷瞋橫間則不遂銜怨故曰而生憎嫉由憎嫉故或毀其形體或壞其名聞或設計而妄生圖謀或依勢而責彼父兄甚至潛傷其命盜削其家株連彼之親族負纍伊之官長十善永絶十惡繁興故云造種種業上品惡業定生地獄下品惡業定生餓鬼中品畜生雖不言而可知大疏云地獄者梵語捺落迦此云苦器謂是盛貯受苦人之器故今云地獄者地下有獄拘繫罪人受種種苦為順此方刑獄之稱故譯云爾餓鬼者雜心云以從他求又常饑虗恐怯多畏故畜生者人之資具人所畜養之生故亦云傍生受畜與不受畜皆可名之以傍行故生而言復者對上輪回而言以上說輪回猶屬不定今造惡業於不定中復有定生惡道者焉不言順境造業者以因順成違乃造極重惡業為三途因徒順不足言矣惡種性竟二善種性知欲可厭愛厭業道捨惡樂善復現天人知欲可厭者或閲經教明言或聞師友開導知淫欲為惡道之因深生厭離設有厭離淫業之道便起心愛慕而欲行之由此捨因欲所造之惡業樂離欲防淫之善行轉十惡業成十善道上品則現生天上中品則現生人間下品修羅亦不言而可知大疏云人者涅槃云以多思故自分多思雜心云意寂靜故對餘顯寂能整心慮趣菩提故天者地持云所受自然此約思衣衣至思食食來名天俱舍云光潔自在此約身相光潔神用自在名天私謂修羅者名義集云梵語阿修羅此云非天福報似天位德非天故又云無端正有端正女無端正男故又此中天唯六欲人該四洲且約欲界言之文中曰愛曰樂仍不離愛性也善種性竟三上善性又知諸愛可厭惡故至便現有為增上善果天上人間皆由愛生人中八苦交煎天上五衰卒至故知諸愛甚可厭惡由此捨下界愛希上界定故云棄愛樂捨以上二界定皆以捨為主故如四禪天從粗向細漸次捨身四空天從粗向細漸次捨心還滋愛本者樂亦是愛謂愛修捨定還以滋生愛本愛本指上界身心謂修色界定時漸次捨下下粗心受上上細身修空界定時漸次捨下下粗心受上上細心然既有身心還能生愛故以愛本稱之便現者以修捨定為因即現有為善果雖修捨定未達輪空終屬有為不得解脫但校之下界果報漸次增上故云增上善果依輪分性竟三結斷當先皆輪回故不成聖道至假諸貪欲而入生死初正結假若生到非非想天報盡還來散入諸趣況其下者故云皆輪回故由此所以流轉六趣故云不成聖道謂常在生死也是故六趣衆生發心欲脫生死畢竟免諸輪回非斷欲斷愛不可故以先斷貪欲等而結示之蓋以斷貪欲則下界無因斷愛渴則上界絶分故愛而云渴者以愛心臨境如渴望水狀其切也善男下通妨恐彌勒防云菩薩涉世度生往往示有父母妻子其於欲愛何故呼善男子而預為通之言菩薩涉世度生必是變化示現不因父母所生故曰非愛為本所以示有妻子者但以大慈大悲憐愍愛欲衆生令彼捨愛假諸父母妻子示有貪欲而入世間生死世間易信生死易化四攝法中同事攝故妙嚴轉邪即其證耳開示於諸輪回有幾種性竟三開示修佛菩提幾等差別二一斷迷成悟二因修顯別初若諸末世一切衆生至於清淨心便得開悟佛意以若諸末世一切衆生實有欲愛非菩薩比說欲修佛菩提必要能捨諸欲及除憎愛除愛必兼憎者以是對待之法果其愛除憑何說憎是愛除則併憎亦除故無妨帶言所以必要捨欲除愛者略有二意一者修佛菩提期在永斷輪回二者修佛菩提期在勤求圓覺期在永斷輪回要須捨欲除愛此義易了無庸贅釋期在勤求圓覺亦須捨欲除愛令心清淨以圓覺境界能於清淨心求便得開悟蓋以不悟圓覺終滯有為不能修菩提也斷迷成悟竟二因修顯別二一總標二別明初善男子一切衆生由本貪欲至依二種障而現深淺一切衆生總指修菩提者差別未分故總以衆生名之大疏云但緣不了本覺目見定是衆生遂欲斷障求真厭凡愛聖蓋即指厭凡愛聖為本所貪愛也由此本所貪愛顯發揮揚欲斷無明是又以以斷障求真為本所樂欲也樂欲不同或初修未離凡位或入聖乘分大小或大小不定或誤入邪宗故曰顯出五性差別不等由前彌勒問云修佛菩提幾等差別此則答以五性差別而又言不等者謂凡聖大小等不得等齊故或問悟圓覺而修佛菩提應當平等何故復有五性差別故世尊以二障深淺釋之意顯理由頓悟事必漸修由漸修故依二種障而現深淺總標竟二別明二一別明二障二別明五性初云何二障一者理障礙正知見二者事障續諸生死云何句徵一者下釋也理障者唯識名所知障然所知非障執則成障致令知見不增故云礙正知見謂所知之障依主釋也事障者唯識名煩惱障能障真如起諸煩惱致令生死不斷故云續諸生死諸煩惱即障持業釋也二別明五性三一總徵二分釋三總結初云何五性二分釋五一凡夫性二聞緣性三菩薩性四不定性五闡提性初善男子若此二障未得斷滅名未成佛此約初發心人欲斷障而未得故云若此二障未得斷滅自具本覺名未成佛天台六即中理即佛也既不斷障不入五性之數淺深未分故二聞緣性聲聞緣覺二性合說故若諸衆生永捨貪欲至未能顯住菩薩境界若諸衆生仍指初發心人畏生死苦不能入纏垂手惟欲永捨貪欲如小乘初果則云不入色聲香味觸法況復二果三果等其本欲永捨貪欲可知先除事障者貪欲為煩惱之首煩惱斷則生死亦斷故先除之保守偏空正是理障不復進求故云未斷由此但悟人空離於分段生死證入聲聞緣覺法華云猶處門外止宿草庵是也縱聞自所住地近於佛慧終不自信故曰未能顯住菩薩境界法華云自念貧事我無此物是也此科攝五性之二一聲聞二緣覺因同屬小乘故合明之三菩薩性善男子若諸末世一切衆生至滿足菩提及大涅槃若諸末世者雖言末世遍指有大根人一切衆生者雖言一切獨取已發大心已發大心要求無上菩提故云欲泛如來大圓覺海泛謂浮木行也佛意以圓覺如海顯其容納分流而修習趣入即同浮波泛浪先當發願等正如來明示方軌令末世倣行願勤斷二障者大乘根性猛利願樂精勤煩惱障所知障同伏同斷不似二乘根器狹劣但念空無相無作先斷事障急於脫離分段出三界以自避耳二障已伏者歷三賢位現種習次第分伏如石壓草石不動而草不起名為已伏謂已能治伏也既能治伏進成見道故云悟入菩薩境界菩薩境界約初地說以初地名見道位故從初地至十地漸次斷滅理事二障進入等覺名為已永斷滅謂現種習盡如金出礦故云即入如來微妙圓覺謂進證佛位以佛位稱妙覺故自是轉煩惱成菩提轉生死成涅槃菩薩之名此前已盡故特言滿足顯此前未滿足故四不定性善男子一切衆生皆證圓覺至根無大小皆成佛果一切衆生皆證圓覺者通指初發心人欲斷障而未能故渾言衆生以乘性尚未定故具圓覺而未修故定許皆證謂皆可修證也逢善知識者初心必經師友依彼所作者新學宜倣舊行因地法行者知識若是聲聞以四諦為因地法行知識若是緣覺以十二因緣為因地法行知識若是菩薩以六度四等為因地法行爾時修習者依彼所作修習以知識有頓有漸隨其所教故修習便有頓漸或以聲聞入頓或以緣覺入頓或以菩薩入頓然既入頓教皆當作佛非不定性又或以聲聞入漸或以緣覺入漸或以菩薩入漸然既入漸教菩薩成佛聲聞緣覺合為一不定性回心者成不回心者不得成故若更求最勝善友得遇如來無上菩提正修行路因該果海一證一切證名無上菩提果徹因源一修一切修名正修行路根無大小者圓融無礙故皆成佛果者同具圓覺性故上云一切衆生皆證圓覺者以此據尋常所說不定性者但約小乘聞緣有定性者有不定性者定性者不許成佛不定性者半成半不成是故通論五性有一分半衆生成佛謂菩薩及不定中半分三分半衆生不成謂定性聞緣無性闡提及不定中半分今觀此經似與彼異良以圓覺妙性人人本具皆當成佛故曰一切衆生皆證圓覺其如親近知識隨彼所作便有頓漸之殊頓則俱成漸則有成不成似即以成佛與不成佛為不定性若更遇最勝知識仍當俱成據此則成與不成原無定相全憑師友為緣親之近之誠不可以不慎也五闡提性若諸衆生雖求善友至邪師過謬非衆生咎若諸衆生仍指初發心人發心為求菩提必求善友引導不意雖求善友而善友不遇偏是遇邪見者邪見謂知見不正如時散外道方論師口力論師乃至安茶論師計九物能生世間奉時奉方等起諸邪悟故云未得正悟據此則聲聞緣覺等雖大小有異仍為正悟以是佛道種性堪成佛故此非彼比故曰是則名為外道種性外道者心遊道外種性者定成不移由此障佛種性不得成佛故教中稱為無性闡提以其無佛種性為斷善根人故邪師過謬者如此方邪教等以利惑人受其惑則喪心失志故曰非衆生咎初心人當善避之分釋竟三總結是名衆生五性差別最初發心本為求佛菩提稟背緣違竟致五性攸分毫釐之乖天地之謬真似不可不辨邪正不可不審彌勒致問良有以也開示修佛菩提幾等差別竟四開示回入塵勞幾種方便二一應問開示二為機勸修初善男子菩薩唯以大悲方便至皆依無始清淨願力准前彌勒問云回入塵勞當設幾種教化方便世尊為應此問呼善男子而告之曰菩薩行滿回入塵勞唯以大悲為主違大悲不能入塵勞故略起三種方便微方便不能化衆生故三種方便者一入世開發入諸世間者入情世間度諸凡夫及與外道入正覺世間度諸菩薩及與二乘入器世間則普度一切含情抱識開發未悟者令得正悟及與真悟不被邪悟似悟之所惑故二示形同事示形者示現種種形相如觀音三十二應等現正信男女與出家二衆依戒定慧修諸正行名順境界現外道邪魔與比丘六羣依貪瞋癡作諸非法名逆境界與其同事者逆則同逆順則同順密攝其心易信從故三化必究竟化令成佛者教化衆生令成佛果所謂如一衆生未成佛終不於此取泥洹也依者不背之義無始者遙指多劫初發菩提心時不得初相故云無始發菩提心不為自求人天福報等唯依最上乘發心故以清淨稱之願與法界衆生一時同得阿耨菩提故又以願力稱之此是無始所發清淨願力設化不究竟則斯願背矣今云化令成佛故云皆依謂所發之願皆不背故應問開示竟二為機勸修若諸末世一切衆生至證大圓覺妙莊嚴域現在菩薩行滿回入塵勞當在末世今勸末世衆生發心應當遵依故云若諸末世一切衆生此標所為之機於大圓覺起增上心者教以遵依菩薩發菩提心故良由菩薩入諸世間開發未悟信知自具大圓覺性依此起增進念上求佛果即是菩提心也起增上心全憑願力攝持故又勸以當學菩薩發起菩薩清淨大願清淨大願云何而發故云應作是言是言即所願之語也願住佛圓覺者是不為自求福報唯依最上乘發意明其願之大故願求善知識者假彼正知正見開示無上菩提正修行路設遇外道多誤入闡提遇二乘多滯溺小果故皆以莫值為願依願修行者且以自利為急漸斷諸障者先伏後斷若二障已伏則能悟入菩薩境界由三賢而入初地若事理障已永斷滅則障盡願滿由十地而至等覺位也升進曰登等覺進證佛果不隔餘位故云便登解脫清淨法殿即指常寂光土二死不能繫縛故曰解脫五住不能染污故曰清淨性身所依正大光明故以法殿稱之親臨曰證法身現起受用不隔餘身如親臨故大圓覺妙莊嚴域即是自受用土依大圓覺性現微妙莊嚴為自受用身之所受用故名為域域者疆域猶境界也應求開示中長行竟二偈頌標頌云爾時世尊欲重宣此義而說偈言二正頌長行有四偈頌少第二餘亦從略分三一頌開示云何當斷輪回根本二頌開示修佛菩提幾等差別三頌開示回入塵勞幾種方便初彌勒汝當知一切諸衆生至皆得成佛道初五句正頌輪回根本二死永亡名大解脫貪欲為輪回根本由不斷故墮落生死所以不得解脫久在輪回此其所以當斷者已可見矣後四句翻頌輪回種性前文云輪回中有惡性善性上善性三種差別者皆因不斷貪瞋憎愛等輪回根本也設若於此發勇猛心立決定志修戒定慧永斷憎愛及與貪瞋即可以不因此而受差別種性之報當下即出離輪回而成無上菩提故云不因差別性皆得成佛道此是翻前文而頌也順上文義合明此科頌開示云何當斷輪回根本竟二頌開示修佛菩提幾等差別偈中單頌菩薩不頌前後差別科依長行故二障永銷滅求師得正悟隨順菩薩願依止大涅槃長行云欲泛如來大圓覺海先當發願勤斷二障乃至云若事理障已永斷滅即入如來妙圓覺海滿足菩提及大涅槃此約義略頌也三頌開示回入塵勞幾種方便長行有二偈略不分二義隨講指授十方諸菩薩皆以大悲願至便歸大圓覺初頌應問開示十方菩薩指因緣果滿回入塵勞者言准長行回入塵勞唯以大悲為主現起三種方便一入世開發二示形同事三化必究竟末云皆依無始清淨願力是三種方便皆以願力攝持故此中唯言願入生死乃約義略頌也現在下頌為機勸修現在修行末世衆生皆指新學初心新學初心應遵十方菩薩發願度生勤斷事理二障不墮愛見之悲障盡願滿歸大圓覺長行云便登解脫清淨法殿證大圓覺妙莊嚴域是也彌勒章竟二淨慧章三一謝前請後二師資緣合三應求開示初二一具儀謝前二請後顯殷初二一衆中具儀二謝前成益初於是清淨慧菩薩在大衆中至長跪叉手而白佛言此中以清淨慧為主圓覺妙性隨順成差非具清淨智慧者既不能問復不能領故餘衆皆伴故云在大衆中餘可知二謝前成益大悲世尊為我等輩至身心泰然得大饒益大悲世尊准上可知廣說者重重分析循循善誘之義六道何以輪回五性所由淺深皆屬不思議事本所不見者從前未見廣說本所不聞者從前未聞詳示今則既見廣說又聞詳示故云我等今者蒙佛善誘善誘者誘引有序如說恩愛貪欲漸致六道輪回發揮無明顯出五性差別皆善誘意也又聞菩薩回入塵勞唯依大悲為主現起三種方便末世依之便得證覺不禁圓解內發輕安外形故曰身心泰然得大饒益具儀謝前竟二請後顯殷二一請後增益二至三顯殷初願為諸來一切法衆至隨順開悟漸次能入諸來法衆指現前法會大衆非一方來故云諸來各及眷屬主伴重重故云一切或為請法或為聽法故皆以法衆稱之或求增益或希重宣顯前章如來已說會衆已各受益此又為末世衆生請也良以如來在世三業殊勝諸來法衆五根通利所以法雷既震聵耳全聲至於末世恐未能爾故再問從生至佛所證所得云何差別一切衆生者初從凡位起問天台四教頌云別信并圓五品位見思初伏在凡居謂別教十信圓教五品初伏見思煩惱猶在外凡位也賢首五教頌云細種猶待圓頓終十信十住十行伏謂二障粗種已伏已斷至二障細種猶待圓教十信頓教十住終教十行方能盡伏而斷猶未能故仍以衆生目之及諸菩薩者約斷種則圓當十住頓當十行終當十向約斷習一分則圓教初行頓教初向終教初地約斷習十一分則圓教初向頓教初地終教等覺約斷習二十分盡則圓教十向頓教十地不言終教者以斷習十一分則終教已至等覺後無菩薩位故約斷習二十一分則圓教初地與頓教等覺此後頓教亦無菩薩之名若斷習三十一分則是圓教等覺此後圓教亦無菩薩之名如來世尊者後約極聖結問約終教則斷習十二分為終教妙覺約頓教則斷習二十二分為頓教妙覺約圓教則斷習三十二分盡為圓教妙覺稱為如來者終教則依言真如出障名來頓教則離言真如出障名來圓教則依離無礙真如出障名來稱為世尊者於當教三世間中獨為尊故又此中伏斷唯約圓頓終三教說者以此經正屬頓教兼攝終教義多直通乎圓餘雖不攝義但少分故不詳明伏斷所證者伏斷所證之理即指覺性所得者隨理所得之位即指衆生菩薩如來云何差別者云何而有深淺差別此問能被之教末世衆生五根暗鈍不見如來三業殊勝誠屬可愍正是所為故云令也聞此聖教者時至機熟轉從四依邊聞隨順開悟漸次能入者謂隨順聖教開悟所證之理庶幾漸次伏斷隨順覺性而入所證及所得矣請後增益竟二至三顯殷作是語已五體投地如是三請終而復始釋義准前可知謝前請後竟二師資緣合二一師與資合二資與師合初爾時世尊告清淨慧菩薩言至汝今諦聽當為汝說告清淨慧者是請主故既問所證之理令其隨順開悟復問所得之位令其漸次能入故重言善哉以讚美之問雖淨慧為主意實體合衆懷故云汝等顯衆亦欲問也微此不能故以乃能讚之斷障所證之理隨理所得之位各有漸次不假淨慧之問末世衆生何由悟入因即誡聽許說是師緣與資合矣二資與師合時清淨慧菩薩奉教歡喜及諸大衆默然而聽憐愍末世衆生希教情急既聞誡聽許說喜奉默承又資緣與師合矣師資緣合竟三應求開示二一長行二偈頌初二一開示圓滿覺性二開示隨順成別初三一本來平等二迷倒成差三究竟平等初善男子圓覺自性非性性有至性自平等無平等者准前淨慧請云願為諸來一切法衆重宣法王圓滿覺性為應茲求呼善男子而告之曰圓覺自性非性性有等謂圓覺自性本非差別之性今性有差別者皆由圓覺不守自性而隨緣現起差別諸性也諸性即是衆生菩薩既是隨緣現起差別性即圓覺性誰為能取所取誰為能證所證故曰無取無證雖曰無取無證而現有衆生為能取現有菩薩為能證故遮云於實相清淨理中實無菩薩及諸衆生次徵起何以故實無釋云菩薩衆生皆是幻化故既同幻化當體寂滅誰為能取誰為能證故云無取證者蓋以幻化滅故菩薩衆生同歸圓覺若更說有取證之人則是以圓覺而取證圓覺豈有此理如其不明更助以喻即譬如眼根不自見眼夫如是則圓覺自性本來平等又誰能使之平等故云無平等者本來平等竟二迷倒成差衆生迷倒未能除滅至妄功用中便顯差別上科衆生指已發心知伏惑者此之衆生兼未發心不知伏惑者言即天台所謂內外凡也全未發心曰迷雖已發心不知惑空加功欲伏曰倒縱使已伏不過如石壓草均為未能除滅上云菩薩衆生皆是幻化此云一切幻化者不惟菩薩衆生兼一切因果而總言之猶偏取於因以惑滅而一切皆滅故於滅未滅者滅則漸次斷滅未滅則漸次治伏不達本空均為妄加功用於此妄功用中便顯有菩薩衆生之分故云差別迷倒成差竟三究竟平等若得如來寂滅隨順實無寂滅及寂滅者若得二障永盡一性圓明即是如來寂滅寂滅者是法平等無有高下所謂法王圓滿覺性是也自是智與理冥更無智外理為智所證亦無理外智能證於理隨順圓覺絶諸對待上云自性平等無平等者此云實無寂滅及寂滅者亂雖有異而義無殊也開示圓滿覺性竟二開示隨順成別二一次第隨順二頓圓隨順初四一凡夫隨順覺性二地前隨順覺性三入地隨順覺性四如來隨順覺性初善男子一切衆生從無始來至此名凡夫隨順覺性初由妄成迷一切衆生者先從博地凡夫說起從無始來者自從無始晦昧真心展轉而有虗妄身心已來也由妄想我等謂由於妄心起諸妄想內執五蘊身中有我外執五蘊身外有可愛於我者所謂執我我所是也曾不自知者謂一向曾不自己覺知念念生滅者謂我及我所俱屬念念生滅虗妄不實由不知故背情則故起憎嫉順情則故起愛染憎嫉者見欲則銷愛染者逢欲益甚故云耽著耽著者深心貪染意也五欲者美色麗聲名香厚味及細滑之觸皆可欲之境故若遇下遇教得悟善根內熏不期而逢曰遇善友者具正知正見能勸善於人如華嚴之五十三人法華之淨藏淨眼等皆是也憐其久迷自性因貪欲而造業故教令開悟淨圓覺性果其開悟自能發起無分別智明照見我及我所念念起滅即知現前衆生皆是於圓覺性中自勞自慮而圓覺無與也若復下緣悟成礙若復有人者謂若於開悟衆生中復有能伏惑之人顯非盡能伏也勞慮永斷者知圓覺無與於勞慮誓期必證發心永斷也雖發心永斷而初用制伏故云得法界淨謂於事法界中不更勞慮住清淨解故上雖開悟若更生勞慮則淨解不能住故即彼淨解為自障礙者謂若執彼淨解為是不更求斷即彼為自障礙謂障礙圓覺不能任運證入故曰於圓覺而不自在天台四教頌云別信併圓五品位見思初伏在凡居雖在凡居尚不逆於圓覺故曰是名凡夫隨順覺性若依本宗則是雙伏二障圓教位當十信頓教位當十住終教位當十行由未能斷障故此經仍以衆生稱之凡夫隨順覺性竟二地前隨順覺性圓教初住起頓教初行起終教初向起善男子一切菩薩見解為礙至未入地者隨順覺性一切菩薩者前除凡位後除入地謂圓初住頓初行終初向等見解為礙者謂見彼淨解為自障礙而欲斷之謂從初住起一位一位斷也雖斷解礙猶住見覺者謂能見淨解為礙者即是隨分覺性今雖斷於解礙而猶住著見淨解為礙之覺性執以為是不復進求故云猶住見覺然既住此覺不復進求則此覺亦礙故云覺礙而又云為礙者以其為圓覺之礙故而不自在者不能任運趣入圓覺性也此名菩薩者對後顯勝上求之心趣凡位故名未入地者對後顯劣下化之功不及聖位故然既已超凡雖不及聖尚不至逆於圓覺故云隨順覺性地前隨順覺性竟三入地隨順覺性善男子有照有覺俱名障礙至已入地者隨順覺性初承前正明如前云見解為礙即是有照以非照莫見故又前云猶住見覺即是有覺以非覺莫住故俱名障礙者謂所照之礙固是障礙能照之覺亦名障礙以住著則障礙圓覺性故是故菩薩常覺不住者謂以是有照有覺俱名障礙之故所以入地菩薩歷位常覺不成障礙以不生住著心故正以不生住著則所照之礙與能照之覺者同時寂滅皆不離圓覺性故此義難明要以喻顯故曰譬如有人有人謂期死之人自斷其首者謂期死之人起心斷首而死以刀自斷其首首未斷時則首為所斷人為能斷至首已斷故則所斷之頭非己能斷之人亦亡故云無能斷者此喻照與照者同時寂滅義亦可了若更以法合者則是入地菩薩以滅礙之心自滅諸礙礙未滅時則礙為所滅覺為能滅至礙已斷滅則所滅之礙既空能滅之覺亦盡皆不離圓覺性故上所云照與照者同時寂滅即斯意耳修多下慮後防問慮後有人問云地前與地中雖位分淺深均屬依教修習何故地前歷位成執地中常覺不住莫是世尊施教地前則聽其自便地中乃私與解銷若爾則背無緣慈豈世尊施教之所應耶故世尊以此防云修多羅教如標月指等修多羅教通指佛說一切經也如標月指者楞嚴云如人以手指月示人以手指月則手指即標月之指彼經蓋是以指喻教以月喻心意顯如來說教原為示心標月之指即喻示心之教若復見月者如彼經次云是人因指當應看月喻學者借教應當觀心了知所標畢竟非月者如彼經其次又云若復觀指以為月體豈惟亡月亦亡其指意顯不應執指喻學者看教即謂明心豈惟不知心亦復不知教意顯不應執教今此經能喻雖同楞嚴所喻與彼稍異蓋如來於地前地中立位顯覺皆為修多羅教即同能標之指然立位顯覺原為破障成慧即同所標之月故云修多羅教如標月指果其破障成慧立位顯覺亦不應住故云若復見月了知所標畢竟非月然所標二字稍晦若言所有能標之指則通暢矣豈惟如來一佛所說不應住著諸佛皆然故云十方如來乃至亦復如是是知地前地中智分劣勝智劣則歷位成執幸能自照智勝則常覺不住非佛有私勿得故作是問恐招謗佛之愆防問已竟仍歸正結故云此名菩薩乃至隨順覺性入地隨順覺性竟四如來隨順覺性善男子一切障礙即究竟覺至此名如來隨順覺性初先明所證之境地前滅礙立覺覺即成礙入地常覺不住若實有不住亦名為礙謂能障如來大圓滿覺無礙性故今明至如來位則一切障礙即究竟覺一切障礙者地前礙之與覺地中常覺不住雖粗細有異通名為礙故以一切目之即究竟覺者謂同歸如來大圓滿覺無礙性故又此之二句名為總標以地前滅礙立覺地中常覺不住雖通名為礙亦不過言其大略所攝諸礙其中尚多此下一一為之融會如憶念斷礙憶念立覺能斷能立則為得念斷不能斷立不能立則為失念得則為得所縛失則為失所繫俱不解脫今知對失立得得非真得因得顯失失非真失二俱不成同歸圓覺以二皆圓覺起故不言圓覺而云解脫者以圓覺即是離繫縛法故又如依教修習精進即是成法懈怠即是破法對破立成成非真成因成顯破破非真破二俱成非同歸圓覺而云涅槃者以圓覺即是不生不滅法故又如能照諸礙即是智慧不能照礙即是愚癡對愚立智智非真智因智顯愚愚非真愚二俱成非同歸圓覺而云般若者以圓覺即是大智慧光明義故又如觀同行者呼為菩薩所成就法即是正道觀異學者呼為外道所成就法即是邪道對邪立正正非真正因正顯邪邪非真邪二俱成非同歸圓覺而云菩提者以圓覺即是阿耨菩提法故又如地中位位所斷妄惑名為無明位位所證實理名為真如然無明依真而起妄固非妄真如對妄而現真亦非真二俱不立同歸圓覺故云無異境界以圓覺即是諸法無差別性故又如菩薩示現順行即便修戒定慧示現逆行即便作淫怒癡然既屬示現同依圓覺故云俱是梵行以圓覺即是一切佛菩薩清淨因故又如菩薩說法所度名為衆生集行所嚴名為國土然種種幻化皆生如來圓覺妙心幻化不實實即圓覺故云同一法性以圓覺即是依正二報諸法真實性故又如菩薩教化造惡衆生即入地獄教化修善衆生即入天堂天堂不以為樂地獄不以為苦惟依圓滿覺性清淨自如故云皆為淨土以圓覺即是常寂光淨土故又如菩薩教化不定二乘及與菩薩名為有性謂有成佛性故教化定性二乘及與闡提名為無性謂其無佛性故然一切衆生莫不有心凡有圓覺心者遠近定當作佛故云皆成佛道以圓覺即是一切如來本起因地法故然此已上九對前四似約地前後五似約登地未到佛地皆名煩惱以是有對待法謂有對即有諍因諍故成惱今約佛地融會同歸圓覺故云一切煩惱畢竟解脫以圓覺即是大解脫法絶諸對待一切煩惱畢竟不再生故法界下次明能證之智言佛地所以能融諸對待而歸於圓覺性者以其有法界智故法界即一真法界佛地證之依此而起智慧猶如大海無量無邊故云法界海慧照了諸相者諸相即凡夫相地前相入地相也照了者照其起自圓覺了其相無有實相無有實仍還圓覺故云猶如虗空楞嚴云譬如虗空體非羣相而不拒彼諸相發揮依今經則圓覺妙性亦復如是此名下後結隨順圓覺此名如來者顯能隨順者非前人故隨順覺性者謂如來從初發心由凡夫至地前入地漸次隨順究極而證於圓滿覺性為妙覺地也漸次隨順竟二頓圓隨順二一明隨順相二讚隨順人初善男子但諸菩薩至是則名為隨順覺性如上漸次隨順失照顧則任運成礙修之誠為不易若果有頓圓之機則不必也故重呼善男子而告之曰但諸現前菩薩及末世衆生有頓根或圓根者只須居一切時不起妄念居一切時者謂於晝夜循環往復應酬及一切見色聞聲等時也不起妄念者一念不生即如如佛名頓隨順但妄念屬用妄心屬體欲得妄念不生須併妄心亦滅若爾則是妄上重加於妄故曰於諸妄心亦不息滅或曰既不息滅設有妄境現前如何抵敵故曰住妄想境不加了知謂只管住於妄想境中但不加了別及與知識則已耳又不加了知則妄境即是真境設更於中辨別計以為真別妄真同二妄矣故云於無了知不辨真實謂於無了知境亦不分析辨別計為真實然上云住妄想境是事法界不加了知則事不礙於理也此云於無了知是理法界不辨真實則理不礙於事也理事無礙名圓隨順謂從此隨順修習可到事事無礙圓滿佛境界故彼諸衆生獨約末世言之以現前菩薩根性猛利又親見如來三業殊勝聞是頓圓隨順法門信解受持不足為難故不言也信謂信是佛說正教解謂解其頓圓真理受謂受以自修持謂持以教人末世衆生不惟不能如此而且多生驚畏故獨言之謂末世衆生聞此法門設能信解受持不生驚畏者是則名為隨順覺性文中言驚畏者驚其非是佛說即是不信義涉荒唐即是不解畏其不應自修即是不受及與教人即是不持隨順覺性者由頓而至圓由淺圓而至究竟圓滿無少違戾故明隨順相竟二讚隨順人善男子汝等當知如是衆生至名為成就一切種智頓圓隨順覺性非末世所堪能恐生疑謗故教以當知謂當知其所以能隨順者有由來矣已曾供養等極顯其供佛之多所謂不於一佛二佛三四五佛而種善根也及大菩薩者供其主及其伴故植衆德本者供佛必聞法福慧雙圓已植萬德之本以佛果萬德惟以福慧為種而得種植故佛說者顯其不虗然因既該於果海果即徹於因源故曰名為成就一切種智一切種智即是佛智能生佛地一切智慧故以種智為名是知衆生雖在末世但能頓圓隨順覺性必至成佛無疑長行竟二偈頌標頌云爾時世尊欲重宣此義而說偈言正頌分二一頌開示圓滿覺性二頌開示隨順成別初准長行分三一本來平等二迷倒成差三究竟平等今不頌後一惟頌前二且略屬略頌攝清淨慧當知圓滿菩提性至漸次有差別前四句頌本來平等長行云圓覺自性偈頌云圓滿菩提性謂圓覺自性依之修習可以圓滿菩提謂圓滿菩提之性即圓覺自性也無取亦無證者性自有故長行云非性性有是也菩薩為能證人衆生為能取人所取所證既無能取能證何有故并以無稱同幻化故後二句頌迷倒成差義頌而略長行云於滅未滅妄功用中便顯差別偈頌云覺與未覺時漸次有差別蓋長行以一切幻化皆生如來圓覺妙心滅得一分幻化顯得一分覺性故曰於滅未滅妄功用中約所滅之幻為言偈頌云覺與未覺時約所顯之覺為言蓋幻滅即是覺時幻未滅即未覺時長行云便顯差別偈頌曰漸次有差別皆約兩楹而言長行有究竟平等一段仍結居圓滿覺性偈頌無究竟平等而漸次有差別句直是標下但科依長行定故無庸改立頌開示圓滿覺性竟二頌開示隨順成別二一頌次第隨順二頌頓圓隨順初衆生為解礙菩薩未離覺至名為遍隨順首句頌凡夫隨順覺性衆生伏惑得法界境名為凡位為解礙者長行云即彼淨解為自障礙於圓覺而不自在雖不自在尚不至於背逆故名隨順次句頌地前隨順覺性菩薩即地前菩薩約圓教該住行向也未離覺者長行云雖斷解礙猶住見覺礙圓覺而不自在雖不自在猶不至於背逆仍名隨順入地二句頌地中隨順覺性入地者即指登地菩薩永寂滅者上二位有照有覺俱名障礙入地中則照與照者同時寂滅不住一切相者長行云礙已斷滅無滅礙者謂障覺相俱不可得故此雖隨順少缺於圓謂一於不可得耳大覺二句頌如來隨順覺性大覺即是如來悉圓滿者長行云一切障礙即究竟覺乃至云一切煩惱畢竟解脫所謂不可得中恁麼得也名為遍隨順者長行云法界海慧照了諸相猶如虗空虗空體非羣相不拒諸相發揮故云遍也頌次第隨順竟二頌頓圓隨順末世諸衆生心不生虗妄至皆名隨順智初二句頌明隨順相長行先言菩薩偈頌從略獨以末世衆生唯急故心不生虗妄者不惟起妄念為虗妄而滅妄心加了知辨真實有意欲樂一一皆為虗妄同幻化故如是則不生虗妄一句乃併彼不起妄念不滅妄心等四義皆該攝矣頓圓隨順如長行說佛說下頌讚隨順人佛說者顯是真實語故如是人指末世衆生轉從四依邊聞設能不生驚畏許其現生即是菩薩供養句出其所以長行云百千萬億恆沙偈從略故但言供佛不言及菩薩者可例知故長行云植衆德本且就因說偈頌云功德圓滿者因該果海以功德圓滿即能成就一切種智故雖有多方便者許其不欲速成皆名隨順智者許其為度衆生隨順一切種智施權智也總結前來兩問兩答開解分竟上卷終下卷始三四問四答教修分四一威德章二辨音章三淨業章四普覺章初三一謝前請後二師資緣合三應求開示初二一具儀謝前二請後顯殷初二一衆中具儀二謝前成益初於是威德自在菩薩至長跪義手而白佛言此章以威德自在為主曩修三觀已得三種輕安度生嚴土威德自在故餘衆皆伴故云在大衆中二謝前成益大悲世尊廣為我等至不因修習而得善利憐及末世衆生希成遐益故稱大悲世尊且就現前大衆統冀傳芳故云廣為我等分別者微細開示隨順覺性者次第隨順頓圓隨順俱如前說令諸菩薩者即指現前法會覺心光明者聞次第則隨分識礙顯覺聞頓圓則句下承當領荷承領也佛音稱圓者一音具異謂佛以一音演說法衆生隨類各得解故不因修習而得善利者言前薦取識得自心即是圓覺不依觀行而得發明如斯善利實未曾有故前此稱成解分焉具儀謝前竟二請後顯殷二一請後方便二至三顯殷初世尊譬如大城外有四門至遊戲如來大寂滅海初喻說大城王都也王所依故用此喻圓覺妙心清淨法身之所依故外有四門者從外來入王都者東西南北各有其門用此喻四法界謂諸菩薩欲證圓覺或依事法界修或依理法界修或依理事無礙法界修或依事事無礙法界修皆可入故隨方來者非止一路謂隨彼四方所來之人非止一條路徑用此喻諸菩薩欲證圓覺依四法界修隨彼根性其發覺初修乃有多種方便如楞嚴所謂方便有多門也一切下法合一切菩薩者謂欲證圓覺之人此合隨方來者莊嚴佛國及成菩提總以教化衆生為本言菩薩依四法界教化衆生一為莊嚴佛國二為成就菩提但隨其根性樂欲發覺初修方便乃有多門故云非一方便此合非止一路唯願下正請欲知山上路須問過來人故云唯願世尊以世尊乃過來人故近接現前法會遐濟末世衆生故云廣為我等宣說一切方便者以所為既廣根性樂欲自應不齊隨其發覺初修應用何等方便漸次增進并諸能修行人總有幾種求佛一一宣說乃見慈無遮而悲無盡故令此下希益此會菩薩者現前大乘之機未來求大乘者亦是菩薩之侶速得開悟者開悟發覺初修方便及漸次增進之法從此建水月道場作空花佛事度如幻衆生莊嚴陽𦦨佛國成就夢中菩提故云遊戲如來大寂滅海請後方便竟二至三顯殷作是語已五體投地如是三請終而復始語雖與前不同禮并上章無異必至三者顯殷勤故謝前請後竟二師資緣合二一師與資合二資與師合初爾時世尊告威德自在菩薩至汝今諦聽當為汝說告威德自在者是請主故當場一問現未俱益故重言善哉而讚美之汝等乃能者顯威德自在與同類眷屬等乃能如斯致問除此未必能故如是方便者乃指初修方便准前所問還有漸次二字今不言者以初步定千里之程漸次增進不待言而知故誡以諦聽許以當說顯師緣與資合故二資與師合時威德自在菩薩奉教歡喜及諸大衆默然而聽歡喜默聽正見資與師合以不合則不喜及不聽故師資緣合竟三應求開示三一總標三種二依次別明三結顯應修初善男子無上妙覺遍諸十方至循性差別當有三種妙覺即本妙覺性體居象先故以無上稱之非約修得名無上也遍諸十方者法性遍在一切處故出生如來者隨緣出生一切諸佛豈惟諸佛乃至情與無情等亦皆從此出生故云與一切法前云種種幻化皆生如來圓覺妙心即斯意耳同體平等者既皆從彼妙覺出生則佛與諸法同一體性既同一體性則佛性即是諸法之性諸法之性即是佛性故云平等如金剛般若云是法平等無有高下是也於諸修行實無有二者謂於彼諸佛及一切法中隨據一法修行實無有二以聖性無不通順逆皆方便故雖順逆皆為方便若隨順機宜其數應有無量至總統該攝無量方便所可收歸者循諸機性差別證入淺深當有三種文中言圓攝者即總統該攝之義當有三種者梵名即同楞嚴三觀直解云二經列三名同一梵語謂奢摩他三摩提禪那古釋奢摩他此翻云止以寂靜為相義當空觀三摩提此云等至亦名等持以幻化為相義當假觀即不空觀禪那此翻云靜慮雙離靜幻以寂滅為相義當中觀然修證必須三觀者以如來藏心具三諦理謂空藏不空藏空不空藏空即空觀真諦也不空即假觀俗諦也空不空即中觀第一義諦也三觀各照一諦圓攝一心故曰圓照以一心圓照則為頓以次第各照則為漸此憨山依天台三觀義略順於楞嚴正脈不翻但約義釋云奢摩他全取正因佛性略兼了因為體三摩提全取正因佛性略兼緣因為體禪那全取正因佛性雙兼緣了二因為體此交光依楞嚴經義似有揀於天台惟我圭峯密祖疏依本經另立三種觀名冥符楞嚴質之憨山交光亦不相違今準用之第一奢摩他為泯相澄神觀自釋泯相者謂身心客塵永滅澄神者取靜澄念觀者心冥所觀之境第二三摩提為起幻銷塵觀自不釋但指在經文以經文甚顯故第三禪那為絶待靈心觀自釋云非關真妄不對有空直照靈知而為觀行如文云不取幻化及諸靜相又云超過礙無礙境又煩惱涅槃不相留礙皆絶待靈心義也總標三種竟二依次別明三一泯相澄神觀二起幻銷塵觀三絶待靈心觀初善男子若諸菩薩悟淨圓覺至此方便者名奢摩他初承悟取靜悟淨圓覺者承前兩番開示已悟淨圓覺心也淨圓覺心為觀行本即成佛正因依此心修習不致墮於岐途即以此心攝諸妄念令其不起即是取靜為行如前云居一切時不起妄念是也問未悟須憑理觀既悟惟仗事修今此經於未悟之前解分之中却祇散漫開示既悟之後修分之中而乃確立觀門其故何耶答顯是圓頓教故良以圓頓行人根性猛利言言見諦句句明宗若必令依觀分門反成鈍置故世尊於未悟之前却祇散漫開示既悟之後大用煩興不假理觀略有二失一自恃根性忘慧照而偏趣有為二不念尊貴遇患難而易生退阻故世尊於修分之中確令倚修三觀古德云目足更資余則曰足常資於目也由澄下依修成益憨山云由此妄想消歇則見阿賴耶中習氣生滅之相故云由澄諸念覺識煩動又云久久觀察則自心光明忽然發現故云靜慧發生又云心光既發則頓見身心幻妄未來不有猶如客塵故云身心客塵據此乃是以客喻身往來不定故以塵喻心生滅不停故亦可准楞嚴以客喻見惑不住非主故以塵喻思惑搖動非空故然見思二惑體唯我執由身心起故云身心客塵謂身心所起之客塵蓋約能所成詞而憨山乃以法喻並稱也永滅者二說俱得以客塵不起永不再執身心身心不執永不再起客塵均成永滅此先成滅惑之益顯性之益次下即明客塵滅則身心寂靜謂不隨見惑起滅及思惑搖動故身心滅則內外輕安謂執身則外為形纍執心則內為念擾不得輕安故言便能內發者謂向以身心客塵為纍為擾不得輕安今身心客塵既已永滅便能於淨覺心內任運發起寂靜輕安相故由寂靜故句承明顯性所以不言輕安者謂寂靜必能輕安無庸言故諸如來心即是真如性也蓋由寂靜輕安靜慧益明遍觀十方世界及諸如來皆同幻化本無所有唯有諸如來心於我淨覺心中顯現如是則我心如鏡諸如來心如像然既但如鏡像知非現量親證以二障種子尚未斷故伏種所見但依俙耳按圓教位當十信頓當十住楞嚴第三增進文云塵既不緣根無所偶反流全一六用不行乃至身心妙圓獲大安隱即今云內發寂靜輕安一切如來密圓淨妙皆現其中即今云諸如來心於中顯現此菩薩依奢摩他力為若此也此方下結示觀名依此修行修乃無過故以方便稱之名奢摩他者依圭峰密祖即是泯相澄神觀釋義在文可見泯相澄神觀竟二起幻銷塵觀善男子若諸菩薩至此方便者名三摩鉢提初承悟知幻必承本悟言者以從性起修乃為真修故悟淨圓覺如上所釋以淨覺心知等者謂即以所悟之淨圓覺心發起離念真智了知覺悟六識心性及與根塵此等皆由一念妄動展轉變起故曰皆因幻化謂猶如幻事因幻術力現化而有無實性故即起下依修成益承上既了悟得根塵識心皆因無明幻化而有即於諸識心性中起諸幻智以除幻者幻者即是相本無明業識彼為能幻之者除者以智除斷令不生故此是自修之益向下明化他之益變化諸幻而開幻衆者然後隨機應化變現種種如幻法門開示一切如幻衆生由起幻故句承前起後之詞由前起諸幻智以除幻者而開幻衆之故自覺根塵無纍自他一體便能於幻觀心中發起大悲輕安大悲輕安既發雖終日度生無關勞慮一切菩薩總指信住行向地等而言皆從此幻觀起修諸行漸次增進漸次增進者約歷位從淺以至深約斷惑從粗以至細今依起信論逆次發明初信位寄息於滅相二賢位寄息於異相三聖位寄息於住相四果位寄息於生相文云如菩薩地盡滿足方便一念相應覺心初起心無初相以遠離微細念故得見心性修行至此返觀從前彼觀幻者非同幻故蓋以彼觀幻者是離念真智即前文之知覺非同幻化之無實也又非同幻觀者言幻觀之智對幻法而起幻法既無幻智何有故云皆是幻故自此幻相永滅真性獨存如此乃是諸菩薩所圓滿之妙行次喻明苗喻諸位如土長苗謂幻觀如土漸次增進如長至等覺則苗已成秀矣此方下結示觀名方便義釋見第一觀中三摩鉢提或無鉢字梵音少異耳依圭峯密祖即起幻銷塵觀釋義亦在文可見起幻銷塵觀竟三絶待靈心觀善男子若諸菩薩悟淨圓覺至此方便者名為禪那初承悟超前圓覺妙心非染非淨今云悟淨圓覺者謂承佛開示先且悟得真淨一分起信所稱真如門是也以淨覺心等謂即以所悟之淨圓覺心凝然不動所以不取幻化及諸靜相準前第二觀云即起諸幻是取幻義今以起即是動有背真如不動故不取也第一觀云取靜為行是取靜義今以取即念生有背真如凝然故亦不取此顯雙超前二觀也了知下依修成益承上二觀雙超則是真俗並遣空假不立惟以雙遮二邊中道妙觀直觀寂滅無二之真心也了知身心者於前不取幻觀中即了明有知之身心動被煩惱逼迫業苦纏縛故云皆為罣礙無知覺明者於前不取靜觀中即了明無知之覺明本來離於幻妄絶諸垢染故云不依諸礙若住於礙則被事障於有為法中不得解脫若住無礙則成理障於無為法中不得解脫今二俱不住故永得超過礙無礙境受用世界及與身心者謂行人於此超過礙無礙境返觀自己外之所受用之世界與內之所受用之身心雖相在塵勞區域而不被塵勞之所拘礙故喻以如器中鍠聲出於外器是樂器如簫笛笙管等衆器發聲喻塵勞擾攘鍠即洪鐘之聲鍠鍠然也喻世界身心動用無羈之貌聲出於外衆器不能壓喻超出有為無為塵勞不能拘然既超出有為則煩惱不能留又超出無為則涅槃不能礙故曰煩惱涅槃不相留礙菩薩修觀至此便能於此妙觀心中發起無限寂滅輕安出前煩惱不留故寂涅槃不礙故滅言輕安者不用更加修為乃是任運於此自覺身心寂滅輕快安適雖終日說法不見有法可說終日度生不見有生可度故云寂滅乃至行種種難行之行不見有繫纍之相故云輕安至此方乃契合妙圓覺性寂滅真境故云妙覺隨順寂滅境界如斯境界惟證乃知現前爾我虗妄身心焉能及此故曰自他身心所不能及自他身心即是我相人相自他身心尚不能及何況一切衆生及與壽命又從我人相上發起虗浮妄想所立豈能冀及正顯四相不空不能契此此方下結示觀名名為禪那者依圭峯密祖即絶待靈心觀釋義則雙超前二名為絶待妙契圓覺即是靈心依次別明竟三結顯應修二一正結應修二設事校量初善男子此三法門皆是圓覺至若得圓證即成圓覺此三法門者總指前之三觀皆是圓覺等結示在所應修圓覺不指因心乃約佛所修成圓滿覺故親近隨順者去佛不遠隨順修習便可到故十方如來因此成佛者已成之佛由此成故十方菩薩者未成之佛也未成之佛修因度生常行種種方便或順性通修曰同或分門別行曰異迹雖同異兩分本實顯密三觀故云皆依等而言事業者謂此三種觀法即為菩薩所應作之事業故若得圓證即成圓覺者謂若得圓滿修證即妙契法身而成圓覺之佛以是而知三觀之應修無庸更議矣二設事校量善男子假使有人修於聖道至一剎那頃隨順修習初能校似勝反劣將欲設事校量故云假使有人謂假若有是人也修於聖道者謂從凡夫地發小乘心修出世道而云聖道者乃約已證偏真住最後身者言之教化者以諦緣教化衆生為眷屬成就者恐其不能復以八忍八智無間解脫等道而接濟之百千萬億者所化之衆竟有如許之多阿羅漢辟支佛者所證之果竟有如是之勝以是而知上之所謂修於聖道能教化能成就者其功德不可勝言及欲與修三觀者校之則反為卑劣不如下所校似劣實勝言上云修於聖道又能以斯教化設若不發大心終為敗種故曰不如有人謂不如有人從凡夫地發大乘心也發大乘心修大乘行故曰聞此圓覺無礙法門然圓覺二字通指全經無礙法門特指三觀如第一觀中以淨覺心取淨為行則於理無礙第二觀中以淨覺心起諸幻化則於事無礙第三觀中永得超過礙無礙境受用世界及與身心義兼理事無礙及事事無礙故總以無礙法門名之然聞此但是自聞未及教化隨順不過權修尚闕深證且剎那翻為少時一剎那即在俄頃其功德似為卑劣而上云修於聖道教化多衆證果者猶不如此以此覺圓無礙法門乃成佛正因一歷耳根永為道種才經順修便是大根還丹一粒壓倒醫方萬品可為喻也長行竟二偈頌標頌云爾時世尊欲重宣此義而說偈言正頌分三一頌總標三種二頌依次別明三頌結顯應修初略頌威德汝當知無上大覺心至便有三種類體居象先故稱無上橫遍竪窮故名為大出生如來與一切法故曰覺心本際在如來為覺心在諸法為本際如來與諸法同體故無二相隨順修習起諸方便其數即應無量若統攝所歸總為開示循其機性差別證入淺深便有三種品類此雖略頌大義與長行無異二頌依次別明觀各二句甚略不分寂靜奢摩他如鏡照諸像至如彼器中鍠初二句頌奢摩他寂靜義也奢摩他是名兼義與名為一句故如鏡照諸像頌觀成利益謂由寂靜故十方諸如來心於行人靜覺心中顯現蓋是懸契真如與諸佛同但以種子初伏未得現量親證依俙如鏡像故次二句頌三摩提亦兼義與名為一句如苗漸增長者頌依修成益按圓教住位除種行向隨分斷習由地至等位位斷習證真義似依土生苗漸次增長唯待放華結實耳末二句後頌禪那首句先出名唯寂滅乃禪那中義也凡夫無纍名寂二乘無纍名滅故凡夫二乘各執名言如衆樂競作名器觀行菩薩正見齊超如洪鐘頓響曰鍠也三頌結顯應修長行有二一正結二校量偈闕校量唯正結也三種妙法門皆是覺隨順至名究竟涅槃此偈雖略與長行大義無闕首句總指三觀次句結顯隨順謂皆是圓覺隨順修習之方便故後五句極顯應修言已成之佛先依此成未成之佛後依此成蓋由於此三種觀事圓滿修證即名無住處究竟大涅槃法不益見其可修乎哉威德章竟二辨音章初心力弱磨煉須從淺至深次第三觀如前已明久修力強隨用即是單修則觀觀皆能究竟疊修則先後兩不相違三具則中後隨宜齊零乃隨便俱得至能圓合一切無離覺性二十四輪同歸三觀之中一力圓修共成二十五輪如斯磨煉何障不銷所謂左右逢源隨流得妄者今僅見於此矣三一謝前請後二師資緣合三應求開示初二一具儀謝前二請後顯殷初於是辨音菩薩在大衆中至如是法門甚為希有初衆中具儀此中以辨音為主以其久修輪觀起無礙慧成無礙辨能問能傳持故餘衆皆伴故云在大衆中大悲下謝前聞異悟後仍垂憐愍故稱大悲世尊如是法門者即前三種觀門甚為希有者略有二義一大用繁興不至遍取有為二大患無慮任運直至佛果餘俱準前可知二請後顯殷此諸方便一切菩薩至如是三請終而復始初請修祈示此諸方便淺深惟說三種一切菩薩頓漸乃有多根於前所悟圓覺分門各證約有幾種修習願為現前大衆及末世衆生曲為方便備悉開示令悟真修實相不至徒尚虗名是所望焉此請後真修也至三顯殷準前可知謝前請後竟二師資緣合二一師與資合二資與師合初爾時世尊告辨音菩薩言至汝今諦聽當為汝說辨音一問有關現未故重讚善哉汝等下牒其所問如是修習者謂如是悟淨圓覺依三方便隨機分門有幾修習也誡聽許說師緣與資緣合故二資與師合時辨音菩薩奉教歡喜及諸大衆默然而聽辨音現為請主故奉教歡喜大衆亦默然歡喜奉教同聽資緣與師緣契合正在是焉師資緣合竟三應求開示二一長行二偈頌初三一總標輪數二別明頓漸三結示修法初善男子一切如來圓覺清淨至二十五種清淨定輪首言一切如來圓覺清淨者正顯此理為諸佛同證若能修習皆可成佛故蓋圓滿覺性一真獨立衆惑不染故云清淨既云清淨則無法可修既無法可修則所修之法全空能修之人何有故曰本無修習及修習者一切菩薩指現世初心末世衆生指未來新學依於未覺者言上一切如來已證圓覺固無可修習今一切菩薩及末世衆生雖發大心尚在學地而猶未證圓覺由未證故依之而起心修習當知圓覺本無修習今起心修習即同幻化故云幻力修習當爾之時隨機分門便有二十五種通稱清淨者各能斷障故通稱定輪者三觀屬定輪替修故又輪有摧碾運動之功喻依此而修能摧二障運至菩提涅槃界故總標輪數竟二別明定輪三一單修三觀二統修三觀三圓修三觀初三一單修奢摩二單修三摩三單修禪那初若諸菩薩唯取極靜至此菩薩者名單修奢摩他唯取極靜即是單修奢摩以泯相澄神即是極靜義故言唯取者顯是單修謂不取餘二故靜力強勝即能永斷煩惱究竟成就者障已盡覺已圓故不起於座便入涅槃者當下成佛顯是頓入一斷一切斷一證一切證故此菩下結所修名雖曰單修實能頓該可知二單修三摩若諸菩薩唯觀如幻以佛力故至名單修三摩鉢提不取寂靜及與靜慮故云唯觀如幻謂單修三摩如幻觀也由單修幻觀即於幻觀中觀一切世界衆生等法皆如幻化即如幻人以幻術變化諸物無異當知幻觀蓋是一切諸佛已修成之法今菩薩正是依諸佛修成之法而修成之故云以佛力故今欲度彼如幻衆生還以佛力修成之幻觀故乃能隨彼如幻衆生變化如幻世界以及種種作用變化世界即如變娑婆而成淨土化地獄以作天宮等類種種作用即如隨機化導之類雖行如是變化作用咸同幻化了無實性故云備行菩薩清淨妙行行云妙者無滯礙故即如單修觀行於陀羅尼不失寂念及諸靜慧陀羅尼前文殊章名為圓覺今云於陀羅尼即是於圓覺妙性也蓋二十五種輪觀皆是依於未證圓覺幻力修習今因幻觀功成而圓覺妙性全體顯現故云於陀羅尼正顯圓覺妙心總持一切法義而圓該三觀也既圓該三觀雖不修奢摩而亦不失寂念雖不修禪那而亦不失靜慧靜慧即靜慮義正顯三觀不離一心也此菩下結所修名雖曰單修三摩義實圓該前後三單修禪那若諸菩薩唯滅諸幻至此菩薩者名單修禪那唯滅諸幻句唯字寓有揀意滅諸幻彼幻觀中亦有此文今揀非彼義今菩薩唯是以寂滅力滅諸幻法以為向下斷煩惱之前方便亦不取幻觀種種作用彼為利他此為自利獨自斷除煩惱言獨斷煩惱者蓋以煩惱能障真理必須煩惱斷盡真理方現故云便證實相此實相即圓覺真心也能為諸法之體故名實相此菩下結所修名單修互攝義準前二可知單修三觀竟二統修三觀三一奢摩統修二三摩統修三禪那統修初別修七觀俱以奢摩為首故言統也三一疊復修二具足修三齊零修初二一奢摩三摩復二奢摩禪那復初若諸菩薩先取至靜至先修奢摩他後修三摩鉢提先取至靜者以淨覺心取靜為行即是奢摩他也靜極生慧故即以靜慧心照諸幻者謂照彼如幻之衆便於是中者謂既照知已即便於是如幻衆中起菩薩行謂變化世界種種作用備行菩薩清淨妙行即是三摩提也此菩下結所修名可知二奢摩禪那復若諸菩薩以靜慧故至名先修奢摩他後修禪那若諸菩薩下仍當有先取至靜一句以顯奢摩他義結集避繁故略以準上可知故靜極生慧故云以靜慧故證至靜性即真如性也既已證真如性即無煩惱可斷轉思理由頓悟乘悟併銷事非頓除因次第盡即便深修靜慮以期斷盡煩惱永出生死海耳此菩下結所修名亦可知二具足修二一先中後具足二先後中具足初若諸菩薩以寂靜慧至中修三摩鉢提後修禪那靜而曰寂靜之極也靜極方能生慧義顯先修奢摩從奢摩中得故復現幻力者謂即以靜慧照諸如幻之衆復於覺心性中現起幻化之力甚至種種變化度諸幻衆此義顯中修三摩以種種變化必從三摩中得故然既種種變化度諸衆生未免身在塵域仍恐為衆生所纍故於後分之中深修禪那必期斷煩惱而入寂滅令其身如器中鍠耳結所修名謂先奢摩次三摩後禪那乃頓修中權分漸次既不同上文之單修亦不同前章之漸修也二先後中具足若諸菩薩以至靜力至中修禪那後修三摩鉢提以至靜力義顯先修奢摩以奢摩觀成方得至靜力故既得至靜仍復以至靜力起心斷惱即是靜慮謂靜中轉起思慮之慧即中修禪那義也斷煩惱已即是禪那觀成禪那觀成分可成佛乃不忍棄捨衆生後復倒駕慈航起諸種種神變修習菩薩清淨妙行度諸如幻衆生即後修三摩義也結所修名準前可知具足修竟三齊零修三一先零中後齊二先中齊後零三先後齊中零初若諸菩薩以至靜力至齊修三摩鉢提禪那以至靜力義顯先修奢摩以至靜功力無始念慮頓然歇滅故云心斷煩惱義屬禪那先自利復度衆生建立世界義屬三摩此菩下結所修名若觀前釋後結禪那三摩三摩禪那文似顛倒若論齊修則正修禪那時即修三摩時正修三摩時即修禪那時其義實無前後顛倒總以佛語自在無不可耳二先中齊後零若諸菩薩以至靜力資發變化至後修禪那修奢摩時即以奢摩至靜之力資助發起變化作用成三摩提所謂不起滅定現諸威儀如云東方世界入正定西方世界從定出等皆齊修奢摩三摩義也然奢摩偏於自利三摩偏於利他二雖齊修尚恐未圓故於後深修禪那永斷煩惱成就無上菩提自利利他不期圓而自無不圓矣三先後齊中零若諸菩薩以至靜力用資寂滅至後修三摩鉢提修奢摩時即以奢摩至靜之力資生寂滅之性以成禪那然至靜即寂偏屬於定寂滅則併寂亦滅偏屬於慧而曰力曰資者謂正當至靜而寂時定力資生慧力併此寂亦不存於自證則是矣而度生猶未也故於後起諸作用變化世界度諸衆生以成三摩鉢提則自利利他皆具足而無憾奢摩統修竟二三摩統修三一疊復修二具足修三齊零修初二一三摩奢摩復二三摩禪那復初若諸菩薩以變化力至先修三摩鉢提後修奢摩他修三摩提即以三摩中變化之力隨順衆生而度脫之言種種者衆生根性樂欲種種不同菩薩之隨順亦爾而取至靜者知其如幻如化無所動心雖任運度彼而我自如如如云隨緣赴感靡不周而恆處此菩提座也然變化非三摩罔就至靜必奢摩乃成結名中先修後修良有以也二三摩禪那復若諸菩薩以變化力至名先修三摩鉢提後修禪那先修三摩即以三摩中變化之力作種種境界教化衆生顯三摩已成也三摩既成大悲輕安永不至沉空滯寂懼入二乘境界即是證取寂滅而禪那成焉結名中先修三摩後修禪那義可準思疊復修竟二具足修二一中先後具足二中後先具足初若諸菩薩以變化力至中修奢摩他後修禪那以變化力為度衆生而作種種佛事顯三摩已成也雖作種種佛事而性自如如安住寂靜顯奢摩不動也雖奢摩不動而任運斷惱證果顯禪那自爾也結名中先修中修後修亦秩然可對二中後先具足若諸菩薩以變化力至中修禪那後修奢摩他菩薩隨順衆生以變化力顯現無礙作用此三摩得力也既能顯現無礙作用不以度生為纍重起靜慮進修禪那一切煩惱任運而斷功就不就道成不成退守奢摩故云安住至靜此菩下結所修名在文可見具足修竟三齊零修三一中零先後齊二中先齊後零三中後齊先零初若諸菩薩以變化力至齊修奢摩他禪那先以變化之力為度衆生開種種方便起種種作用此以三摩成益也設遇小乘聲聞大乘菩薩同時來扣則至靜寂滅二俱隨順然至靜即是奢摩隨順修習為對小乘機故寂滅即是禪那隨順修習為對大乘機故結名中零齊二修可知二中先齊後零若諸菩薩以變化力種種起用至後修禪那以變化力隨種種衆生起差別作用通行教化明知是三摩已成而言資於至靜者動中能靜名為至靜是皆由於三摩資生不須另修奢摩而奢摩已成所謂齊修者正在是矣然起用但為度生而至靜尚恐趣寂故於後深修禪那斷煩惱而成菩提離生死而證涅槃可併搆焉結所修名無庸更釋三中後齊先零若諸菩薩以變化力資於寂滅至後修奢摩他以變化力資於寂滅者正是菩薩以三摩變化之力資助禪那寂滅之功使兩相成也蓋以種種變化悉同幻境當體無實唯一寂滅既唯寂滅不須更滅即禪那功成禪那功既成足知三摩之功亦成所謂兩相成者以此於是三摩禪那二俱功成則無功用道自是以後則安住清淨無作靜慮即奢摩義也奢摩觀中一味清淨無作無為即是泯相靜息一切念慮即是澄神所謂泯相澄神者是矣此菩下結所修名可知三摩統修竟三禪那統修三一疊復修二具足修三齊零修初二一禪那奢摩復二禪那三摩復初若諸菩薩以寂滅力至名先修禪那後修奢摩他生滅既滅寂滅現前則是勝因已成妙果當證而乃起於至靜退安奢摩此正所謂以法性身受享法樂故云住於清淨結所修名顯復可知二禪那三摩復若諸菩薩以寂滅力至名先修禪那後修三摩鉢提禪那已成不以證果為急退修三摩而開度生方便故云以寂滅力而起作用於一切境者謂於一切所度之境即指衆生以衆生為菩薩所度境故寂用隨順者以寂滅故而起作用隨順度脫則三摩成矣結所修名顯復準上疊復修竟二具足修二一後先中具足二後中先具足初若諸菩薩以寂滅力種種自性至後修三摩鉢提以寂滅力種種自性者言菩薩不似二乘耽寂不思度生今以寂滅之力乃見衆生有種種自性在所應度雖在所應度必先以奢摩安定其心然後依三摩鉢提而乃起諸變化隨順自性而度脫之結所修名如文可思二後中先具足若諸菩薩以寂滅力至中修三摩鉢提後修奢摩他以寂滅力者謂禪那功成有寂滅之力用也無作自性者謂自性本具不假造作也起於作用清淨境界者蓋是菩薩於禪觀中觀彼衆生在塵勞煩惱中頭出頭沒無一時清淨於是以寂滅力於無作自性中依彼三摩起於作用化彼塵勞而成清淨境界由此頓息一切妄念歸於靜慮結所修名照文可知具足修竟三齊零修三一後零先中齊二後先齊中零三後中齊先零初若諸菩薩以寂滅力至齊修奢摩他三摩鉢提寂滅有力顯禪那已成也寂則不著於有滅則不耽於空然一切諸法不出有空既不著不耽則種種皆清淨矣雖種種清淨不以趣果為急唯思權受法樂還度衆生因而退修奢摩依奢摩而安住靜慮併修三摩依三摩而起諸變化必期根深枝茂源遠流長成佛時壽量長遠正法久住皆由此也二後先齊中零若諸菩薩以寂滅力至後修三摩鉢提菩薩修禪那時即以禪那中寂滅之力資於至靜云何資耶蓋以離有曰寂則能資生於靜離空曰寂滅則能資生至靜是正修禪那時而奢摩已成矣此二皆屬自修而度生猶未也於後仍修三摩起變化而度脫衆生則自他兩利而佛果可立待焉結所修名可知二後中齊先零若諸菩薩以寂滅力至後修奢摩他以寂滅力資於變化者寂即是定能發於通且寂滅則不耽於寂故能資於變化是正修禪那時三摩不另修而自成矣如是則大悲輕安覺他易成尚恐自覺力微大智不能速就故於後轉修奢摩起發至靜之境清明之慧則悲智相成自覺覺他兩俱圓矣統修三觀竟三圓修三觀若諸菩薩以圓覺慧至圓修三種自性清淨隨順若諸菩薩以圓覺慧圓合一切者準前次第三觀中皆云悟淨圓覺即以淨覺心修以是而知二十四輪一切皆然咸是依於淨覺真心隨順機宜而修習之此約圓根菩薩悟大圓覺即以大圓覺慧圓合一切指二十四輪而修習之謂一修一切修也設問云何能爾即答以於諸性相無離覺性於諸性相者二十四輪皆以淨覺真心而為其性單修統修及與齊零差別不一而為其相無離覺性者皆不離於大圓覺性是故但以圓覺慧修即圓合一切而併修之無復疑矣結名中能修之人仍指圓根菩薩名為圓修三種者謂以圓覺慧圓融而修如修奢摩時即具三摩禪那修三摩時即具奢摩禪那修禪那時具二亦然如是則圓覺自性清淨無礙二十四輪皆隨順而具成矣別明頓漸竟三結示修法善男子是名菩薩二十五輪至一念疑悔即不成就初正結輪數準前總標輪數中云依於未覺幻力修習爾時便有二十五種清淨定輪尚未說出云何二十五輪今上科約單修統修齊零修圓融修一一別明已竟故此結云是名菩薩二十五輪一切菩薩隨其自具根性依輪修行不過如是而已若諸下兼示修法諸菩薩指現前新學末世衆指當來初心依此輪者謂設欲依此輪而修者當持梵行謂必先嚴持禁戒而修清淨梵行以戒為無上菩提本故寂靜者收攝身心寂然不動思惟者正念思惟二十五輪中當依何法修也尚恐宿障深厚正修難成仍須禮敬三寶求哀懺悔經三七日自知感應道交希示正修於輪各安標記標記者以紙為標注記輪名各安者隨輪各安以備結取也隨手結取者謂隨手以標為結而混和之仍復取結在手而展視之隨結開示者謂隨彼所展之結開示應修何輪便知頓漸者謂便知自根頓漸如二十五輪中有頓漸偏圓四義謂單修名頓以觀觀皆究竟故取此結者便知自根是頓隨彼開云修習自然可入復修具修名漸然亦是頓中之漸謂頓中略分前後少時俱成也取此結者便知自根於頓中具漸隨彼開示修習亦自然可入以圓覺慧圓合一切名圓取此結者便知自根是圓隨彼開示而修自爾易成齊零修者名偏然亦是圓中之偏謂齊修即能相容不久則零亦容也取此結者便知自根是圓中之偏隨彼開示而修亦自爾易成文中不言偏圓者四字為句準頓漸可知故一念下斥疑不成然既知頓漸徑修必成若才起一念疑而不修或既修復悔於圓覺則不成就痛宜忌之勿自棄也長行竟二偈頌標頌云爾時世尊欲重宣此義而說偈言正頌中義用長行而略且段落不對乃約義略頌也分三一略頌二十五輪二顯示應修揀人三結示隨順速證初辨音汝當知一切諸菩薩至有二十五輪恐諸菩薩不能隨順修習故教以當知借當機警餘衆也一切諸菩薩通該頓漸偏圓圓名無礙慧謂圓合一切故頓名清淨慧以淨覺為性故又偏亦無礙謂或於理無礙或於事無礙故漸亦清淨謂漸次斷障隨分清淨故皆依禪定生者禪定該奢摩等三依生示應當隨順所謂二句指出禪定三名三法頓漸修不言偏圓者頌以五字成句亦準頓漸可知有二十五輪者合偏與圓說也二顯示應修揀人十方諸如來三世修行者至並法不隨順十方諸如來已成正覺人也三世修行者未成正覺人也無不因此法而得成菩提者謂已成者先因此成未成者後因此成在所應修不言可知故惟除二句揀除不隨順人頓覺人有二種一初生頓成不見隨順二因感示成無容隨順法不隨順亦二一者外道所修之法不隨順故二者闡提無佛種性暫不隨故此皆約現在言若遠推過去後待當來亦皆隨順恐無知唯執現在誤撥隨順故茲預辨三結示隨順速證一切諸菩薩及末世衆生至不久證涅槃前三句指人勸持一切菩薩末世衆生指出應修人也常當句勸持應修法也後三句隨修蒙益謂隨順勤修蒙佛加被不久證涅槃也辨音章竟
