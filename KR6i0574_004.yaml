body:
  text: 賢宗後學通理述嗣法門人心興較訂三淨業章四一具儀謝前二請後顯殷三師資緣合四應求開示初二一衆中具儀二謝前受益初於是淨諸業障菩薩至長跪叉手而白佛言此章以淨諸業障為主迷識四相迷智四相非善能淨諸業障者不能問與解故餘衆皆伴故云在大衆中餘可知二謝前受益大悲世尊為我等輩至我等菩薩深自慶慰威德章次第磨煉辨音章交互磨煉近為現前新學遠為末世初心故稱大悲世尊次第三觀已為我等略説尚可以心言倣佛二十五輪又為我等廣辨誠所謂不可思議前章偈云十方諸如來三世修行者無不因此法而得成菩提故稱一切如來因地行相令衆同聞各欲隨順故云得未曾有然正行才修邪魔競起如我釋迦調御歷恆沙劫勤苦修此境界一切煉磨功用實難尋究今則覩見猶如一念之頃炳然齊現於心其慶幸欣慰為何如哉莫可形狀故以深自為言具儀謝前竟二請後顯殷二一請後除疑二至二顯殷初世尊若此覺心本性清淨至及末世衆生作將來眼按前章總標輪數中云一切如來圓覺清淨本無修習等然既曰本無修習是顯本性由來清淨是故當機菩薩即攝此以為發問之端而云若此覺心本性清淨前又云一切菩薩等依於未覺幻力修習然未覺即是不覺不覺必有染污是故當機菩薩即躡此以為致疑之由而云因何染污使衆生迷悶不入迷即不覺悶即不通不入者不能證入較之果人殊類天壤如此深疑非佛不能釋除故云唯願如來等也廣為者祈勿辭勞我等者總該時機開謂通其迷悟謂覺其悶既通其迷復覺其悶則法性現前不期證入而自能證入矣然法性即是圓覺以能為諸法之性故大疏云若直談本體則名覺性若推窮諸法皆無自體同於一性即名法性今推破四相豁融諸法令同覺性故云開悟法性令此大衆等者謂此間衆生證入展轉傳至末世末世衆生證入展轉傳至將來如是展轉相傳乃至最後後際一切衆生永不至迷悶不入故云作將來眼也請後除疑竟二至三顯殷作是語已五體投地如是三請終而復始請後顯殷竟三師資緣合二一師與資合二資與師合初爾時世尊告淨諸業障菩薩至汝今諦聽當為汝説因問而讚善詔告稱能而誡聽許説皆師緣與資緣合故為求入覺故曰咨問咨者謀義謂有所謀而問也方便者入覺之善權法故若非能淨諸業障者問不及此故世尊以乃能稱之二資與師合時淨諸業障菩薩奉教歡喜及諸大衆默然而聽奉諦聽之教知入覺有望故歡喜聞當説之許恐議論盈耳故默然亦資緣與師緣合故師資緣合竟四應求開示二一長行二偈頌初二一開示障道四相二斥迷無功勸修初二一開示迷識四相二開示迷智四相初三一迷識執相二別成凡小三總斥迷悶初善男子一切衆生從無始來至我人衆生及與壽命一切衆生該六道與小乘也從無始來者遙指晦昧真心以來晦昧真心展轉變起八七五六諸識今云妄想者且指第六意識以凡夫小乘唯知有第六意識八七五皆不知故然第六意識於諸識中已屬至妄況夫妄想又是於第六意識上所起虗妄念想誠為妄中妄矣為此妄想所迷固執五蘊身中有我名為我相計我展轉趣於餘趣名為人相計我盛衰苦樂種種變異相續名為衆生相計我一報命根不斷而住名為壽者相此四相中後三雖隨境轉計要皆以我相為本金剛論中名為迷識境也迷識執相竟二別成凡小認四顛倒為實我體至厭流轉者妄見涅槃固執名認四相皆違真逐妄是顛倒法顛倒則不實由迷識故認取固執以為真實我體此又顛倒之甚也由此認為實我於違我者生憎於順我者生愛故云便生僧愛二境然我人等本屬虗妄乃又執違我者為可憎順我者為可愛故云於虗妄體重執虗妄此又妄之至也雖妄之至而卒不可斷故云二妄相依謂妄體與妄境相依而住故或耽著有為而造有為之業或趣向無為而修無為之道然業道通稱為妄者蓋以識心不了雖修道亦是妄故由妄業故循有為因而受報於天上人間故云妄見流轉謂流轉於生死也厭流轉者順無為道而感果於聲聞辟支故云妄見涅槃謂滅度於分段也別成凡小竟三總斥迷悶由此不能入清淨覺至及與息念皆歸迷悶由此二字躡前由此妄見流轉妄見涅槃以此為障則不見清淨覺性不見則不能入故云不能入清淨覺非覺二句防問恐有問云一切衆生皆證圓覺云何不能入想是覺性違拒諸能入者耶故此防云非覺違拒諸能入者謂非是覺性違逆拒阻使之不入不惟不違拒亦復不隨順即如有諸能入非覺入故有諸能入者即如前文菩薩修習三種觀法即能證入雖能證入亦非覺性隨順令其入故總言入與不入無關於覺也以是之故凡夫動念起惑造業二乘息念沉空滯寂俱屬妄念不契真乘故云皆歸迷悶謂迷而不覺悶而不通也大疏云此文正是結答前問前問因何迷悶不入今答云由認四相展轉生過縱離六道復墮二乘是故不入次云非覺違拒等者由前問云因何使諸衆生不入故此答云非覺違拒使之不入但由認我故不入也開示迷識四相竟二開示迷智四相三一承徵引説二次第別明三總以結示初何以故由有無始本起無明至相續求道皆不成就首句承前徵起大疏云動念任許背覺息念即合契真何故動息俱稱迷悶由有下約本起無明為釋引起重説迷智四相義也直解云本起無明謂最初一念不覺生相無明也法身無我法身即指真如本經稱為淨覺真心由一念無明迷本法身成陀那識為我相根本自此皆是無明用事故云為己主宰其意以主宰即我以我者主者義也一切衆生通指六道凡小生無慧月者從父母受生已來無有智慧之目不能照破無明妄認四大為自身相六塵緣影為自心相故云身心等性皆是無明謂依於無明而建立故從此無明永不能斷蓋以無明不能斷於無明所謂動念息念皆歸迷悶者正以此故恐猶不信故仍以喻明而云譬如有人不自斷命者喻顯無明不能斷於無明為可信故是故者謂以是無明不斷之故不惟動念息念皆歸迷悶即從此發菩提心行菩薩道亦不能脫離迷悶故教以當知令其自行審驗試看有愛我者則我與隨順隨順即是無明非隨順而違我者便生憎怨憎怨亦是無明為緣憎愛心之枝末無明將養從無始之根本無明如是從三賢以去乃至十聖等覺相續求道未免為智所迷仍墮四相故云皆不成就承徵引説竟二次第別明四一徵釋我相二徵釋人相三徵釋衆生四徵釋壽者初善男子云何我相至清淨涅槃皆是我相初承徵標定上科云相續求道皆不成就意顯為智所迷仍墮四相且徵云何名為迷智我相此承上徵起也下乃標定謂諸衆生心所證者言我相隱微根自心起於若事若理有所證取其體方現善男子引事證釋承上隱微難見有證方現之語恐其不明故引事以證釋也故曰譬如有人非喻指事言即如譬如有一件事也百骸者人之身分調適者百骸無恙調和順適忽忘我身者百骸調適不覺有自己之身如南郭子綦嗒焉喪我故云忽忘四肢者兩臂兩股絃謂直不能屈緩謂柔不能申此皆攝護將養乖於方法微加針艾者或略用針刺或略用艾炙以必證取是事即知有我由此一事可以證知故前云有所證取方現我體善男下取理深明躡前不唯於事心中有所證取是我相其心乃至證於如來約所證果言畢竟了知清淨涅槃約所證理言畢竟了知者謂徹底深證清淨涅槃者顯無明已脫殊不知縱使果證如來畢知涅槃亦是心中有所證取故云皆是我相徵釋我相竟二徵釋人相善男子云何人相至備殫證理皆名人相初承徵標定上於迷智我相已經辨明此徵云何名為迷智人相下乃標定謂諸衆生心悟證者悟由心發故曰心悟謂從心發悟悟得彼之能證者是我此悟不忘即為迷智人相謂對彼我故説名為人善男下躡前詳釋悟有二句謂悟得上來能證以為有我者自不復認彼為我是於彼我全空矣所悟二句謂彼我既空是所悟之境指前能證之智已非是我以此例知能悟之智亦應如是非我應忘情也設或轉計能悟之智業已超過一切能證之者是依然為智所迷對彼我相故曰悉為人相然證者而云一切人相而曰悉為者正顯凡有所證不忘能證之智皆名我相凡有所悟不忘能悟之智皆名人相善男下以理深明躡前不唯悟彼證者是我為人相其心乃至圓悟彼所證涅槃俱是我者亦為人相者即人耳承上漫説圓悟設或心存少悟不忘縱使備悉殫盡逐位所證之理皆名人相由悟證是我故徵釋人相竟三徵釋衆生善男子云何衆生相至存有所了名衆生相初承徵標定上於迷智人相已經辨明此徵云何名迷智衆生相下乃標定謂諸衆生心自證悟所不及者謂於自心發起照了了明得彼我人二相俱非自是所證所悟不及於心以有此心即衆生相蓋以了我了人心迹愈多故也善男下假言例明謂假世人之言比例發明也譬如有人例彼自心作如是言我是衆生例彼心存了智卓然獨立則知彼人説衆生者非我非彼例彼心存了智卓然獨立自然非彼能證及與能悟能例中云何非我所例中即是云何非證釋以我是衆生則非是我例了智獨存則證所不及故非證能例中云何非彼所例中即是云何非悟釋以我是衆生非彼我故例了智獨存則悟所不及故非悟此借世人語詞以為義勢顯第三了智卓然非證悟所能及也善男下結成此相了證了悟皆為我人者謂了彼心有所證者為我相了彼心有所悟者為人相但以有我者必有人有人者必有我故渾言皆為我人我人不及者即指了智卓然存有所了者則是了證了悟之心迹未忘由心迹未忘必至起滅不停展轉滋多由此結成名衆生相徵釋衆生竟四徵釋壽者善男子云何壽命相至所不自見猶如命根初承徵標定謂諸衆生心照清淨覺所了者承上了證了悟皆自心體上發起智照而我人相所不及故得心照清淨且指業識心言以四相未空故因心照清淨而衆生相現故對衆生相上發起覺照覺彼所了之我人二相所有能了之智俱屬我執而欲斷之一切下正明其相殊不知即此一念覺心便是一切業智謂第八識上微細分別也不言識而言智者此屬修證反妄歸真轉有漏業識成無漏業智也所不自見者謂此微細分別原從八識上起八識不能自見雖不自見常在其中潛續猶如人之命根常在身中潛續壽命而人不自覺知由此所以名壽者相總結次第別明竟三總以結示二一結示同塵二結示不斷初善男子若心照見一切覺者至存我覺我亦復如是初法説若心照見則是從自心上發起照見此是後一相一切覺者指前三相皆為塵垢者總屬迷智境也此先標定下乃承釋蓋以能覺之後一與所覺之前三俱是於清淨心中分自分他立能立所障於勝進不得真修故云覺所覺者不離塵故謂染污於清淨心也如湯下喻明如湯銷冰者湯喻智照以火煎水而成湯喻正念悟心而成智冰喻我執因寒凝水而成冰喻妄念迷心以成執用湯銷冰喻以智斷執謂冰既銷矣無別有冰喻執既斷矣無別有執知冰銷者顯湯亦不存謂冰因湯銷而成水此湯隨冰銷亦成水矣至此冰湯俱忘唯一清水更誰能知冰為湯銷者此是異喻反明前文覺所覺者皆為塵垢染污淨心果其執斷智泯能所雙亡當下唯一清淨真心又誰能知我執為智斷者向下以法結合存我覺我亦復如是先正合言能覺之我與所覺之我二俱互存則染污淨心不得顯現合彼前喻能銷之湯與所銷之冰二俱互在則障礙淨水不得澄清次反合如其一念不生能覺所覺二俱互泯則塵垢銷滅唯一淨心矣合彼前喻湯冰互融障礙全銷唯一清水矣結示同塵竟二結示不斷三一不斷不成聖果二展轉徵釋其故三驗知我根未盡初善男子末世衆生不了四相至是故名為正法末世正像已過名為末法之世此際衆生尤在可愍故偏言之不了四相者迷識迷智二種四相皆不了明也不了則不斷不斷則我執俱在所以雖經多劫勤苦修道但名有為有為者自執由我作為是世間因也世間之因酬因之果還在世間或天上或人間或為輪王小王或為宰官長者等縱饒修到非非想天報盡還來散入諸趣欲成出世聖果則終不能也然出世聖果有二若惟不了迷智四相自不能成大乘聖果十地等妙設復不了迷識四相雖小乘聖果三果無學亦不能成也是故句有以衰例盛之義謂以是末世衆生不了四相不成聖果之故則知汝等生植盛時不了四相修因亦可名為正法末世可不慎哉不斷不成聖果竟二展轉徵釋其故三一一向錯認二我不解脫三法不解脫初何以故認一切我為涅槃故至其家財寶終不成就初徵謂以何以故不了四相久修不成聖果耶釋中謂四相皆我名一切我不了則認認則心生保愛妄計涅槃如前我人二相中有證有悟名成就故即其相也不言有了有覺者可例知故譬如下喻明不成四相皆我有損於道義似乎賊而乃妄計為自所成果故以認賊為子喻之大疏云賊若在外猶可隄防養之為兒如何檢慎又知賊是賊賊無能為養之為兒寧無損敗如六根取境猶可制御藏識妄我難以辨明因致如來藏中功德之寶念念衰耗故以其家財寶終不成就喻之所謂久修不成聖果者以此問據上所云認一切我為涅槃故有證有悟名成就故則一切我似指所證所悟而前釋四相却指能證能悟能了能覺則一切我似指能證能悟等豈能證能悟等是我而所證所悟等亦是我耶答以金作花花花皆金以紙作花花花皆紙能證能悟等既皆是我所證所悟等豈離我哉則一切我通該能所言之亦無不可又何所疑乎一向錯認竟二我不解脫何以故有我愛者亦愛涅槃至別憎生死名不解脫初徵謂以何以故為一向錯認也釋中我愛者四惑之一按相宗中第七識隨緣執我與四惑相應一者我癡謂愚於我相迷無我故二者我見謂非我法中妄見我故三者我慢謂恃所執我心高舉故四者我愛謂於順我者深耽著故今謂第七識隨緣執我常與四惑相應自應不斷我愛故云有我愛者既有我愛於順我者便愛故應亦愛涅槃但勢必伏我愛根為涅槃相今現有我愛所愛者豈真涅槃謂之錯認不其然乎又順我者既已取愛於我違我者必應取憎於我是又有取憎於我者為我所憎焉如是則有我憎者亦憎生死然憎生死者必愛涅槃乃不知愛者真生死故是知為愛涅槃別憎生死則所愛涅槃名不解脫以未離我愛是真生死正為繫縛法故我不解脫竟三法不解脫云何當知法不解脫至猶未能盡我相根本初徵與上二不同上二俱是以已説者未能便了故但用何以故而徵之謂如上所説者何以故耳此是約未説者令其明了故以云何當知等而徵之佛意以前説經劫修道不能成就聖果必是我相法相俱未解脫然我不解脫如上已明云何當知法不解脫故次呼善男子而釋成之末世習菩提者即求成聖果人也以己微證者我相中證人相中悟衆生相中了壽者相中覺皆有分證之相稱之曰微然證則自計蘊身心淨悟則自計我淨了則自計人淨覺則自計生淨故云為自清淨惟餘覺所了者即是一切業智正是我相根本故曰猶未能盡然既以己微證為自清淨即是法相雖是法相亦不離我相根本謂是我之法故既我相根本猶未能盡法相豈能解脫以此應徵義可思知展轉徵釋其故竟三驗知我根未盡若復有人讚歎彼法至遊戲諸根曾不間斷此雖驗知我根未盡實借此以證法未脫也讚歎彼法即生歡喜正是法執未脫便欲濟度者方便開示濟其怠惰度令精勤欲其修習彼法望其同得也若復誹謗彼所得者便生瞋恨亦是法執未脫便欲訶責不待言而知故則知我相堅固執持者謂執所得之法不令遺忘也藏識即是第八阿賴耶識按相宗第七識內緣第八見分為我既是第八見分自應潛伏藏識又潛伏者對下遊戲諸根而言蓋以諸根不動無法可執故曰潛伏及諸根才動隨於彼之六塵境上任運執我故曰遊戲如世間賊人無可盜則潛而伏之有可盜則任運無懼如玩遊如行戲也曾不間斷者恆審思量我相隨故開示障道四相竟二斥迷無功勸修二一分類為斥二警䇿正修初四一斥有我無功二斥説病無功三斥竊德無功四斥增慢無功初善男子彼修道者不除我相至衆生壽命亦復如是初承上正明謂如上所説觀之而彼末世之修道者必要斷除我相設若不除我相則證悟了覺不離我人衆生壽者以是之故不能入清淨覺讚喜謗瞋即其證焉其次善男下據理反顯謂反顯能入淨覺恐謂不除我相不能入清淨覺已知彼修道者雖修無功矣且畢竟如何能入故云若知我空謂證知空無我理既能證知空無我理自然聞毀不瞋故曰無毀我者聞毀既已不瞋聞讚又復何喜設若聞讚生喜許以濟度説法則是有我説法是人我未斷故我既未斷人等亦然故爾超略人相而云衆生壽者亦復如是以是而知我相既空人相與衆生壽者一齊俱空如是則證悟了覺乃隨分入清淨覺矣斥有我無功竟三斥説病無功善男子末世衆生説病為法至是故不能入清淨覺末世衆生不了四相為度衆生而説自所得法殊不知説自所證正是我相説自所悟正是人相説自所了正衆生相説自所覺正壽者相故謂其為説病為法如此則是以盲引盲是故名為可憐愍者蓋以其説者聽者兩無功故然説者雖精勤説法為度衆生作淨覺因而聽者雖精勤研究信解修習趣淨覺果皆為增益諸病蓋以我相未斷人等相因以是之故不能入清淨覺斥説病無功竟三斥竊德無功善男子末世衆生不了四相至為自修行終不成就末世衆生不了四相者謂彼於我相根本未盡不能了達四相皆空也以如來解及所行處等謂如來於因地之中久空四相有所解皆為淨解有所行皆為淨行而衆生不了四相乃依佛所説之理而解依佛所説之行而修便執為自己修行是謂竊取如來之德以為己德殊不知四相不了俱墮有為清淨解行終不成就亦何益哉斥竊德無功竟四斥增慢無功或有衆生未得謂得至是故不能入清淨覺或有衆生者即指增上慢人也未得謂得者約涅槃斷果説謂此人乍斷迷識四相才離分段生死相似涅槃而實未得清淨涅槃即便自謂已得未證謂證者約菩提智果説謂此人乍斷我執煩惱才證偏真覺性相似菩提而實未證圓滿菩提即便自謂已證此不過略具增上之心恃己於他講演者切不可以四波羅夷中大妄語罪責之設見有勝於己更希前進者則心生嫉妬謂嫉我不能妬彼勝我此皆依於我相迷智境中我相故曰由彼衆生未斷我愛相應四惑中後一是故者以是未斷我愛之故四相競生清淨覺相豈復能入故以不能結之分類為斥竟二警䇿正修善男子末世衆生希望成道至則不能入清淨覺海初警示趣果迷因末世希望成道則是已發菩提心者既發心希成道果應須先悟自心依本經即是圓覺真心也依此心修習即是成佛正因今乃無令求悟則是迷於正因漫説不修縱使修習終不成就況且惟是要益多聞仍復食彼餘唾便謂自己發明故云增長我見是反成障道法矣但當下䇿令應急斷惑但當精勤者不管悟與不悟但當精一其心而無異緣勤勞其身而無惰志準下文即惟以斷惑為急務也降伏煩惱者謂先斷迷識四相略顯空無我理得相似涅槃救然眉之急故雖救然眉猶慮焚身故又勸以起大勇猛勇謂進修不退猛謂冒難不屈未得清淨涅槃務須令得未斷迷智四相務須令斷果其貪瞋愛慢等對境不生則是清淨涅槃所謂未得者已得也果其彼我恩愛等一切寂滅則是迷智相盡所謂未斷者已斷也大疏云貪者於有有具染著為性能障無貪生苦為業瞋者於苦苦具憎恚為性能障無瞋不安忍行所依為業慢者恃己於他高舉為性能障不慢生苦為業此是根本煩惱中三略引大疏釋之餘三經既不具無容強會又不釋愛者以愛無別性貪所攝故又大疏云諂曲嫉妬即小隨煩惱各別起故名小但是貪等分位差別等流性故名之為隨諂者為罔冒他故矯設異儀險曲為性能障不諂教誨為業貪癡二分為體嫉者徇自名利不耐他榮妬忌為性能障不嫉憂戚為業瞋一分為體此雖四字但是小隨之二以諂即具曲嫉即具妬俱依大疏釋之經不具者不敢妄贅而云對境不生者顯種習俱盡設不盡者對境即生謂其是清淨涅槃者以此聞讚不喜亦不欲施恩濟度聞謗不瞋亦不欲捨恩訶責是謂彼我恩愛彼若讚我所得是彼之愛我若喜欲濟度是我之恩一切寂滅者對動言寂是但銷我相之枝葉並寂已滅乃進除我相之根本謂其為迷智相盡者以此佛説下許以漸次成就謂理由頓悟乘悟併銷事必漸除因次第盡若是人者先斷迷識四相次斷迷智四相是為漸次成就求善下教以近友輸誠謂毫𨤲之差千里之謬漸次成就恐落岐途故須求善知識開導指示方能不墮邪見又求善知識但取其知見真正不論其種性高低設若於所求時不取知見別於種性高低處而生憎愛猶是我相未盡故云則不能入清淨覺海覺而云海者以海出衆流流流入海喻彼大圓覺心出生一切諸法教化衆生成就大圓覺心如文殊章云有大陀羅尼名為圓覺流出一切真如菩提涅槃及波羅密教授菩薩取喻如海良有以也長行竟二偈頌標頌云爾時世尊欲重宣此義而説偈言正頌分二一頌開示障道四相二頌斥迷無功勸修初約義略頌淨業汝當知一切諸衆生至不得成菩提既呼其名又稱為汝者顯詔告之切故當知者應當了知我愛不可不除四相不可不斷也一切二句正顯我愛當除無始妄流轉者謂從無始來凡夫執我愛而起惑造業流轉於分段生死二乘厭流轉而修道證滅流轉於變易生死皆如空華同歸虗妄未除二句正顯四相當斷四相皆由我起長行云伏我愛根名涅槃相今既四相未除我相仍在涅槃斷果非真菩提智果焉成故不得也頌開示障道四相竟二頌斥迷無功勸修約義略頌二一頌分類為斥二頌警䇿正修初愛憎生於心諂曲存諸念是故多迷悶不能入覺城準長行分類為斥有四一有我二説病三竊德四增慢今此中愛憎生於心乃義頌有我謂順我者愛違我者憎故諂曲存諸念則義攝後三以説病為法有諂媚聽者義故竊德增慢有曲護己短義故是皆有礙勝進故多迷悶迷不覺悶不通也既迷且悶覺城安入故總以不能斥之長行分類別斥皆云不能入清淨覺是也覺而言城者有二義一謂途中多迷進城則覺喻已證圓覺如金出礦冥不復重為礦故二謂門通四路出則可行喻既證圓覺仍思度生隨方皆可到故頌分類為斥竟二警䇿依正修若能歸悟剎先去貪瞋癡至究竟非成就準長行此科有四義首則警示趣果迷因今云若能歸悟剎歸即順也悟剎即是所悟之境以圓覺妙心為悟境故若能反彼無令求悟歸順圓覺而為悟剎則成佛之正因具矣何迷之有次則䇿令應急斷惑先去貪瞋癡者勸斷迷識四相四相總由我起今云貪瞋癡皆屬我相貪謂於順我者生貪愛心瞋謂於違愛者生瞋恚心此二皆屬我愛謂同依我愛起故癡即我癡謂愚於我相迷無我理故準長行尚有愛慢二字然愛即是貪貪所攝故不言慢者以五言難容依長行可知故又長行有小隨之二偈亦不具以諂曲二字貪瞋二分所攝嫉妬二字瞋一分攝故此皆迷識而有我人衆生壽命亦以此而建立法愛不存心者勸斷迷智四相然證悟了覺皆為法愛存心則執成四相不存心則解入淨覺三則許以漸次成就而今云漸次可成就者謂若惟執頓悟未必能成就淨覺今既能歸悟剎又能於二種四相漸次斷除則清淨覺海可入故云成就四則教以近友輸誠我身本不有者淨覺成就了達五蘊皆空是已達空無我理也既達空無我理則違我者不以為違憎何由生順我者不以為順愛何由生如是則求返善友必能輸誠蒙彼開示正見終不墮邪設若於彼所求別依種性高低等而生憎愛之心縱有所得究竟非真成就以彼既有憎愛則是我相根本猶未盡故淨業章竟四普覺章三一謝前請後二師資緣合三應求開示初二一具儀謝前二請後顯殷初二一衆中具儀二謝前成益初於是普覺菩薩在大衆中至長跪叉手而白佛言此章以普覺菩薩為主作止任滅藥病雙關覺則成藥執則成病菩薩普能覺了故為衆代問餘衆皆伴故云在大衆中餘可知二謝前成益大悲世尊快説禪病至心意蕩然獲大安隱為憐末世衆生説病為法今假現前大衆預為開導故稱大悲世尊快説禪病者快字下應作逗謂慶幸意也若合下三字則是當機菩薩為衆慶幸之語猶云快哉佛之所説真為禪病蓋以證悟了覺皆由禪定而得但執則成病不自覺知今蒙如來開示深悟迷智四相快何如之一向未曾説者今乃説之故云令諸大衆得未曾有四相融於胸襟故心意蕩然謂空洞無礙也淨覺入於言下故得大安隱謂解脫無窒也具儀謝前竟二請後顯殷二一慮後詳請二至三顯殷初世尊末世衆生去佛漸遠至今彼羣盲不墮邪見末世衆生去佛漸遠者正法流行之際雖去佛猶不遠至於像法則去佛遠矣若更歷末法則一往漸遠愈趣愈下卒至不可返矣當斯時也賢友逃形聖師不作或潛隱於巖谷或伏藏於海隅正教既其衰微邪法自爾增盛如火熾然鮮有不被其焚者然亦有乘大願力來度迷津故上章教以求善知識不墮邪見但彼之順行逆化道迹良多設不得如來明示難免誤認故初問使諸衆生求何等人蓋求佛於順行逆化衆多人中明明説出當求何等樣人為善知識也然既求其人必依其法但恐其所説之法未必如其所得故次問依何等法謂求佛説出於彼所説法中當依何等之法而為教儀又既依其法必行其行但慮其行有多門習艱並技故三問行何等行謂求佛説出於彼所行多門行中當行何等之行而為專習又既行其行必有所得但慮其所得之中道分真似藥病雙關故四問去何等病謂求佛説出於彼所得真似道中當去何等似病而存自他兩利之真藥又既得其道還須自己發心但發心有權實頓漸偏圓故後問云何發心謂求佛説出於權實頓漸偏圓中當云何而發因地之心令彼羣盲不墮邪見者自明所問意也言末世衆生無智自辨動陷邪途猶如羣盲故今詳問果蒙如來開示自令不墮邪見慮後詳請竟二至三顯殷作是語已五體投地如是三請終而復始前後皆同可知謝前請後竟二師資緣合二一師與資合二資與師合初爾時世尊告普覺菩薩言至汝今諦聽當為汝説現前大衆因面授而開正知正見末世凡情因傳説而免邪教邪宗善哉問也理合重言若非乘大願力發普覺心者不能如斯致問故稱之曰汝等乃能問而言咨者有所謀而問佛已知之下即出其所謀五問中獨言修行者以前之求人依法後之去病發心皆為成就修行事故能施末世等正世尊出其所謀蓋以末世衆生不得正知正見畏墮邪宗不成聖道菩薩謀求世尊使其得正知見作無畏道眼不墮邪見可成聖道故而致問世尊喜其所問故誡以汝今諦聽許其當為汝説正師緣與資合耳二資與師合時普覺菩薩奉教歡喜及諸大衆默然而聽奉諦聽之誠喜當説之許知世尊不吝慈悲遍益來今故而及衆默然靜心澄聽又資緣與師合也師資緣合竟三應求開示二一長行二偈頌初四一示求人二開示法病三開示行病四開示發心初二一正示求人二兼示承事初二一明求人二明獲益初善男子末世衆生將發大心至不著聲聞緣覺境界將發大心者謂欲要發大乘心尚未敢發以苦無知識引導恐墮邪見其意必是求善知識欲要依之而修行者汝前代問令彼求何等人吾今示汝當求一切正知見人然正知見人當以二法驗知一者心不住相不為人天福報所迷二者不著聲聞緣覺不為小乘因果所滯依如是人自不被邪見所惑明求人竟二明獲益雖現塵勞心恆清淨至阿耨多羅三藐三菩提雖現等皆指所求人言孔子曰三人行必有我師焉擇其善者而從之其不善者而改之每見近時學人親近知識偏責知識之短不取知識之長才捨此而至彼復嫌彼而逝他徒費草鞋空勞身力余常示以清涼有言明正為南方盡南矣益我為友人盡友焉試看世尊告普覺菩薩曰雖現塵勞心恆清淨塵勞即是煩惱如貪瞋癡慢等是也此言善知識為度塵勞衆生必先顯現塵勞與之相親相近乃以權巧方便而攝化之至觀善知識之心恆常清淨而塵勞不與焉又云示有諸過讚歎梵行不令衆生入不律儀過即不律儀事此言善知識為度有過衆生必先示有諸過與之相依相附乃為之讚歎梵行而開導之至觀其依附之久再不令彼衆生入於不律儀中此皆示現同事新學者宜應知所辨焉求如二句乃世尊結答普覺之語汝前問求何等人必求如是具大乘根有德操之人方堪引發大心導以正修即可因此正緣得成無上正等菩提由是觀之善知識為益良多誠不可不求也正示求人竟二兼示承事末世衆生見如是人至心華發明照十方剎初明承事見如是人已知是得成菩提正緣故應當供養謂敬修四事不敢有違故然又以諸供養中法供養最如是捨身心修行其法故云不惜身命謂縱有喪身失命因緣亦不顧惜也彼善知識見其能如是故則示之以順行於行住坐臥四威儀中常現清淨為其作準作則令彼衆生依而習之乃至轉為種種過患衆生則示之以逆行於四威儀中示現種種過患如淫殺盜妄等乃急於為之讚歎梵行而作折伏彼諸衆生雖見此等心亦無有憍慢謂已知其是先以欲鈎牽後令入佛慧故設不知者必生憍慢憍謂矜己勝彼慢謂輕彼劣吾然知則必能倣行順逆皆能修也不知則惟堪順修則劣於和識遠矣況夫句有以重況輕之意言種種過患事該淫殺盜妄乃違犯律儀之最勝者見之尚不生於憍慢況夫出家知識貪著摶食及與財物在家知識愛染妻子及與眷屬縱有違犯律儀尚無大過見之不惟不生憍慢而一切惡念皆不起也善男下次明獲益亦世尊結答普覺之語善男子當知於彼善友所示種種過患不起憍慢等諸惡念於此可見正念純熟心地清淨隨因感果即能究竟成就正覺契真心也從此智慧心華開發明曜普照十方剎土成佛度生不外是矣開示求人竟二開示法病二一開示依法離病二開示離病即正初善男子彼善知識所證妙法應離四病承上文業已開示於彼善友不起惡念即成正覺今復指示於彼善知識所證妙法應當離於四病也妙法即圓覺以其包羅法界涉入無礙故稱妙法若依此法不墮邪見此正示依何等法也四病即作任止滅若能離病即成正行依此修習皆可入圓此正示行何等行也據菩薩問處分條別問而世尊答處總示以事善知識中善知識所證妙法即是可依之法無別有法可依也離病正行即是應行之行更無別行應行也故示勸以應離淨名云但除其病不除其法也開示依法離病竟二開示離病即正二一歷明四病二總示邪正初四一作病二任病三止病四滅病初云何四病一者作病至非作得故説名為病初寄言總徵既屬總徵通冠下四應令為一科孤句不便別分故寄言於此一者句標定若復下釋成若復有人指一類修行者言顯不修行者無此計故作如是言蓋是從心起念發如是妄計之言我於本心作種種行此是錯會前幻觀中義起種種行欲求圓覺也實不達彼先悟淨覺然後以淨覺心發起幻智觀彼幻衆而起幻行乃至幻相永滅方滿菩薩清淨妙行今乃虗妄計度謬倣彼行欲求圓覺豈可得哉當知圓覺清淨本無修習豈容作得故曰彼圓覺性非作得故説名為病固其宜矣作病竟二任病二者任病若復有人至非任有故説名為病二者句標定若復下釋成若復有人仍指一類修行者反顯不修行者無此妄計作如是言亦是從心起念作如是妄計之言我等今者是妄宰己先定於中矣如此而曰不斷生死則生死常輪如此而曰不求涅槃則涅槃永背涅槃生死無起滅念者謂涅槃由他永背而無求起之念生死由他常輪而無斷滅之念一味任彼一切隨諸法性生死者任他生死涅槃者任他涅槃此錯會普眼章中覺成就故不與法縛不求法脫不厭生死不愛涅槃等義而自作此無可無不可之妄計而乃以之欲求圓覺豈可得哉當知彼圓覺性雖本無修習不妨幻力修習豈是任用隨他之所能有故曰彼圓覺性非任有故説名為病任病竟三止病三者止病若復有人至非止合故説名為病三者句標定若復下釋成若復有人準前可知作如是言仍是從心起念作如是妄計之言一切妄念皆由自心而起今欲永息諸念豈從外招故云我今自心永息諸念其意以由諸念故見一切法起動差別設若永息諸念則得一切性寂然平等此錯會清淨慧章居一切時不起妄念等義而自作此永息諸念之妄計殊不知息愈勤而念愈多才起一念息心則是於妄念上又添一層妄念一念既爾念念皆然欲求永息豈可得乎而乃以之欲求圓覺實不能爾當知圓覺清淨本自離諸妄念何庸更止念以求合故曰彼圓覺性非止合故説名為病止病竟四滅病四者滅病若復有人至非寂相故説名為病四者句標定若復下釋成若復有人亦準前知作如是言者謂從心妄計作如是永斷煩惱之言其意以身心受報皆因煩惱所使今欲斷之使不再生故曰永斷一切煩惱既永斷之則無惑無惑則無業無業寧有身心受報故云身心畢竟空無所有又身心為根塵總相根塵等為身心別相身心既空無所有何況六根五塵及法塵之虗妄境界又安所存故云一切永寂此錯會前滅觀中斷諸煩惱隨順寂滅等義實不達彼以淨覺心修習全無許多妄計今妄計一切永寂欲求圓覺如以方木欲逗圓孔吾固知其不入也當知妙圓覺性具足恆沙德用無礙難思住寂之心豈能契合故曰彼圓覺性非寂相故説名為病歷明四病竟二總示邪正離四病者則知清淨至若他觀者名為邪觀首二句結示清淨謂彼果能離四病者則知彼是清淨修行作是下依分正邪謂作是觀離於四病而修習圓覺者是人得入圓覺之正性名為正觀若乃他觀修習圓覺不必離於四病者是人不得入圓覺正性名為邪觀依正觀而修則為成佛夷途依邪觀而修必沉入魔險道有志圓覺者不可不辨開示法病竟三開示行病二一示修行入圓二示解脫除病初善男子末世衆生欲修行者至如是修行方入圓覺末世衆生去佛遙遠欲修行者致障多緣不假善友調停難免不入邪徑應當盡命等正誡勉之語盡命供養者盡其形命供給四事勿朝勤而夕惰及日親而月違也尋常稱善友為知識呼知識為善友隨説者便不甚分疏今經文既兩用釋當類別蓋既稱為友應指同學等侶但取其賦性善良與之共住有彼此互相勸勉之益故以善友稱之必令盡命供養者恐彼四事不足不能安心辦道相與切磨針規成其益焉善知識者應指親近師承具正知正見能識法識機乍親則解粘去縛久近必抽釘拔楔故稱為善教以執弟子禮善侍巾瓶故名為事欲求親近者或因其執禮善侍或見其時至機熟不待請而來教故應斷憍慢者憍謂自高慢謂輕彼愚癡無知者間或有之如云知識尚來近我我又何必往求只此二語則是憍且慢矣若復遠離者或為折茲憍慢或為應他機感去就兩有所益故應斷瞋恨者瞋謂立時生忿恨謂結怨在心愚癡無知者亦間有之如云任去不復追隨自此永不求彼只此二語則是瞋且恨矣然此憍慢瞋恨皆為障道因緣故各以應斷囑之現逆順境者順如戒定慧等逆如貪瞋癡等皆為曲順機宜權巧示現逆固非逆順亦非順故云猶如虗空既順逆猶如虗空自能了知善知識之身心畢竟平等並不因善人而現順亦不因惡人而現逆蓋與諸衆生同一覺性體無有異視又何容生憎生愛於其間哉如是修行方入圓覺者謂如我所説如是供養善友事善知識依之修行離於障道因緣故云方入圓覺示修行入圓竟二示解脫除病善男子末世衆生不得成道至自他憎愛亦復如是上文以供養善友事善知識依之修行方入圓覺者為其無怨親憎愛等諸障緣故以是而知末世衆生所以不得成道者非無所因故云由是無始等也無始者遠指晦昧真心不得其始之時晦昧真心依於無明轉成阿賴耶識而計我之心生焉由計我故妄分自他設有違自而順他者便起憎心又有違他而順自者使起愛心於人既爾於法亦然由此而於人中法中起憎起愛熏成一切愛憎種子納於八識田中謾説不知修行縱使修行亦不過除其現行而識田種子故未解脫道云何成以遇緣即興能為障道緣故是知欲成道果必將識田種子盡解脫也得盡解脫其相云何故云若復有人為借人而示相故怨家者懷勝怨於心遇則有損乃人中之最可憎者父母者係至親於身依則有益乃人中之最可愛者而云觀彼怨家如己父母則勝怨無過憎至親無過愛故云心無有二蓋必於自他憎愛種現俱盡者乃能如此故云即除諸病謂種現俱盡也又前之四病皆由憎愛而生果其種現俱盡則諸病皆不有矣然已上約人中憎愛而四病屬法中憎愛人中憎愛雖種現俱盡何以並諸病而俱無耶恐有是疑故次下為之例明於諸法中自他憎愛者如自起作心他起止心必愛作而憎止若自起止心他起作心必愛止而憎作如止作既爾任滅亦然是名法中憎愛除此者但盡現行若觀彼煩惱生死如菩提涅槃心無有二則是種現俱盡故云亦復如是謂亦復如觀彼怨家如己父母心無有二是也夫自他憎愛為致病之親因實障道之勝緣發起雖由我執肇始端在無明前已散漫開示恐不介意今於開示去病之後再為叮囑最忌在知識邊起且欲令種現俱盡生茲末世懸受佛慈三復誠言不禁流涕有志圓覺者尤宜留意開示行病竟四開示發心善男子末世衆生欲求圓覺至如是發心不墮邪見此科如金剛般若中開示降心文義大同圭峯憨山兼有此論彼經云佛告須菩提諸菩薩摩訶薩應如是降伏其心今云末世衆生欲求圓覺應當發心作如是言彼經乃教以用四心降妄心今經直教以發四種心以四心既發則妄心不待降故又彼經云所有一切衆生之類略分胎卵濕化等十是名所度衆生今云盡虗空界一切衆生則十類俱該平等普度不擇怨親難易等即廣大心也又彼經云我皆令入無餘涅槃無餘則超過有餘是到家法今經云我皆令入究竟圓覺究竟則跨越始本亦到家法即第一心也又彼經云如是滅度無量無邊衆生實無衆生得滅度者實無則不見衆生可度雖無量無邊不生難度之想今云於圓覺中無取覺者亦是不見衆生可度如是乃能常度即常心也又彼經云何以故若菩薩有我相人相衆生相壽者相即非菩薩初徵何以故者謂以何以故必定不要見衆生為可度耶釋中以若見衆生可度則四相一時俱作即非菩薩今經無徵詞直言除彼我人一切諸相即不顛倒心也彌勒偈頌彼經義云廣大第一常其心不顛倒此四心之所由名也又彼經云涅槃此經名圓覺者準前文殊章云有大陀羅尼名為圓覺流出一切清淨真如菩提涅槃是知圓覺即是一心菩提涅槃皆隨緣異稱耳如是發心不墮邪見者顯示我人等相皆邪見故總結應求開示長行竟二偈頌標頌云爾時世尊欲重宣此義而説偈言正頌準長行有五偈頌為四亦略乃約義略頌四一單頌正示求人二合頌依法離病三合頌修行解脫四正頌開示發心初普覺汝當知末世諸衆生至心遠二乘者既求正知見人且又遠於二乘即當遵依今不頌者準長行可知也二合頌依法離病法中除四病謂作任止滅法中句頌依法離病作止句頌別示病相不頌離病即正者義中含故三合頌修行解脫親近無憍慢遠離無瞋恨至戒根永清淨親近二句乃略頌修行入圓中義著能於知識邊無憍慢瞋恨之心即是修行可以入圓也親近者知識俯就機宜學者易生憍慢是障道緣故以無戒遠離者知識別應他緣學者易生瞋恨亦障道緣故以無止見種下五句乃重頌長行中解脫憎愛即除諸病文不甚類蓋約義頌也見種種境界者謂見彼知識現逆現順等種種境界心當生希有者見順不生過愛見逆不生過憎總以內心作希有想難逢難遇縱有惡行還如佛之出世蓋生心如佛想耳既如佛想則順行固不疑其犯非律儀而逆行亦自知其戒根清淨如此而親近知識非自他憎愛種現俱盡者無能為也合頌修行解脫竟四正頌開示發心度一切衆生究竟入圓覺至證覺般涅槃一切衆生該盡空界平等普度即廣大心也究竟者超過始本證入圓滿覺性即第一心也無彼我人者是已達無取覺者即不顛倒心由於常心也發此四心即是正智正慧依之修習離於自他憎愛便得超出邪見正因既成妙果堪陟故云證覺般涅槃謂證入圓覺乃般涅槃是知金剛般若稱為無餘涅槃今經稱為究竟圓覺者無足異焉總結大科四問四答教修分竟四一問一答示果分三一謝前請後二師資緣合三應求開示初二一具儀謝前二請後顯殷初二一衆中具儀二謝前受益初於是圓覺菩薩在大衆中至長跪叉手而白佛言此章以圓覺菩薩為主示真實果法非深證圓滿覺性者不能契故餘衆皆伴故云在大衆中餘可知二謝前受益大悲世尊為我等輩至令末世衆生有大增益近受現前之請遐被末世之機故稱大悲世尊為我等輩應現前機廣説淨覺種種方便者通指自信分以來由解分而至修分如來重重開示皆為廣説修習淨圓覺中種種方便逆指即如除病離相修觀滅幻等令末世衆生者遐被未來不惟現會法衆蒙益將此法門展轉傳於如來滅後正法像法已過末法之時令彼末世衆生依此種種方便漸次修習於最上圓覺便可登陟故曰有大增益具儀謝前竟二請後顯殷二一請後方便二至三顯殷初世尊我等今者已得開悟至及末世衆生施大饒益當機菩薩自指現前大衆故云我等今者耳提面命親從佛聞故云已得開悟謂開悟云何生信云何發解云何起修非獨指解分為開悟也末世衆生生在佛後未得親奉金言不知云何生信云何發解云何起修故云未得悟者既未得悟或隨分思察或建場尅期皆可由於自便設若逢於夏首必當安居修習然安居儀式大小攸分故以云何為問謂或以大乘或以小乘求佛尅定儀式乃敢遵照修習若不然者恐誤修無所用耳圓覺清淨境界五住不雜二死不染彌滿清淨中不容他故此圓覺中三種淨觀者謂前説修習圓覺用三種淨觀皆約已悟者説如彼文云若諸菩薩悟淨圓覺以淨覺心取靜為行等是也今約末世未悟但不知奢摩他中以何為首三摩提中以何為首禪那中以何為首故並問也惟願大悲者求佛哀愍為諸大衆者近益現在及末世衆生者遐益後來施大饒益者令其隨順修習進證大圓覺果故請後方便竟二至三顯殷作是語已五體投地如是三請終而復始準前可知謝前請後竟二師資緣合二一師與資合二資與師合初爾時世尊告圓覺菩薩言至汝今諦聽當為汝説當場一問現會與末法兩利故重言善哉而讚美之進示果頭之法非具足圓覺者不能設問故曰汝等乃能顯降斯則不能也如是方便者略明有二一通相方便謂修習圓覺之通方便二別相方便謂三種淨觀之別方便觀佛答處自知得別方便則三觀可成得通方便則圓覺可證是為菩薩以大饒益施諸衆生既師緣與資合故教以諦聽許以當説謂時下即當説也師與資合竟二資與師合時圓覺菩薩奉教歡喜及諸大衆默然而聽奉教歡喜者奉誡許之教喜不枉問故及衆默聽者希聞二方便得大饒益故師資緣合竟三應求開示二一長行二偈頌初三一開示通相方便二開示別相方便三開示鈍根修證初四一隨分思察方便二尅期修習方便三結夏安居方便四入期示無誤取初善男子一切衆生若佛住世至隨分思察如我已説善男子者呼當機令著意勿虗聽也一切衆生者不論有佛時無佛時但有具大乘性者皆總該之若佛住世總指有佛時也若佛滅後總指無佛時也又無佛之時法運有三一正法時謂去佛不遠法未鄰邪有教有理有行有果二像法時謂去佛漸遠像教僅存有教有理有行證果者幾希矣三末法時去佛遙遠空騰似量教理雖有行界兩亡今上云若佛滅後兼正像而總言之下云若法末時乃別指空騰似量時也必別指者以此時教理雖有行果兩希尤在可愍故有諸衆生者有佛時多有以耳提面命發菩提心者多故無佛時在正法亦多有以法未鄰邪發菩提心者亦多像法時則不多以像教僅存發菩提心者少故至末法時空騰似量發菩提心者間有有則名為具大乘性既具大乘種性必能信佛所證圓覺良以大圓覺心惟佛獨證故稱祕密以餘衆不能知故雖餘衆不知設有具大乘種性者亦能信佛必證並信我若成佛時亦必證因而發心修習故稱欲修行者伽藍略梵語具云僧伽藍摩此云和合衆園謂方來僧衆和合共住清淨園林德臘俱尊者可以主之故云在也四事務令無闕徒衆方能安處如是則未免夤緣故云有緣事故不能一向修習故云隨分思察謂隨其所應修之分際分分思察先令妄盡遠淨覺次令隨順還圓覺如我前與普眼菩薩已經逐一而説隨分思察方便竟二尅期修習方便若復無有他事因緣至過三七日一向攝念初道場尅期既不主持伽藍亦不匡徒領衆故曰無有他事因緣以上科主持伽藍匡徒領衆皆為利他分中事故利他事繁不能一向修習故惟令隨分思察今既無有利他事中因緣唯以自利為重故令即建道場道場者修道之場而云建者或方或圓或大或小周圍標定分際如法誦呪結場務令與外人外事不相涉故當立期限者尅期奮勇道易成故若立長期百二十日者約上根一期之內誓期必證諒其期得四箇月也中期百日者約中根恐過長則力倦無若合中促其期於兩旬日也下期八十日者約下根一期不成還容再修於彼中期減兩旬日則已是也然如來既定三期非無所為蓋以人根不齊務令下根者種中根者熟上根者脫設不然者則上根自能遠圖中根或可勉就至於下根鮮有不望巖者矣安置淨居者於道場內安置淨修之居如結戒場大界為不失衣界內又結小界為作法辦事處也若佛下禮佛求懺若佛現在者如來住世時也如來住世道場不能往禮惟當正念思惟謂思惟佛之法身遍一切處隨所禮處即是佛故若佛滅後如來去世時也如來去世禮佛應須設像設像不過木雕泥塑惟在心存是佛目覩想佛生正憶念者謂憶念法身常住本無有滅即此木雕泥塑還同如來常住之日懸諸幡華者幡華於前中為幔而結搆之華懸於空類天散而飄鼓之如今之設壇禮懺務期盡美盡善極力竭誠即真供養謹運一心經三七日稽首十方佛名求哀懺悔懺謂懺除前𠎝悔謂悔不更造身心既淨道果堪成如滌淨器以備成貯甘露法味遇善下獲效徑修遇善境界者或禮應光華或夢驗佳祥不作聖心名善境界自然獲得心意輕安謂既不昏沉亦無掉舉也然雖如是亦不過三七日以感應道交理方定故一向者驀直去絶擬議永不退故攝念者攝妄念成正觀契圓覺故尅期修習方便竟三結夏安居方便三一標大異小二對佛陳詞三逾期隨往初若經夏首三月安居至心離聲聞不假徒衆大疏云然建道場或在伽藍或於餘處期限未滿夏首已臨若入衆安居則乖誓約若自終限期又犯毗尼道場中人由此疑惑如來遠念故為辨明設為俗乖律則非今因大廢小無失故決定毗尼經説持聲聞戒是破菩薩戒持菩薩戒是破聲聞戒言當為者既經夏首不便出入遊化大小兩乘皆當作安居法也清淨有二一心性清淨約菩薩説二境界清淨約聲聞説止住即是安居然既知剋期修習求證圓覺縱安居亦當作心性清淨菩薩止住心離聲聞者不必將心又入聲聞境界清淨場故又聲聞安居必先集衆問和且安居亦必白僧須假徒衆令既不入彼衆故不假也標大異小竟二對佛陳詞至安居日即於佛前至大因緣故不繫徒衆初屆期白佛踞修至安居日者遵佛制順此方四月十五為前安居日大小兩乘皆至此日安居即於佛前者顯是大乘以小乘作僧事辦白僧即是今云佛前者以大乘作佛事辦應白佛故作如是言者謂對佛作念如是如是而説非出聲唱言也我者顯自陳言非關他故比丘及尼是出家二衆優婆塞夷是在家二衆按小乘安居唯許出家二衆今是大乘且是約心性安居非關方處通在家亦無傷故即約尅期同修之四衆而總言之踞菩薩乘者謂依踞菩薩大乘之法修習真如寂滅行故蓋寂滅者依真如而立名謂真即無妄離言説相名寂如即不變離心緣相名滅稱此理而修因名之為行也同入下正陳菩薩安居同入清淨實相住持者行行契真名為同入清淨實相者在本經名為淨覺約起信即是心真如門清淨者一念不生實相者守其自性即此一念不生守其自性便是住持如道場之安置淨居類戒場之內結小界雖理事有異而分限頗相似故以大圓覺為我伽藍者大圓覺性在本經首稱大陀羅尼依華嚴即是一真法界為我伽藍者陀羅尼總一切法持無量義一真法界該真如門合生滅門修因證果總在裏許有伽藍義如尅期之建立道場類戒場之不失衣界其分限亦頗相似身心安居者最初元以真如不守自性變起藏識心海其次又以境界風動轉生前七識浪從此前五識趣逐外塵第六識內緣影事因而帶纍五蘊身心不能安居今既同入清淨實相住持前五識既不趣逐外塵第六識亦不內緣影事纍不及蘊故得身心安居至於第七末那向以六識為用內緣八識為體今既身心不動則六識不行分別是第七無用外無所緣矣外無所緣自不計八識為我而內亦無所緣矣內外無緣則第七末那居然平等性智而藏識心海仍歸真如起信論云心真如者即是一法界大總相法門體所謂心性不生不滅不生不滅即是涅槃自性謂涅而不生槃而不滅故不生則不繫於有不滅則不屬於空故云無繫屬故據此則是同安居於圓覺普照寂滅無二性中無繫屬於方隅界限故如上所説以大圓覺為我伽藍者意在於此我今下敬請不例餘衆聲聞安居期限亦屬佛制不敢違故蒙允則雖違無遇也不依聲聞者稱性安居與彼不同故當與十方等謂佛及菩薩皆住清淨實相以圓覺為伽藍自亦與之同故三月安居者定以三月為期不類聲聞前後兩安居故所以不拘小節者為修菩薩無上妙覺大因緣故不繫徒衆者恐彼不能隨大並小亦失故對佛陳詞竟三逾期隨往善男子是名菩薩示現安居過三期日隨往無礙然大乘既以清淨實相為住持以大圓覺性為伽藍即是安居何必夏首蓋為惜事表法示現夏首安居亦為令彼本無大志邈示夏首安居者知所耻焉過三期日隨往無礙者大疏云道場三期日滿小乘夏限未終以本非小乘安居故不妨隨往無礙結夏安居方便竟四入期示無誤取善男子若彼末世修行衆生至一切境界終不可取末世修行邪正難分求菩薩道最宜慎重況夫既入三期未免尺水丈波若是彼從佛所聞一切境界如奢摩三摩禪那漸修頓修圓修乃至二十五輪觀等取之而修終有巨益若非彼從佛所聞一切境界如事水事火事天奉時奉方奉塵乃至二十五冥諦等取之而修必招奇損故以終不可取而示戒之開示通相方便竟二開示別相方便四一修習奢摩方便二修學三摩方便三修學禪那方便四遍修即名佛出初善男子若諸衆生修奢摩他至一切境界終不可取初示方便言悟淨圓覺以淨覺心修奢摩他如前已聞命矣若末世未悟衆生欲修奢摩他者最初從何下手故教以先取至靜謂先當憶想一切所有諸法皆如幻如化不生取著不造業不受報則至靜矣如此雖能了於生死仍復取著涅槃若知涅槃亦如幻化則是靜極如是則圓覺妙心脫體畢露故曰便覺如前普眼章云證得諸幻滅影像故爾時便得無方清淨無邊虗空覺所顯發覺圓明故顯心清淨等是也如是下明修習言靜極非可遽至修習必由漸來故先言如是初靜從於一身謂先從一身靜也如前普眼章云我今此身四大和合乃至云四大各離今者妄身當在何處以是而觀即知此身畢竟無體是為一身靜故如一身既爾一切身亦然情世界既爾器世界亦然不及細陳但超略言之故云至一世界覺亦如是如依鏡生垢去得一分垢即能顯得一分光故善男下顯利益若覺遍滿句牒上覺遍一界然覺性靈明有境必照故於一界衆生凡有起一念處皆能了知如覺遍一界既爾覺遍百千世界亦然然此於六通之中似屬他心若復能於百千世界衆生有念皆知又非聲聞他心之所能及他心既爾通通皆然佛知佛見不外是矣亦如垢盡鏡明凡有臨於鏡光者無不照焉如普眼章云一切實相性清淨故一身清淨一身清淨故多身清淨多身清淨故如是乃至十方衆生圓覺清淨善男子一世界清淨故多世界清淨多世界清淨故如是乃至盡於虗空圓裹三世一切平等清淨不動善男子虗空如是平等不動當知覺性平等不動如是等文乃極力發揮此旨此若不明當細閲彼文自知非彼下戒誤取準前可知修學奢摩方便竟二修學三摩方便善男子若諸衆生至一切境界終不可取初示方便若諸衆生指末世未悟者説末世未悟欲修三摩提者最初從何下手故教以先當憶想十方如來及諸菩薩所以為如來為菩薩者無非修因證果而得如是則為我之師我之友矣依種下明依修謂既憶想已為欲師之友之即便依彼所説種種法門漸次修行設遇心若馳散即當精勤辛苦修諸三昧定慧均等方成妙悟廣發下冀當益恐現前不悟更冀將來故教以廣發大願如彌勒章云若諸末世一切衆生於大圓覺起增上心當發菩薩清淨大願應作是言願我今者住佛圓覺求善知識莫值外道及與二乘依願修行漸斷諸障障盡願滿便登解脫清淨法殿等是也自熏成種者謂廣發此願自能漸次熏習以成悟證種子納於八識田中才出頭來一聞千悟者固有之矣非彼下戒誤取亦準前可知修學三摩方便竟三修習禪那方便善男子若諸衆生至一切境界終不可取初示方便若諸衆生仍指末世未悟言末世未悟衆生欲修禪那者最初從何下手故教以先取數門謂數息觀也蓋以修奢摩時先取至靜偏於靜則墮聲聞緣覺修三摩時先取憶想偏於想則近凡夫外道今則攝想念於一息超出凡外化至靜於計數不落聞緣威德章禪那成時超出礙無礙境此數門乃其漸耳心中下明修習了知者了了分明知彼一出一入之間有生念住念滅念之不紊故念才起為生念既起為住念將盡為異念既盡為滅今不言異者以是將滅以滅念攝故所以諸經論中有言三相有言四相者無足異也分劑頭數者生有生的分劑住有住的分劑滅有滅的分劑一數至十數從頭數之務使了了分明其所以攝散入寂化寂不住之方便再無有過於此者又此上乃約初心修習靜坐時數息言之如是下又約久修工純四儀不廢故曰周遍四儀等也分別念數者謂分析辨別一出一入之間有生念住念滅念又合此分劑為一息如是一息一息從頭數之十數無不了知其所以攝散入寂化寂不住之工較前益綿密矣漸次下顯利益然攝散入寂不被事礙化寂不住不被理礙如是漸次增進絶待靈心欲發由彼潛興密運之力不唯知息知念知數竟至無所不知有法皆了先且舉一最難知者為例故云乃知百千等佛意以百千世界最遠難知一滴一滴之雨最繁難知此且得知其餘近者減者不待言矣猶如目覩句喻明所知了了如觀掌果非依俙見也非彼下戒誤取仍準前知修學禪那方便竟四遍修即名佛出是名三觀初首方便至即名如來出現於世是名句總結上三言未悟之人先依此修故云初首方便若諸衆生者約末世未悟者言三種所修法約如上所列而説遍修者一法不遺精進者以悟為期悟後之修任運流入果海懸記佛出非漫説耳開示別相方便竟三開示鈍根修證若後末世鈍根衆生至心不放捨漸次求證若如來滅後末法之世其利根修證不待言矣設有根性遲鈍衆生以既悟覺心欲求佛道屢修屢廢不得成就蓋由昔業所障應當勤求懺悔事懺則嚴設華壇禮佛誦經持呪理懺則晏坐靜室觀察罪性叵得遇善境界得心輕安然後一向攝念常起二種希望一者希望斷憎愛惑二者希望求勝上心斷憎愛惑者憎謂於違情境起憎惡心亦即根本煩惱中瞋以憎則必瞋故愛謂於順情境生愛染心亦即根本煩惱中貪以愛則必貪故嫉妬諂曲皆小隨煩惱以是根本煩惱等流之性故名為隨雖名為隨乃各別而起故名為小嫉謂徇自名利不耐他榮妬忌為性故名嫉妬瞋一分攝諂謂罔冒於他矯設異儀險曲為性故名諂曲貪癡各一分攝又此與憎愛通名為惑蓋惑者不明不明即癡如憎之不已而繼之以嫉妬愛之不已而繼之以諂曲其癡為何如哉所以根本煩惱中但言憎愛不顯癡義者以癡固有之無容更顯耳求勝上心者求即是發以為求必發故勝上心即無上菩提心也菩提心超出權小名為勝心一切心無能加於其上名為上心三種淨觀乃指從前所説承悟所修三觀此以鈍根恐其不能兼修故且教隨學一事謂隨其本意於三觀中且學一觀之事以事專於一則易成故設於此觀不得或因宿習不對故又教其復習彼觀如是而遞互修習總教以心不放捨漸次磨煉必求證入果到時至機熟自應推門落臼如世尊雪嶺六年成道必待臘月八日即其證焉總結應求開示長行竟二偈頌標頌云爾時世尊欲重宣此義而説偈言正頌準長行分三一頌通相方便二頌別相方便三頌鈍根修證初準長行分四一隨分思察方便二尅期修習方便三夏首安居方便四入期示無誤取今不頌一三分二一頌尅期修習方便即長行第二二頌入期示無誤取即長行第四初亦惟約義略頌圓覺汝當知一切諸衆生至然後正思惟偈頌所説不出長行恐不著意故教以當知假當機警餘衆也雖通説一切衆生而大悲深懷末世以彼去佛遙遠正道難行故欲求無上道即已發阿耨菩提心者當先結三期者人根不齊對三根結上中下期使其有所希望心故懺悔無始業者禮佛求懺悔先業而蕩心器以備承受甘露法故經於三七日者先業已懺心器已淨趣求佛道志方定故然後正思惟者離於妄想修正觀契正覺也二頌入期示無誤取非彼所聞境畢竟不可取長行云終不可取此云畢竟不可取皆深戒之詞也頌通相方便竟二頌別相方便長行分四前三即是三觀偈但標其名義合而為一乃分二一合頌三觀名下帶義二結頌遍修即名佛出初奢摩他至靜三摩正憶持禪那明數門奢摩下帶至靜二字三摩下帶正憶持三字禪那下帶明數門三字皆略示初首方便之義二結頌遍修即名佛出是名三靜觀若能勤修習是名佛出世首句總結上三長行中初首方便四字此不頌者以三名下已各帶示上相離未遠不頌即知故精勤修習悟本覺而成始覺是即名為佛出世也頌別相方便竟三頌鈍根修證鈍根未成者常當勤心懺至佛境便現前初首方便以悟為期悟後之修利根者自能成就設有鈍根不能成就者定由宿業所障故當勤心懺悔無始罪障果得諸障消滅自然佛境現前見光見華驗知清淨不作聖心從此進修如風帆揚於順水再無不成者矣總結以上正宗分竟三流通分正宗既陳現有衆已𫎇深益世尊云歿未來機不獲親領接續慧命要愚四依闡揚法門還冀五德然傳講雖憑慧力而護持要假威神賢善首一一請問調御師疑欵教酬大教流通自應百千萬世而無滯無壅矣分四一謝前請後二師資緣合三應問教酬四總結流通初二一具儀謝前二請後顯殷初二一衆中具儀二謝前受益初於是賢善首菩薩在大衆中至長跪叉手而白佛言此章以賢善首為主能宏人天小乘曰賢能宏始終大乘曰善能宏圓頓一乘曰首請問流通端賴斯人餘衆皆伴故云大衆中三業虔誠俱照文殊章釋二謝前受益大悲世尊廣為我等至開悟如是不思議事信解行證極力開示現會末世普令受益故稱大悲世尊廣為我等及末世衆者約教則廣説無蘊約機則廣被無遺稱大悲稱世尊正為此也開悟上文稍不足若加普令二字照應廣為二字義則足矣如是不思議事通指正宗十章謂如是如是生信如是如是發解如是如是起行如是如是證果一一皆能開曉一一皆能悟徹其受益誠為不可思議事也具儀謝前竟二請後顯殷二一請名持護二至三顯殷初此大乘教名字何等至流布此教至於何地此大乘教指上正宗所説已知其為文義是大乘教法若為隨順時機取益當來應立名字敢問此經名字當稱何等必求佛説者以因名思義乃可奉命傳持佛若不説我等云何奉持此請經名奉持為第一問也奉持此法度生令信全憑開導經功佛若不説我等云何開導敢問依經修習能得何等功德此請修習功德為第二問也依經修習魔心生妬尺水丈波要假護持敢問世尊以云何力使我護持經人此請擁護持人為第三問也又持經得護修習則魔事不生流布無功化他則逢難便退敢問世尊流布此經功成至何地位此請流布何證為第四問也請名護持竟二至三顯殷作是語已五體投地如是三請終而復始釋義準前謝前請後竟二師資緣合二一師與資合二資與師合初爾時世尊告賢善首菩薩言至汝今諦聽當為汝説既為現前菩薩又為末世衆生益有兩關故重言善哉而讚美之會衆意同共推賢善首出問主伴之心惟佛能知故以汝等稱之乃能者顯餘衆未必能問如何後所説修習所得之功流布所至之地令惡魔及外道無能惱亂皆係經教功德大方廣圓覺修多羅了義等皆係經之名字若非深證圓覺自他兩利假經教之力用縱有問亦未必能如是之詳且備也為諸菩薩者正為現在及末世衆者兼為後來如上所釋益有兩關者以此經教功德名字上釋乃能處業已略敘至下釋佛答再指誡以諦聽許以為説者正顯師與資合設不合則不誡亦不許也師與資合竟二資與師合時賢善首菩薩奉教歡喜及諸大衆默然而聽賢善首菩薩是請主故所以奉教歡喜及諸大衆者發請意同所以默然而聽此亦意顯資與師合設不合則不喜亦不聽也師資緣合竟三應問教酬準前賢善首請問有四一請名奉持問二修習功德問三擁護持人問四流布至地問今答中四義俱有但與前次第不同又四答中正答之外間有添之文隨四答前後今亦四一答請名奉持問二答流布至地問三答修習功德問四答擁護持人問初二一起樂生信二依問正答初善男子是經百千萬億恆河至十二部經清淨眼目初為起欣樂法華云諸佛世尊出現於世唯為一事若不説此者出世無所為故是知此經乃諸佛共説而言百千萬億恆沙者亦無數之數實無佛不説也守之者非時不説必時至乃説護之者非機不傳必機熟乃傳是知三世如來守此護此務令此法常住無有壞滅法華彌陀等經咸稱諸佛護念者亦斯意耳必言此者為令現會菩薩於是經起欣樂心故十方下為生信重本經云有大陀羅尼門名為圓覺流出一切清淨真如菩提涅槃及波羅密教授菩薩然既稱教授菩薩則應為十方菩薩之所歸依又既稱大陀羅尼則總一切法持無量義是知得證圓覺便能明了一切法義故為十二部經清淨眼目必言此者為令末世衆生於是經生信重心故起樂生信竟二依問正答是經名大方廣圓覺陀羅尼至汝當奉持初正答經名經有五名題惟取二初中又減去三字總釋名題中業經詳釋餘三名亦略敘其義此則似無容更贅然經中義既無盡而名又何妨再釋第一名大方廣圓覺陀羅尼是法義總別為名謂圓覺是法大方廣是義此法能總一切法此義能持無量義故又以陀羅尼稱之以梵語陀羅尼此翻總持謂總一切法持無量義故是則上五字是別下三字是總名題中取別遺總故第一名惟存五字第二名修多羅了義是境智相對為名上稱此經為十二部經清淨眼目十二部則十二分也今稱為經者以分雖各有別名凡屬佛説者皆可以經名之是知修多羅三字即通指十二部經其間所詮法義如頓漸偏圓等皆為所照之境了義二字即是圓覺妙慧於彼十二部經頓漸偏圓等義一一皆悉能了即為能照之智境智相對故以修多羅了義名之第三名祕密王三昧是定動無礙為名三昧者即普賢章所謂如幻三昧是也靜觀諸法皆如幻化於諸法中一念不生即成三昧名之為定既知幻已即起諸幻以除幻者變化諸幻而開幻衆得大自在喻之為王名之為動然此動非離定而有乃即定而動此定非離動而有乃即動而定或有衆生但見定而不見動則動成祕密或有衆生但見動而不見定則定成祕密其實無礙故以祕密王三昧名之第四名如來決定境界是真如不變為名如來者能證圓覺人也能證圓覺直以圓覺度生而生多迷悶因以真如門而接濟之如文殊章中所釋滅妄還淨覺是也決定境界即是真如本經名為淨覺以不變故稱為決定滅妄顯故稱為境界若依此而隨順修習即還圓覺一經能事不出乎此故為名也第五名如來藏自性差別是藏性隨緣為名上名約頓教一乘人立言頓教一乘人雖背圓覺迷途未遠但以真如門接略加隨順便至圓覺此名約終教等大乘人立言終教等大乘根性背圓覺迷途漸遠若但以真如門接恐其間不無點額乃又以生滅門而曲成之如來藏即是真如因其中具足佛性又能依此出生諸佛故易為如來藏名自性差別者自性隨緣而成生滅門也生滅門中則有多種差別謂倐以無明不覺便生三細境界為緣復長六粗所謂迷途漸遠是也迷途漸遠以此門而曲成之者令知從真既可起妄返妄便即歸真就路還家更無煩希奇仰異況夫歸真近圓其進證又何難哉如本經彌勒章之五性差別淨慧章之五種隨順皆約生滅門中曲成圓覺之義以斯立名良有以焉最後一句兼答奉持準前賢善首請云此大乘教名字何等云何奉持今世尊既云五種名字末復教以汝當奉持奉謂奉以自修持謂持以教人自他兩利皆須因名思義故教以汝當謂應當因名思義而奉持之則自他兩利其庶幾乎答請名奉持問竟二答流布至地問問在第四答在第二又答前有加添之文應分二一至地之由二依問正答初善男子是經唯顯如來境界唯佛如來能盡宣説唯顯如來境界者謂如來自無始發心已來如何生信如何發解如何起行如何證果如何從因至果一切所有境界皆於此經顯示言唯顯者不涉餘乘況夫異學益知其無與於此經矣或問如來境界不可思議經唯二卷豈能盡收故世尊又以唯佛如來能盡宣説示之如文殊章初説本起因地圓覺章終説遍修遍證縱是鈍根還許此觀不得復習彼觀心不放捨漸次求證況夫中間説五性差別説五種隨順説次第三觀説二十五輪説四相之迷識迷智教以併銷説四病之任滅作止令其勿留其説可謂詳且盡矣夫何遺焉至地之由竟二依問正答若諸菩薩及末世衆生至漸次增進至於佛地若諸菩薩及末世衆生者先敘能流布人依此修行者正敘所流布教前問流布此教惟顯利他此答依此修行兼顯兩利蓋未有自不利而能利他者故此兼顯正見其自能受持又能以茲流布不便雙稱故渾言修行漸次增進者生信發解起行至於佛地者即是證果設問如何依此修行便能爾耶以此經惟顯如來境界依之修行自應至於佛地所以將欲答問先出至地之由者以此答流布至地問竟三答修習功德問問在第二答在第三又答後有加添之文亦分為二一依問正答二較量功德初二一法説二喻顯初善男子是經名為頓教大乘至亦攝漸修一切羣品是經借言顯理明理忘言不立文字但一念不生即名為佛不依地位漸次而説故名頓教大乘者不接小機謂聲聞辟支所不及故又此不惟是大乘且是一乘謂是經唯顯一佛乘故今名為大者非對小言大之大乃超出一切名之為大如法華門外三車牛對羊鹿即名為大若比大白牛車則非真大今是大白牛車乃真大也頓機衆生者積劫因成未及果證今生才出頭來一聞千悟順行如善財逆行如鴦崛皆為頓教之機從此開悟者一聞此經頓開心地悟證圓覺所謂必至佛地者即其大也然此乃約機教相對成就開悟固如是之深且疾耳要知頓即近圓隨順而可至圓教故亦攝漸修一切羣品如始終二教菩薩小教聲聞緣覺及彼世間六道衆生但有聞法者無一不成佛故能並攝如彌勒章云由於欲境起諸違順境背愛心而生憎嫉造種種業是故復生地獄餓鬼若聞此而不生憎嫉不造衆業則三途亦可成佛又云知欲可厭愛厭業道捨惡樂善復現天人若聞此而既捨惡業復超善業則欲界天人亦可成佛又云知愛可厭棄愛樂捨還滋愛本便現有為增上善果若聞此而既捨諸愛亦不樂捨罔滋愛本則上二界亦可成佛又云由本貪欲發揮無明顯出五性差別不等若聞此而離本貪欲不發無明則五性差別皆可成佛是知此經所謂亦攝漸修羣品者以此經總攝一切漸修諸法門故法説竟二喻顯譬如大海不讓小流至飲其水者皆得充滿譬如大海不唯容納百川然亦不讓小流此蓋以大海必納百川不納則不能成其大故喻頓教必通圓教統攝一切諸大乘法不攝則不能顯其頓故然既通於圓則不惟統攝諸大乘法乃至小乘人天等法亦皆普攝故喻中以不讓小流喻之讓猶辭也謂辭之而不容入故海必不爾頓教通圓亦然此且喻教下乃喻機然大海既容納百川必能潛流四天下地而四天下中以任鑿井疏河灌園溉地所有王臣人民象馬牛羊等一一皆取之不盡用之無竭乃至蚊虻及阿修羅飲其水者皆得充滿法中謂頓教兼圓既能統攝諸大乘法必能潛利四位住行向地因心而四位因心中以任生智流辨談妙説玄所有應被之機一一皆隨心應量取足無窮乃至六道衆生及彼一切天魔外道等但有聞法佛種以納識田時至機熟佛果自爾圓成試觀本經喻文其間少有不足如喻教中但言不讓小流不言大流喻機中但言乃至蚊虻不言超略何等本疏先以私意補足然後以法貼合不敢言妥尚冀高明者教之依問正答竟二校量功德兩番校量益顯修習功德之不虛矣分二一施寶校量二施法校量初善男子假使有人純以七寶至聞此經名及一句義積聚也直解云世寶盈剎但資有漏至理一言轉凡成聖故功倍天淵施寶校量竟二施法校量善男子假使有人教百恆河至宣説此經分別半偈直解云小異雖多終無實證此經半偈成佛正因故難為比量答修習功德問竟四答擁護持人問問在第三答在第四前後俱有加添之文應分為三一顯當護因二正答當護三奉教護持初善男子若復有人聞此經名至種諸善根聞此經教初反顯當護聞經名非聞經義信不惑非是受持此人即非少福少慧便當護持如是下正明當護如是必從一佛二佛乃至盡恆河沙一切佛所積善積福聞經資慧既福多慧多益當護持言此以見向下之依教修習者定當護勿復疑矣顯當護因竟二正答當護汝善男子當護末世至惱其身心令生退屈先稱汝附稱善男子者顯是面囑當機令其著意非漫答也準前當機請云云何使我護持經人是直欲自領其事故世尊應其請而答之曰汝善男子當護末世是修行者佛意以但聞經名信心不惑尚是久供多佛多福多慧況復末世得聞是經依經修行自他兩利者又非前人之可比擬故直解云修習此法者乃慧命所係若惡魔惱亂生退則慧命斷絶故當護持也直解不言外道者以外道即魔侶故惱其身心者謂惱害其身惱亂其心故退屈者謂退失本念屈志從他也正答當護竟三奉教護持當機奉教護持事屬一定避繁不復更列今約餘衆分三一金剛護持二諸天護持三鬼衆護持初爾時會中有火首金剛至財寶豐足常不乏少初統屬具儀謂金剛衆統其眷屬具儀之義可知通稱金剛者依手中所持之杵彰名其威力全在杵故火首金剛者直解云謂頭有火𦦨即楞嚴所云化多淫心成智慧火乃菩薩示現者也摧碎金剛者以所持之杵能摧碎一切天魔外道等故尼藍婆金剛者圭峯憨山皆云未詳翻譯八萬金剛皆其同類并其眷屬乃所統徒衆耳世尊下護人及處有能持此者此字即指本經顯有則必護不空言耳決定大乘不指經説乃指能持之人以是決定求大乘人故如護目者顯護之最嚴即一塵一沙亦不使有犯故乃至道場等如前建立道場即是尅期修行處故自領徒衆者周界旋護晨夕守護者晝夜長巡如是則魔外不敢有犯自應無有退轉其家下兼護其家其家乃私居也永無災障等顯人眷平安財寶豐足等顯家道昌隆非金剛守護者莫由至此金剛護持竟二諸天護持爾時大梵天王二十八天王至常令安隱心不退轉初天衆具儀直解云大梵天王乃初禪王為娑婆世界主佛佛出世此王為請主二十八天總指三界諸天謂六欲天十八禪天四空天也須彌山王特舉帝釋乃忉利主護國天王乃四王天為守護國界之主私云大梵天王下已總標二十八天乃又特舉帝釋及四王者以其有統衆之威能護持故世尊下許護令安安而且隱自應心不退轉諸天護持竟三鬼衆護持爾時有大力鬼王名吉槃茶至我當使其碎如微塵初鬼衆具儀直解云吉槃茶亦云鳩槃茶此云可畏鬼食人精氣其疾如風變化無端住於林野管諸鬼衆故號為王不屬人天單居鬼趣座起禮繞而白具儀表誠可知世尊下許護持人朝夕侍衛魔外不能相犯故不退屈其人下指界相要直解云一由旬四十里言守護方隅可四十里內無災害也問此經乃佛住大光明藏為文珠等一類大菩薩説列衆尚無二乘為其絶分云何乃有諸天鬼神發顯守護耶答大光明藏即法性土理應自他平等説聽皆無但經家敘云於不二境現諸淨土據此則不惟現於受用而淨化亦該如華嚴積行菩薩曝腮鱗於龍門上德聲聞杜視聽於嘉會而世王妙嚴品諸世間主各證毗盧一德豈是絶無要知如來境界不可思議況此經直通乎圓豈可以有思惟心而妄興難問應問教酬竟四總結流通佛説此經已一切菩薩至皆大歡喜信受奉行佛本無説何嘗有己今約一期事畢名為説此經已一切菩薩即文殊普賢等當機之衆及其諸眷屬也天該天部龍該龍部鬼該藥叉神該俗樂法樂餘難備舉故總以八部及眷屬該之此皆尋常隨逐佛會衛法護教之者及諸天王等別指上來許護當經之衆金剛神吉槃茶總以等字該之一切大衆總結菩薩乃至梵王等也聞而思思而修終獲巨益故云皆大歡喜信謂信忍佛語受謂受領佛意奉行者欽奉佛敕展轉傳行所謂流通者正在是耳為謝世緣尋佛意隨文析義解茲經回施隨喜見聞人同證如來無上覺圓覺經者諸佛之真宗衆生之覺地迷之者沉淪於曠劫悟之者頓證於一時自古注解見有數家無非宣通聖教利益含識吾師闡教老人心冥至道情切為人先注法華楞嚴金剛等疏業經鏤板印施於禪課之餘偶念茲經未及發揮爰會古注復申己意依次研究章分句析務使義暢文通啓發初機不期年而告成目曰圓覺析義其意蓋欲公諸天下俾人人依此解修同入大光明藏共遊圓覺妙場也已門人心興稽首謹跋
