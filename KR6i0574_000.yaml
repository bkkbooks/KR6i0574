body:
  text: 圓覺經析義疏大義賢宗後學通理述嗣法門人心興較訂初通敘大義具足大方廣籠羅世出世法名之為圓貫通本始妙照徹凡非凡心目之曰覺非名色之可色詎音聲所能聲結集者不得已而聲之強云如是我聞又不得已而色之強云一時婆伽婆入於神通大光明藏三昧正受諭茲則圓覺不離當處佛果無容外求其如凡外夢沉長夜夢重夢而醒期莫由權小華起翳睛華再華而淨眼靡現故勞婆伽至尊於不二境現諸淨土併致法身清衆依淨覺天起大悲雲主伴重重同住如來平等法會古德目此為六種成就亦即以此為證信敘焉或謂本經敘闕發起私曰不然試看文殊師利創問如來本起因地次請菩薩發清淨心後及末世修行不墮邪見佛亦鄭重其機裁分兩義謂總標真宗別答前問總標真宗者總冠下文信解修證皆不離此真宗也先示體則曰無上法王有大陀羅尼門名為圓覺次彰用則曰流出一切清淨真如菩提涅槃及波羅密等別答前問者向下一一別答前來文殊之問也答初問則曰一切如來本起因地皆依圓照清淨覺相永斷無明方成佛道次徵釋云何無明謂一切衆生從無始來種種顛倒妄認四大為自身相六塵緣影為自心相如彼病目見空中華及第二月由此妄有輪轉生死故名無明修圓覺者知是空華即無輪轉亦無身心受彼生死末總結云是則名為因地法行隨答次後二問則曰菩薩因此發清淨心末世依修不墮邪見據此則普賢等十章皆依此文殊章而發起也敘分既竟正宗當陳遵照華嚴疏例大章分為四分第一三問三答生信分第二兩問兩答開解分第三四問四答教修分第四一問一答示果分生信分中三問三答者第一即普賢章也據普賢有略問有詳質有結請略問者由前佛答文殊謂本起因地皆以圓照清淨覺相普賢意以圓覺清淨境界非修行不能契入但不知云何修行方能契入也詳質者承前章知是空華即無輪轉等義來空華即幻故曰設知如幻者則身心亦幻若更用身心歷事進修則是以幻還修於幻則幻幻云何修耶又既知如幻更歷事修必令諸幻盡滅若必盡滅則無有心向後憑誰修行云何復説修行如幻又既知如幻本來不用修習若不修習則於生死中常居幻化既無觀行曾不了知如幻境界又無事修令妄想心如何解脫結請中承上不修有如是之失正顯決定應修但不知作何方便漸次修習乃能永離諸幻答中先云種種幻化生於覺心以為義本次云衆生幻心還依幻滅諸幻滅盡覺心不動正釋前疑末云知幻即離不作方便離幻既覺亦無漸次以酬其請復總結云依此修行乃能永離諸幻亦是答前云何修行之問也按普眼有三請四義由上章佛答普賢離幻法門教以知幻即離不作方便離幻即覺亦無漸次普眼意以有正方便思惟修行者或可悟入若無此者未免迷悶故連申三請初正請有四義初問修行漸次二問云何思惟三問云何住持四問作何方便二反請若彼衆生無正方便思惟聞佛説此三昧心生迷悶即於圓覺不能悟入三結請願與慈悲為我等輩及末世衆生假説方便答中先明二空觀滅除諸幻以便進修答正請中前三義後示法界觀令其悟入更進深玄答正請中後一義果能從此悟入住持大圓覺場同佛受用無庸再請其奈疑情不了又勞剛藏出座也按金剛藏菩薩因前章本來成佛之語遂代衆致難有三一云衆生本來成佛何故復有一切無明此以真難妄不應復有也二云無明衆生本有何故復説本來成佛此以妄難真不應説成也三云異生本成佛道後起無明一切如來何時復生煩惱此以本覺難妙覺還應起惑為衆生也初難顯自語相違以衆生本成是佛自語復有無明違自語故次難顯世間相違以無明本有世間共計復説本成違世間故三難顯總成非量以異生本覺非始覺終無成理如來妙覺既已成不復再迷三覺不明故成非量至觀如來立法立喻備悉開通末復斥以虗妄浮心多諸巧見如是分別非為正問新學聞此自應於大涅槃生決定信至下章彌勒謝前自知齊此已前為三問三答生信分竟第二兩問兩答開解分中第一即彌勒章也由上章佛答金剛藏云欲入如來大寂滅海乃至云先斷無始輪回根本等彌勒意以輪回由於愛欲愛欲起於六識生滅無常何能為本故初問云何當斷輪回根本其意以斷則須從賴耶邊起又根本既在賴耶種性應兼出世故次問於諸輪回有幾種性若輪回局在分段而變易即稱無輪無輪自應上修故三問修佛菩提幾等差別設有差別即兼邪正除邪歸正教化良難故四問回心塵勞當設幾種教化方便至觀如來應問而答備悉周詳新學聞之其間不無微解況夫如來偏憐末世衆生教以於大圓覺起增上心當發菩薩清淨大願莫值外道及與二乘等現前新學亦應有所感發所以不結解分者以正結解分須待下之清淨慧菩薩章也由上章佛教末世衆生於大圓覺起增上心淨慧意以起增上心必是求佛所證若爾則諸來法衆理應先聞故請為諸來法衆重宣法王圓滿覺性言重宣者顯前非不宣今為末世衆生令代傳也但圓滿覺性非可遽得故又問衆生菩薩世尊所證所得云何差別至觀如來答初請有三一約本覺以顯自性平等二約不覺及始覺以明執幻成差三約妙覺仍顯究竟平等如是則諸來法衆於法王圓滿覺性亦略以悉其槩矣答次問有四一謂勞慮永斷得法界性即彼淨解為自障礙是名凡夫隨順覺性二謂一切菩薩見解為礙雖斷解礙猶住見覺是名菩薩未入地者隨順覺性三謂有照有覺俱名障礙是故菩薩常覺不住是名菩薩已入地者隨順覺性四謂一切障礙即究竟覺乃至云法界海慧照了諸相同如虗空是名如來隨順覺性然末世聞此雖可隨順修習但任運成礙不覺則難入佛乘若果是頓圓之機只須居一切時不起妄念於諸妄心亦不息滅住妄想境不如了知於無了知不辨真實聞此而不生驚畏是則名為隨順覺性況復現前法衆親見如來三業殊勝面命耳提於諸法王圓滿覺性未有不黑夜觀火白日看山者矣齊此已前為兩問兩答開解分竟第三四問四答教修分中第一即威德自在章也按前信解二分雖皆開示圓覺却未指示觀門良以圓頓行人根性猛利言言見諦句句明宗若必令依觀分門反成鈍置故世尊於未悟之前却祇散漫開示今於既悟之後大用繁興不假理觀略有二失一自恃根性妄慧照而誤落有為二不念尊貴遇患難而易生退屈大威德知時知機説喻以請而云譬如大城者即喻圓覺妙心清淨法身之所依故外有四門者喻諸菩薩欲證圓覺隨機分門四法界皆可修故然四法界即三觀所照之境以是之故如來應其所求而示之以三種觀門至觀三種觀門最初皆云悟淨圓覺明知其是悟後事也又奢摩觀中而云以淨覺心取靜為行明是理法界境三摩觀中而云以淨覺心起諸幻化明是事法界境禪那觀中而云以淨覺心不取幻化及諸靜相乃至云永得超過礙無礙境受用世界及與身心明是理事無礙事事無礙二法界境末總結云此三法門皆是圓覺親近隨順一切圓證即成圓覺據此則始終惟一圓覺也此明三觀行相下明單復修習辨音章中菩薩名辨音者應是往昔因中修習輪觀成就無礙智慧發起無礙辨才今來輔佛揚化仍以辨音為名聞前章佛答威德三觀行相甚為希有良以觀門雖同根性不一故聞此諸方便一切菩薩於圓覺門有幾修習至觀如來答處有單修有統修有圓修單修則三觀皆能究竟統修中則三觀所統復各有三一疊復修二具足修三齊零修疊復修則先後兩不相違具足修中除能統則中後隨宜齊零修中合能所則隨便俱得至論圓修則以圓覺慧圓合一切無離覺性二十四輪同歸三觀之中一力圓修共成二十五種末復教以各安標記隨手結取驗知宿根先後一門而入然既稱輪觀還應就此一門輪替遍修如是則無障不銷無行不成修分中還餘兩章今且約淨業章言之按淨業菩薩因前章云一切如來圓覺清淨故此興問若此覺心本性清淨因何染污使諸衆生迷悶不入至觀如來答處而分迷識迷智二種四相迷識四相者一切衆生從無始來妄想執有我人衆生及與壽命由此便生憎愛二境依於憎愛造種種業由妄業故妄見流轉謂人間天上也厭流轉者妄見涅槃謂聲聞緣覺也由此不能入清淨覺此約凡夫二乘為識所迷動念息念皆歸迷悶迷智四相者由有無始本起無明轉成賴耶為己主宰相續求道皆不成就以四相未脫故如彼衆生微有所證不忘能證之智是即為智所迷名為迷智我相設悟能證為我雖不認證而於能悟不忘是又為智所迷名為迷智人相為對彼我故説名為人至又能了彼證悟為我為人雖二皆不取乃存有所了是又為智所迷名為迷智衆生相謂了此了彼生生不已故若更能覺彼能了及與所了而獨以能覺為真殊不知此覺即是一切業智猶如命根是最後為智所迷名為迷智壽者相於此四相不復迷執即入淨覺若更於中起心照見一切覺者皆為塵垢障淨覺故然此雖分四相其實惟一我執故後文處處發明不離於我又有我者一切煩惱因之而生是為大患急須斷除觀後偈云一切諸衆生皆由執我愛無始妄流轉愛憎生於心諂曲存諸念是故多迷悶不能入覺城其意自見此下即是普覺章也按普覺請問有五由上章勸依正修文云末世衆生希望成道無令求悟惟益多聞但當精勤降伏煩惱乃至云求善知識不墮邪見普覺意以末世衆生去佛漸遠賢聖隱伏邪法增熾初心道眼不明真似難免誤認故初問使諸衆生求何等人蓋求佛於衆多人中指出求何等人為善知識又既求其人必依其法故次問依何等法蓋求佛説出於彼所説法中當依何等之法而為軌持又既依其法必行其行故三問行何等行蓋求佛説出於彼所行行中當以何等之行而為專習又既行其行必有所得故四問去何等病蓋求佛説出於彼所得真似道中當去何等似病而存真藥又既得其道還須發度生心故五問云何發心蓋求佛説出於權實頓漸偏圓中當云何而發度生之心至觀如來答處答初問則曰求善知識欲修行者當求一切正知見人不住人天不著聞緣答次問則曰身現塵勞心恆清淨示有諸過常讚梵行答三問則曰應當供養不惜身命見彼示逆不生惡心答四問則曰所證妙法應離四病一作二任三止四滅答五問則曰一切衆生我皆令入究竟圓覺於圓覺中無取覺者末總結云末世衆生果其如是發心自不墮諸邪見齊此已前為四問四答教修分竟第四一問一答示果分中即圓覺菩薩章也菩薩名圓覺者謂已證圓滿覺性示居因門乃過來人也恐末世衆生於修因證果之際誤正難分故特為出衆啓請而云我等今者已得開悟謂我等親於佛前蒙佛開示於生信發解起行已得開悟至於證果自應無誤無庸更問矣第慮夫末世衆生未得悟者云何安居修此圓覺清淨境界按佛答通相方便此前應有二義一隨分思察二尅期修習今二俱不問而獨問云何安居者扶戒律故修此圓覺清淨境界者為所依之法體也至問三種淨觀以何為首者亦為末世未悟意求如來於事相中另開方便為三觀之入手處也至下如來答處自知按如來開示有通相方便有別相方便有鈍根修證通相方便有四一隨分思察二尅期修習三夏首安居四示無誤取隨分思察者謂主持伽藍匡徒領衆有緣事故不能專修聽其隨分思察如前普眼章中所説尅期修習者若復無有他事因緣當立限期長期百二十日約上根一期事辦以四箇月為限也中期百日約中根恐過長力倦無若合中促長期於兩旬日也下期八十日約下根一期不成還容再修於中期仍減兩旬如是則下根者種中根者熟上根脫故夏首安居者謂尅定之期限未終安居之夏首已至若入衆安居則修習之心約妄立若固守尅期而安居之毗尼有違如來懸念預示以當作清淨菩薩止住心離聲聞不假徒衆示無誤取者謂求菩薩道入三期者非彼從佛所聞一切境界如事水事火事天奉時奉方奉塵乃至二十五冥諦等取之而修必招奇損故示之以終不可取別相方便亦四一奢摩方便二三摩方便三禪那方便四遍修即佛奢摩方便者按前威德自在章所説三觀皆約悟後之修今約末世未悟修奢摩時最初從何下手故云先取至靜謂先觀一切衆生染著五欲造種種業從此眼不著色耳不取聲鼻不染香舌不貪味乃至意不攀緣則至靜矣此即以至靜為方便其次又以末世未悟欲修三摩最初從何處下手故云先當憶想諸佛菩薩我當師之友之倣修倣證此即以倣修倣證為方便又其次亦以末世未悟欲修禪那最初從何處下手故云先取數門蓋即以數息觀為方便良以奢摩中先取至靜不得意則墮落無為滯於聲聞緣覺三摩中倣修倣證不得意則流注有為雜於凡夫外道今則攝修證於數門有為不落化至靜於計息無為亦超威德章禪那成時超出礙無礙境此數門乃其漸耳遍修即佛者謂三種妙觀皆為成佛正因末世未悟不得其門而入今既蒙各示方便應即以方便深修或觀觀皆能究竟或三觀次第圓成或前後交互或單雙齊零或圓慧普照圓合一切如前二十五輪名為遍修但辦懇心必成巨益即名如來出現此名別相方便鈍根修證者謂雖在末世遇有根性通利者如上所説三觀周遍修習依因致果不待言矣設有根性遲鈍屢修屢廢皆由習業所障應當勤求懺悔此觀不得復習彼觀心不放捨漸次求證此又世尊懸念末世為後後際衆生重結無盡未來緣也正宗分畢次當流通即賢善首章也據賢善首菩薩請問有五一問此教名字二問云何奉持三問修習功德四問云何護持五問流布至地如來答中文雖隱顯義實相通初云是經名大方廣圓覺乃至如來藏自性差別汝當奉持此顯答初二問也次云依此修行漸次增進至於佛地此隱顯答三五問也隱流布功德顯修習至地向下一句勝大千寶施半偈超河沙小乘正顯功德無漏難思至於頓悟漸修聞信宣説即是流布亦通奉持末云汝善男子當護末世是修行者無令惡魔及諸外道惱其身心令生退屈此答第四護持問也於時即有火首金剛大梵須彌護國天王大力鬼王各領眷屬陳白佛言我等守護是持經人令不退轉由是觀之此經自應永遠流通而無壅滯也圓覺經析義疏大義終圓覺經析義疏懸示賢宗後學通理述嗣法門人心興較訂歸命婆伽婆所宣修證法文殊師利等十二百千僧三寶大威神冥資蠡管意佇思騰義路揮筆轉文乘用此攝含靈速成圓覺慧觀門如法煉果海以時登將釋此經啓以十門一教起因緣二藏乘分攝三能被教義四所被機宜五體性淺深六宗趣通別七傳譯紀略八注釋倡先九總釋名題十別解文義第一教起因緣有總有別總為酬因酬請顯理度生若原佛本意則惟為一大事因緣所謂欲令衆生開佛知見使得清淨故出現於世等是也別則別就當經有十所為一為示因行有本故良以欲行千里貴在初步設或因地不真自致果招紆曲為示行本故説此經如文殊問本起因地而佛説一切如來皆依圓照清淨覺相永斷無明方成佛道等是也二為示離幻即覺故良以金屑雖貴落眼成塵設或一翳在眼自致亂華盈空為示遠離故説此經如普賢問若彼衆生知如幻者身心亦幻云何以幻還修於幻若諸幻性一切盡滅則無有心誰為修行云何復説修行如幻若諸衆生本不修行於生死中常居幻化曾不了知如幻境界令妄想心云何解脫而如來答以種種幻化皆生如來圓覺妙心猶如空華從空而有幻華雖滅空性不壞等是也三為示修行漸次故由上章云知幻即離不作方便離幻即覺亦無漸次然衆生無始迷真久隨妄轉不假思惟云何便能知幻雖知是幻旋知旋忘云何便能住持是須於無方便中假説方便蓋即以思惟為方便亦即以思惟為住持思惟為方便者初心思惟是入手處故為方便次心思惟是正修不忘後心思惟是漸次深入故總名住持如是則一心入理思惟即成觀行非彼散心思惟者所可比耳如世尊答普眼云彼新學菩薩及末世衆生欲求如來淨圓覺心應當正念遠離諸幻等其為示修行漸次者在文歷歷可證四為示窮盡深疑故由前文殊章云一切如來本起因地皆依圓照清淨覺相永斷無明方成佛道普賢章云一切衆生種種幻化皆生如來圓覺妙心普眼章云圓覺普照寂滅無二諸佛世界猶如空華始知衆生本來成佛生死涅槃猶如昨夢於是金剛藏菩薩通躡前三章所説以成三種深疑一曰若諸衆生本來成佛此躡普眼章義何故復有一切無明此疑文殊章義二曰若諸衆生無明本有此躡普賢章種種幻化皆生覺心蓋無明亦幻化也何故復説本來成佛此疑普眼章義三曰十方異生本成佛道後起無明此躡普眼章衆生本成佛道普賢章幻化生於覺心一切如來何時復生一切煩惱此疑文殊章斷無明成佛道後應復起然此皆根心之疑能障正信而世尊答以種種取捨皆是輪回未出輪回而辨圓覺彼圓覺性即同流轉等其為示窮盡深疑者亦在文歷歷可證五為示離障順覺故良以本覺清淨永絶數量由依二障而現淺深於是乃有五種性起如世尊答彌勒問云欲泛如來大圓覺海先當發願勤斷二障乃至云依願修行漸斷諸障障盡願滿便登解脫清淨法殿等此為離障故説此經也又以妙覺圓滿本無差別由依始覺妄功用中於是乃有五種隨順設不隨順終成違礙如世尊答清淨慧偈云清淨慧當知圓滿菩提性無取亦無證覺與未覺時漸次有差別衆生為解礙菩薩未離覺入地永寂滅大覺悉圓滿末世諸衆生心不生虗妄乃至云雖有多方便皆名隨順智此為順覺故説此經也二義互成故合為一義明之六為示修必依觀故良以末法行人惟重頓悟不貴漸修故頓悟必假禪觀而漸修唯事力行殊不知捨禪觀而力行終不免誤入岐途故示修仍依禪觀如世尊答威德云若諸菩薩悟淨圓覺意顯下之奢摩乃悟後之修故以淨覺心取靜為行由澄諸念覺識煩動靜慧發生身心客塵從此永滅便能內發寂靜輕安此明斷惑必依禪觀由寂靜故十方世界諸如來心於中顯現如鏡中像此明證真必依禪觀此方便者名奢摩他輔行而修故以方便名之下之二觀義可準思末復結示云此三法門皆是圓覺親近隨順十方如來因此成佛等正顯進修必依此故七為示輪觀隨修故良以前章三觀似有次第謂先修奢摩次修三摩後修禪那殊不知悟後之修不必一定蓋以能修之機不同所修之行亦異但取其與能修相宜與所修相近相宜則易用相近則易成或單修或雙修或圓修或單雙雙單隨意合修設或自心不決仍復各安標記志心求哀依結開示然亦觀觀互到修修可憑設或溺於前章未免失宜失近因示輪觀為行所依如世尊答辨音偈云無礙清淨慧皆依禪定生所謂奢摩他三摩提禪那三法頓漸修有二十五種十方諸如來三世修行者無不因此法而得成菩提是知未成菩提之前六度萬行皆依此為目也八為示窮盡四相故良以四相有二一迷識四相二迷智四相迷識四相起於枝末無明能障小乘涅槃迷智四相起於根本無明能障無上菩提今經淨業障菩薩求佛開悟法性令衆作將來眼故世尊示以窮盡四相如世尊答淨業云一切衆生從無始來妄想執有我人衆生及與壽命認四顛倒為實我體由此便生憎愛二境於虗妄體重執虗妄二妄相依生妄業道有妄業故妄見流轉厭流轉者妄見涅槃由此不能入清淨覺此示述識相也又云云何我相謂諸衆生心所證者其心乃至證於如來清淨涅槃皆名我相云何人相謂諸衆生心悟證者悟已超過一切證者悉為人相云何衆生相謂諸衆生心自證悟所不及者了彼證悟為我為人不存證悟故所不及謂不及於心也但於此存有所了名衆生相云何壽命相謂諸衆生心照清淨覺所了者一切業智所不自見猶如命根名壽者相此示迷智相也二相窮盡乃入如來清淨覺海其意在文可見九為示四病應離故良以作止任滅藥病雙通要在有住及與無住蓋無住則為進修方便是名為藥有住則為入道障緣是名為病但為藥之義人或易見為病之義人所難明故此經但教離病設無住即離也果其無住則轉病為藥矣又作止任滅二對互為藥病以作則止治止則作治任則滅治滅則任治古德云住則印破破則印住乃善用此意者也如本經普覺菩薩問云大悲世尊快説禪病令諸大衆得未曾有心意蕩然獲大安隱而世尊答以末世衆生求善知識當求一切正知見人心不住相蓋以心不住相自應能離四病親近是人將必不墮邪見而住四種病矣十為示真修實證故由前十位菩薩相沿請問淨土世尊如問而答其於信解修習之義業已極力發揮應無餘蘊其如説藥不濟病軀話餅何益飢腸故於後二章進示修必真修證須實證修必真修者要在尅期取功如第十一圓覺章云若復無有他事因緣即建道場當立限期長期百二十日中期百日下期八十日安置淨居等是也證須實證者務以究竟為圓如第十二賢善首章云是經惟顯如來境界惟佛如來能盡宣説若諸菩薩及末世衆生依此修行漸次增進至於佛地等是也此依一經大義別示十緣微細分之應有無盡以此經直通於圓如華嚴十十無盡教起因緣門竟第二藏乘分攝者謂如來一代聖教約想相含攝有三藏有二藏約修證權實有三乘有五乘約品類詳分有九分有十二分應知此經於諸彼彼法中各何攝屬故次第明之言三藏者一修多羅亦名修妬路或名素怛纜蓋梵音楚夏不同此云契經或翻為線按五印土呼線席經井索聖教皆名修多羅若爾應翻聖教古德見此方聖教稱經故分取席經經字既順此方亦不失彼聖教之義不取席線及井索者此方不貴故非是聖教故但經上加契字乃借義助名顯是契理合機之經故又經有多義如雜心五義等見華嚴懸談又雖有多義不出貫攝如佛地論云能貫能攝故名為經謂依佛聖教貫穿所應説義攝持所應度生故正説定學兼通戒慧二毗奈耶亦名毗尼蓋梵音賒切耳此云調伏謂調練三業制伏過非故調練通於止作制伏唯明止持就所詮之行彰名或翻為滅謂滅惑業得滅果故亦名波羅提木叉此翻別解脫謂三業七支各別防非現前無違犯故又揀異道共及定共戒故名為別此從因得名亦可言果以解脫即果也亦翻隨順解脫謂隨順有為無為二解脫果故此從果得名亦可言因以隨順即因也或名尸羅具云翅怛羅此云清涼謂離熱惱因得清涼果故此雙從因果得名正詮戒學亦兼定慧三阿毗達摩亦名阿毗曇亦梵音賒切之異此翻對法法有二種一勝義法所謂涅槃是善是常故名勝義二法相法通四聖諦世出世異及因果異故名法相對亦有二一對向涅槃二對觀四諦其能對者皆無漏淨慧及相應心所以對果對境分二對名舊譯為無比法以無漏淨慧最為勝故此明惟依能對立名亦名優波提舍此翻論議謂問答辨論議邪正故亦名磨怛哩迦此翻本母以教與義為本為母生解行故正詮慧學兼亦攝二此三云何名藏以含攝故今經何所攝屬正屬經藏始終多説定故若以此攝彼亦兼餘二以普眼章遠離諸幻圓覺章三月安居皆重戒故十二大士相沿致問淨土世尊如問而答同論議故言二藏者一聲聞藏二菩薩藏即前三藏詮示聲聞理行果故名聲聞藏全示菩薩理行果故名菩薩藏不開辟支者以辟支多不借教出無佛世佛在世時攝屬聲聞以與聲聞理果同故若以教行別者亦可聞三乘為三藏但古皆不開今亦應爾若明攝屬者此經屬菩薩藏攝以經中雖存聲聞之名不取聲聞理行果故如彌勒章云若謂末世一切衆生於大圓覺起增上心當發菩薩清淨大願應作是言願我今者住佛圓覺求善知識莫值外道及與二乘又淨業章云一切衆生認四顛倒為實我體乃至云有妄業故妄見流轉厭流轉者妄見涅槃由此不能入清淨覺又圓覺章云若經夏首三月安居即於佛前作如是言我今敬請不依聲聞當與十方如來及大菩薩三月安居為修菩薩無上妙覺大因緣故不繫徒衆等如是語類皆欲揀棄小道唯取菩薩理行果也言三乘者一聲聞乘依四諦法殷勤精進欲速出三界自求涅槃法華云如彼諸子為求羊車出於火宅二辟支乘依因緣法殷勤精進求自然慧樂獨善寂深知諸法因緣法華云如彼諸子為求鹿車出於火宅三菩薩乘依六度法勤修精進求一切智利益天人度脫一切法華云如彼諸子為求牛車出於火宅然有權有實若住相之行因果歷別則名為權若從性起修因果該徹則名為實若明攝屬者此經屬菩薩乘攝以經中問處答處多言為菩薩故又賢善首章云若諸菩薩及末世衆生依此增進至於佛地如是則唯實一分攝以是悟後之修修即無修如威德章奢摩三摩等皆云悟淨圓覺以淨覺心修故不屬餘二其義可知若以此攝彼亦可通收以此經直通於圓包含無量乘故又賢善首章云是經名為頓教大乘頓機衆生從此開悟亦攝漸修一切羣品譬如大海不讓小流言五乘者一人天乘依戒善禪定之法求下界五欲及上二界淨妙之樂法華經喻以最小之車二聲聞乘三辟支乘四菩薩乘此三即上之三乘五佛乘依萬行因華嚴一乘道果法華經喻以大白牛車如云若是長者乃至不與最小一車猶不虗妄何況長者自知財富無量欲饒益諸子等與大車是蓋以最小之車喻人天等與大車喻佛乘也若明攝屬者此經屬佛乘攝如文殊發起則曰願為此會諸來法衆説於如來本起清淨因地法行賢善流通則曰是經唯顯如來境界是則因為果設果成因絶尚不屬於菩薩況夫餘乘若以此攝彼雖人天不遺譬夫一雲一雨三草二木隨分受潤試看如來説此經已一切大衆聞皆歡喜信受奉行則人天普攝之義可以意會言九分十二分者通論聖教有十二分一修多羅此云契經謂十一分及三藏中正文之外餘有前後相承貫穿契合等義別為修多羅分二祇夜此云重頌三和伽羅此云授記四伽陀此云孤起頌五優陀那此云自説六尼陀那此云因緣七阿波陀那此云譬喻八伊帝目多伽此云本事九闍陀伽此云本生十毗佛略此云方廣十一阿浮達摩此云未曾有十二優波提舍此云論議孤山云長行契經重頌并授記孤起無問而自説因緣譬喻及本事本生方廣未曾有論議俱成十二名廣如大論三十三九分者大小暫分如法華小乘唯九部方便品偈云我此九部法隨順衆生説古德釋云小乘談理狹隘故無方廣非是全無但無至方至廣不言成佛故無授記非全無記但無授記成佛請問方説故無自説非是全無但非直指按智論説大乘亦惟九部古德釋云大乘多直顯故無因緣非是全無但不類戒因事制譬喻非是全無但不同信必喻誘論議非是全無但不至算沙自困之三又古德云部恐濫部秩後易為分若明攝屬者十二分中此經正屬方廣以題稱大方廣故兼通八分大疏云貫攝之義通故即該契經正宗一一有重頌故即該祇夜記安心人成就佛智故即該授記因請方説故即該因緣説佛因地法行故即該本事六度非因涅槃非果即該未有二十七喻故即該譬喻普賢有徵剛藏有難故即該論議唯不攝伽陀自説本生等三也問契經居多何非彼攝答藏中契經已全攝故分中契經此但少分藏乘分攝竟第三能被教義者謂教海沖深法雲彌漫智光無際妙變莫窮以無言之言詮言絶之理運無變之變應變態之機機差教殊義分多種亦有不分得少失多今將有分略為三章一約宗分教二約論辨義三會通淺深言約宗分教者西竺東夏弘闡之流於一代聖言或含為一教或開為二三再開之而至四五人兼緇素凡有一十八家甲順乙違難盡他宗事精理備無越賢首因依賢首祖師略述五教一小乘教亦名愚法二乘教異大乘故逐機設故隨他語故説諸法數一向差別以其揀邪正辨聖凡明因果分欣厭然其所説法數唯七十五但説人空不明法空縱説法空少不明顯唯依六識三毒建立染淨根本未盡法源故多諍論二大乘始教亦名分教但明諸法皆空未盡大乘法理故名為始但明一切法相有成佛有不成佛故名為分廣談法相少及法性其所云性亦是相數説有百法決擇分明故少諍論三終教亦名實教謂明緣起無性一切皆如定性二乘無性闡提悉當成佛方盡大乘至極之説故名為終以稱實理故名為實多談法性少及法相其所云相亦會歸性盡大乘説故無諍論四一乘頓教但一念不生即名為佛不依地位漸次而説如思益經云得諸法正性者不從一地至於一地楞伽經云初地即為八乃至無所有何次等既不同前漸次修行又不同後圓融具德故名為頓總不説法相惟辨真性一切所有惟是妄想一切法界惟是絶言五法三自性皆空八識二無我俱遣呵教勸離毀相泯心生心即妄不生即佛亦無佛無不佛無生無不生如淨名默住等別為一類離念機故亦為對治空有俱三種著相人故五圓教謂統該前四圓滿具足一位即一切位一切位即一位十信滿心即攝五位成等正覺故名為圓所説惟是無盡法界性海圓融緣起無礙相即相入如因陀羅網重重無際微細相容主伴無盡已上略出各義令知大端若廣辨所詮及斷證分齊具如華嚴懸談並賢首教儀等書言約論辨義者佛教本乎一心心有差別則教有支異故如來説教説此心也諸祖判教判此心也今即以起信論中一心差別以明五重教義準起信論初惟以一心為本源論云所言法者謂衆生心是心則攝一切世間出世間法即圓教分齊二依一心開二門一者心真如門所謂心性不生不滅即頓教分齊始教空宗亦密示此門以彼不知如來遣相即為顯性故非彼分二者心生滅門謂依如來藏有生滅心所謂不生不滅與生滅和合名為阿賴耶識即終教分齊分教相宗亦密示此門以彼不知佛説賴耶通如來藏故非彼分三依生滅門明二義一者覺義謂心體離念離念相者等虛空界即是如來平等法身即始教空宗分齊二者不覺義謂不如實知真如法一故四依此義生三細一依不覺故心動名業相二依動故能見名轉相三依能見故境界妄現名現相五依此相生六粗一智相二相續相謂依智起念不斷即法執分別三執取相謂妄生執取即我執俱生四計名字相謂妄計名字即我執分別即小教分齊以斷我執證我空是小教義故五起業相謂循名造業六業繫苦相謂隨業受報即人天分齊又六道業報即苦空觀等之方便亦小教分齊言會通淺深者此經正屬頓教兼攝小始終三直通乎圓如賢善首章云是經名為頓教大乘頓機衆生從此開悟其正屬頓教可知又云亦攝漸修一切羣品譬如大海不讓小流其兼攝小始終三可知又云乃至蚊虻及阿修羅飲其水者皆得充滿其直通乎圓可知以飲水多少皆具百川味故此約賢善首章通以會通若別以會通者教各有文散在十一章中繁不具悉所冀學賢首者當體心會教借教通經則經可通而教可會矣能被教義竟第四所被機宜者夫教因機設機以教成上説教義已知能被宏深今示機宜略彰所被廣大復分兩門以盡揀收一遵古所判二依經所明言遵古所判者依古德開為二門一料揀二普收料揀非機則有五種一謂樂著名相以文為解者二謂繫滯行位高推聖境者三謂情尚於空觸言賓無者四謂自恃天真輕厭進修者五謂固執先聞擔麻棄金者如是皆名非機反是皆機若普收者則一切衆生皆有佛性但得聞之無不獲益宿機深者悟入淺者信解都無宿種者結緣成種食金剛喻可為譬也言依經所明者亦有料揀普收二門料揀者按淨業普覺二章俱有十種非機一者有妄業道妄見流轉此六道凡夫堅執四相者二者厭流轉者妄見涅槃此小教二乘厭有趣空者結此二種文云是故動念及與息念皆歸迷悶故知非機三者心有所證顯有能證此住位菩薩猶有微細我相以能證即我故四者悟證有我不復認證此行位菩薩猶有微細人相以超我即人故五者了彼證悟不住我人此向位菩薩猶有微細生相以存有所了即衆生相故六者心照清淨覺所了者此地位菩薩猶有微細壽者然既心照清淨則了已不存當下即是若更起心覺彼所以能了之者此覺則是一切業智業識上微細分別所不自見業智不能照破自己如眼不自見猶如命根即壽者相故結此四相文云末世衆生不了四相雖經多劫勤苦修道但名有為終不能成一切聖果故知非機此上共六種詳見淨業章中七者我於本心作種種行此名作病揀云彼圓覺性非作得故此顯非機八者任彼一切隨諸法性此名任病揀云彼圓覺性非任有故此顯非機九者於自本心止息諸念此名止病揀云彼圓覺性非止合故此顯非機十者滅諸煩惱一切永寂此名滅病揀云彼圓覺性非寂相故此顯非機以上四種詳見普覺章中若普收者按清淨慧章從凡至聖皆稱隨順覺性然既皆稱隨順自應咸是所被無容揀棄若果能居一切時不起妄念則作任俱銷於諸妄心亦不息滅則止滅咸停若更能住妄想境不加了知於無了知不辨真實則一切障礙即究竟覺得念失念無非解脫成法破法皆名涅槃智慧愚癡通為般若菩薩外道所成就法同是菩提無明真如無異境界諸戒定慧及淫怒癡俱是梵行衆生國土同一法性地獄天宮皆為淨土有性無性齊成佛道一切煩惱畢竟解脫如是則四相四病盡是圓覺性門六根六塵全彰法界智境是機皆被有性咸收楞嚴云聖性無不通順逆皆方便圓覺妙心亦復如是凡諸有生幸勿錯過所被機宜竟第五體性淺深者夫聖言無定大小通關真教難評淺深異體今依本經大旨通收古德所説略為三章一開為十種清涼疏華嚴等二合為四門圭峯注圓覺等三總以會通言開為十種者一音聲語言體二名句文身體三通取四法體四通攝所詮體五諸法顯義體六攝境性心體七會緣入實體八理事無礙體九事事無礙體十海印炳現體此之十種前淺後深言盡理圓詳華嚴懸談言合為四門者即上十種圭峯束而為四一隨相門二唯識門三歸性門四無礙門隨相門中復有二種一聲名句文體謂大小乘教或以聲為教體攝假從實故或以名句文為教體以體從用故今通取之以假實體用遞互相資而為教體二通攝所詮體以聲名句文但屬能詮若無所詮之義不成教體故必通攝所詮文義相隨而為教體唯識門者以上能詮所詮皆唯識現故唯識云唯遮外境識表內心離識之外更無別法釋論亦云十地經者彼聖者金剛藏識所變影像為增上緣聞者識上影現似彼法門展轉傳來説名為教是知一切諸法皆是識心所變影像故以唯識為體歸性門者以上識心無體唯是真如故然有二義一約生滅門真如隨緣變起識境諸法從緣無性會歸唯一真如如起信論云依於此心顯示摩訶衍義華嚴梵行品云知一切法即心自性成就慧身不由他悟故以歸性為體二約真如門不變名真不壞名如惟此可為教體顯有變有壞者非教體故如起信論云一切諸法惟依妄念而有差別若離妄念則無一切境界之相是故一切法從本已來離言説相離名字相離心緣相畢竟平等無有變異不可破壞惟是一心故名真如維摩經文殊歎維摩詰曰乃至無有文字語言是名真入不二法門故惟以歸性為體此二義中前是終教唯心後是頓教惟心合為一歸性門也四無礙門亦有二義一理事無礙二事事無礙理事無礙復有二義一前後交徹二説聽全收前後交徹者以上三門中前二屬生滅門是事法界後一約所歸之性屬真如門是理法界起信論云依一心法有二種門然既依於一心則真如即是生滅生滅即是真如故統收前三理事無礙而為教體説聽全收有四句一佛全攝生謂佛真心外無別衆生則唯説無聽二生全攝佛謂衆生真心外無有別佛故惟聽無説三生佛互融謂佛真心攝衆生時不礙衆生心中攝佛衆生心中攝佛時不礙佛真心攝衆生則説聽雙存二教齊立四生佛俱泯謂佛真心攝衆生時生即同佛故非生衆生真心攝佛時佛即同生故非佛則説聽互奪二教齊泯如是則存泯自由理事無礙故以無礙為體事事無礙中亦有二義一重重互攝二説聽全收重重互攝者謂由上三門理與事無礙故能令聲名句文等一一事法皆悉稱理無礙如法華意根清淨文云以是清淨意根乃至聞一偈一句通達無量無邊之義今識門稱性亦然又云解是義已能演説一偈一句至於一月四月乃至一歲今聲名句文義稱性亦然説聽全收者亦有四句一由佛果稱性攝法無遺衆生尚在佛中況所聞教故佛果一一身分一一毛端等皆為所聞二謂衆生稱性攝法無遺佛尚在衆生中況所説教故衆生一一身分一一毛端等皆成所説三由生佛互在各不壞相則隨一聲教互説互聞故衆生身中佛為佛身中衆生説法佛身中衆生聽衆生身中佛説法四由生全在佛故同佛非生佛全在生故同生非佛二位齊泯説聽互無故佛身中衆生無聽衆生身中佛無説如是則一聞一切聞一説一切説生佛互在二俱存説聽互無兩俱泯究竟存亦不可説泯亦不可説以正互泯時即互存正互存時即互泯一切圓成無障無礙故最後以事事無礙為教體也言總與會通者圭峯初門即攝清涼前五二分攝六以彼唯心義寬圭峯唯識門中雖有本影四句亦止潛通終頓尅論唯齊始分二教故不俱攝三分攝六全攝彼七以彼釋唯心齊於一心本源圭峯第三止齊終頓故唯分攝若彼第七會生滅之緣入真如之實義當頓教故此全攝四攝後三可知若以本經會通者此經正屬頓教應以歸性為體亦兼小始終三小教顯屬隨相冥通唯識始教顯屬唯識冥通歸性至若終教與頓教同屬歸性又此經直通乎圓亦兼以無礙為體教體淺深竟第六宗趣通別者語之所尚曰宗宗之所歸曰趣然有通有別通謂通論一代佛教諸部異計各各不同以義相從更復合之略為六宗一隨相法執宗謂於一切我法中起有無執故即小乘諸師依阿含緣生等經造婆沙俱舍諸部論等此中復分為六一我法則有宗謂犢子法上賢胄正量密林山部等以立我故諸部論師共推不受呼為附佛法外道二法有我無宗謂薩婆多上座多聞部等彼説諸法皆悉實有但不立我異外道計又立正因緣以破外道邪因及無因等三法無去來宗謂大衆部及雞胤制多西山北山法藏飲光部等惟説現在有為及無為法以過未之法體用俱無故所不説四現通假實宗謂説假部就前現在有為法中説五蘊為實界處為假其成實論末經部師對根本經部言亦是此説五俗妄真實宗即説出世部等謂世俗是假以虗妄故出世反上六諸法但名宗即一説部等説一切我法但有假名無實體故六中初唯執有後唯執無中通有無故總唯一隨相法執宗二唯識法相宗謂一切法皆唯識現故即無著天親依方廣深密等經造瑜伽唯識論等三真空無相宗謂一切諸法皆空無相故即提婆清辨依妙智般若等經作百門掌珍論等四藏心緣起宗謂一切諸法唯是真如隨緣具恆沙德故即堅慧馬鳴依勝鬘涅槃等經造寶性起信論等五真性寂滅宗謂想相俱絶直顯性體故即馬鳴龍樹依楞伽般若等經造真如三昧智度論等六法界圓融宗謂無盡法界如因陀羅網主伴重重圓融無礙故即龍樹天親依華嚴等經造不思議十地論等此之六宗除第一宗中第一有宗無趣以佛教所不受故其餘皆各為一類之機啓揚悟門資修行業以證自類之果為趣若別就當經以明宗趣者於中復有通別通則此經唯依如來本起因地圓照清淨覺相為宗永斷無明成就妙圓覺性究竟極果為趣若就前通中宗唯第五趣兼第六一二三四亦可旁通別則唯就本經次第循環別分六對一教義一對謂欲求圓覺須依聖教故先以永離諸幻之教為宗教不虗傳要在如教思義故次以深思幻盡之義為趣二疑信一對謂幻盡覺圓聞者多疑故先以曲辨三疑為宗深疑既辨真信斯生故次以決定信生為趣三悟修一對謂信既決定悟應真實故先以心悟實相為宗徒悟無功要必從性起修故次以進修三定為趣四偏圓一對謂悟有深淺初修尚應隨機故先以偏修三定為宗境變純雜久修自應無礙故次以圓修輪觀為趣五因果一對謂輪觀磨礱正因無礙故先以滅障成因為宗因成果契力在後時故次以尅期取證為趣六終始一對謂果成報本崇闡微言故終以出名勸持勸護為宗持護所期仍假方便故始以圓照清淨覺相為趣此則從前起後次第循環別為一經宗趣隨順修習自然相應亦可云知所先後則近道矣宗趣通別竟第七傳譯紀略者謂自西而東傳來必致命委身翻梵成華譯人皆乘願受囑況茲真詮逈異餘誥佛説必現淨土傳譯定非常倫末世親逢無任慶躍為茲紀略昭示來今謹按開元釋教目録云沙門佛陀多羅此云覺救北印土罽賓人也於東都白馬寺譯不載年月續古今譯經圖記亦同此説又北都藏海寺道詮法師疏云羯濕彌羅翻譯名譯集云罽賓國名正音羯濕彌羅此翻賤種昔末田底迦立五百伽藍於此買異國賤人以充役使後因生息繁盛賤人自立君長鄰國鄙之因而名焉三藏法師佛陀多羅於長壽二年龍集癸巳持梵本至神都白馬寺翻譯四月八日畢然釋教目録譯經圖記二俱不載年月而道詮特書者想必有所見傳紀略竟第八注釋倡先者依大疏有四家謂京都報國寺惟慤法師先天寺悟實禪師薦福寺堅志法師并北京道詮法師大疏云慤邈經文簡而可覽實述理性顯而有宗詮多專於他詞志可利於羣俗然既各有所長均可行世各接一類之機普收結緣之衆無何人有政舉人亡政息弗獲神遇徒仰嘉名目今盛行海內獨步講筵者唯我法界第五祖賢宗正三世圭峯大士所出兩疏兩鈔為尤著也如相國裴序讚云其敘教也圓其見法也徹其釋義也端如析薪其入觀也明若秉燭其辭也極於理而已不虗騁其文也扶於教而已不苟飾不以其所長病人故無排斥之説不以其未至蓋人故無胸臆之論乃至云後世雖有作者不能過矣然向以獅絃既奏羣音絶嚮所以此經自圭峯而後注者希焉近因長夏無事檢閲方册藏經與大疏同函者圓覺之注釋有三一日直解憨山大師注也師深通禪理而尤精於教乘嘗以圓覺為最勝法門統攝無邊教海該羅法界圓宗徹一心之源歷三觀之旨偏正互換單復圓修搜窮妄宰披剝禪病圭峯師扶教竪宗為疏為鈔修學人厭繁苦略難解難通大師於禪餘展玩深有慨焉自稱祖疏義而徑釋經文目曰直解若為結法緣而暫一隨喜殊覺暢明二曰句釋正白羅峰大師注也師為博山嗣孫開法於嶺南曰新山亦一時洞宗之丁丁者矣法語行世者若干而圓覺經注乃最後絶筆也應華王居士序謂其以大悲願力遊如來大圓覺海普令開示悟入打翻圭峯窠臼闡揚洞上宗風繹此數語則大師注釋此經之本意已略見其槩矣三曰要解勤息寂正師注也師不知何如人寂其派正其名也勤息者乃沙門之華言義取乎勤修戒定慧息滅貪瞋癡也既不用五重玄義又不假十門通經知師非台賢兩宗其所住寺既名通律或者為南山宗耳至觀其首敘經義隨章頗得其次又玩其正釋經文逐句略辨其神利便初心應名略解或冀其一言之下心地開通則略即成要師意果如是乎然此已上三師既立言在先宜皆為我師謂善者從之不善者易之所以隨門續録者正為此耳注釋倡先竟圓覺經析義疏懸示終
